const DIE_OPTS=["NO","d4","d6","d8","d10","d12","d20","d100"];

// Shared formula evaluator — supports both old single-select format and new multi-entry arrays
function computeBonusFromFormula(formula,c){
  if(!formula) return 0;
  const allCls=(c.classes&&c.classes.length>0?c.classes:[{nm:c.cls||"",lv:"",hd:"d6"}]).filter(function(cl){return (cl.nm||"").trim();});
  const totalLv=allCls.reduce(function(t,cl){return t+(parseInt(cl.lv)||0);},0);
  const pb2=(function(){var base=totalLv<1?2:Math.ceil(totalLv/4)+1;return base+(parseInt((c.pbBonus||"").replace("+",""))||0);})();
  const getMod2=function(abl){var base=parseInt((c.statsBase&&c.statsBase[abl])||c.stats[abl])||10;var bon=parseInt((c.statsBon&&c.statsBon[abl])||0)||0;return Math.floor((base+bon-10)/2);};
  const flat=parseInt((formula.flat||"").replace("+",""))||0;
  const ablSum=(formula.abls||[]).reduce(function(t,a){return t+getMod2(a);},0);

  // Prof: new array format (profs:[]) stacks freely; fall back to old single field
  var profSum=0;
  if(formula.profs&&formula.profs.length>0){
    profSum=(formula.profs||[]).reduce(function(t,p){
      return t+(p==="full"?pb2:p==="half-up"?Math.ceil(pb2/2):p==="half"?Math.floor(pb2/2):0);
    },0);
  } else {
    profSum=formula.prof==="full"?pb2:formula.prof==="half"?Math.floor(pb2/2):formula.prof==="half-up"?Math.ceil(pb2/2):0;
  }

  // Level: new array format (lvlEntries:[{type,cls}]) stacks freely; fall back to old single fields
  var lvlSum=0;
  if(formula.lvlEntries&&formula.lvlEntries.length>0){
    lvlSum=(formula.lvlEntries||[]).reduce(function(t,e){
      var type=e.type||"none";
      if(type==="total-full") return t+totalLv;
      if(type==="total-half-down") return t+Math.floor(totalLv/2);
      if(type==="total-half-up") return t+Math.ceil(totalLv/2);
      var cl=allCls.find(function(x){return x.nm===e.cls;});
      var clLv=cl?parseInt(cl.lv)||0:0;
      if(type==="class-full") return t+clLv;
      if(type==="class-half-down") return t+Math.floor(clLv/2);
      if(type==="class-half-up") return t+Math.ceil(clLv/2);
      return t;
    },0);
  } else {
    // backward compat
    if(formula.lvlType==="total-full") lvlSum=totalLv;
    else if(formula.lvlType==="total-half-down") lvlSum=Math.floor(totalLv/2);
    else if(formula.lvlType==="total-half-up") lvlSum=Math.ceil(totalLv/2);
    else if(formula.lvlType==="class-full"){var cl=allCls.find(function(x){return x.nm===formula.lvlClass;});lvlSum=cl?parseInt(cl.lv)||0:0;}
    else if(formula.lvlType==="class-half-down"){var cl2=allCls.find(function(x){return x.nm===formula.lvlClass;});lvlSum=cl2?Math.floor((parseInt(cl2.lv)||0)/2):0;}
    else if(formula.lvlType==="class-half-up"){var cl3=allCls.find(function(x){return x.nm===formula.lvlClass;});lvlSum=cl3?Math.ceil((parseInt(cl3.lv)||0)/2):0;}
  }

  return flat+ablSum+profSum+lvlSum;
}

// Returns true if formula has any prof component (for the two half-prof toggles)
function formulaHasProf(formula) {
  if(!formula) return false;
  if(formula.profs&&formula.profs.length>0) return true;
  return formula.prof&&formula.prof!=="none";
}

// Short label(s) for prof component — handles both new profs[] and legacy prof
function formulaProfLabel(formula) {
  if(!formula) return "";
  const lbl=function(p){return p==="full"?"PROF":p==="half-up"?"½↑PROF":p==="half"?"½↓PROF":"";};
  if(formula.profs&&formula.profs.length>0) return formula.profs.map(lbl).filter(Boolean).join("+");
  return lbl(formula.prof||"none");
}

// Kept for backward compat — returns total prof value (not used for stacking logic anymore)
function formulaProfVal(formula, c) {
  if(!formula) return 0;
  if(formula.profs&&formula.profs.length>0){
    const allCls=(c.classes&&c.classes.length>0?c.classes:[{nm:c.cls||"",lv:"",hd:"d6"}]).filter(function(cl){return (cl.nm||"").trim();});
    const totalLv=allCls.reduce(function(t,cl){return t+(parseInt(cl.lv)||0);},0);
    const pb2=(totalLv<1?2:Math.ceil(totalLv/4)+1)+(parseInt((c.pbBonus||"").replace("+",""))||0);
    return (formula.profs||[]).reduce(function(t,p){return t+(p==="full"?pb2:p==="half-up"?Math.ceil(pb2/2):p==="half"?Math.floor(pb2/2):0);},0);
  }
  if (!formula.prof || formula.prof === "none") return 0;
  const allCls=(c.classes&&c.classes.length>0?c.classes:[{nm:c.cls||"",lv:"",hd:"d6"}]).filter(function(cl){return (cl.nm||"").trim();});
  const totalLv=allCls.reduce(function(t,cl){return t+(parseInt(cl.lv)||0);},0);
  const pb2=(totalLv<1?2:Math.ceil(totalLv/4)+1)+(parseInt((c.pbBonus||"").replace("+",""))||0);
  if (formula.prof === "full") return pb2;
  if (formula.prof === "half-up") return Math.ceil(pb2/2);
  if (formula.prof === "half") return Math.floor(pb2/2);
  return 0;
}

// Non-prof portion of a bonus: total minus the prof component
function driv_nonProf(formula, rawField, profPart, c) {
  if (formula && c) return computeBonusFromFormula(formula, c) - profPart;
  return parseInt(((rawField||"")).replace("+",""))||0;
}

// Clickable bonus field — opens FormulaModal on click
function BonusField({c,value,formula,onApply,label,inputStyle,hideProfFull}){
  const [open,setOpen]=React.useState(false);
  const num=formula?computeBonusFromFormula(formula,c):(parseInt((value||"").replace("+",""))||0);
  const hasFormula=!!formula;
  const hasVal=num!==0||hasFormula;
  const modal=open?ReactDOM.createPortal(
    <FormulaModal c={c} initialFormula={formula||{flat:value||"",abls:[],profs:[],lvlEntries:[]}}
      title={label||"Configure Bonus"}
      hideProfFull={hideProfFull}
      onApply={function(total,frm){onApply(total,frm);setOpen(false);}}
      onClose={function(){setOpen(false);}}
      onClear={hasFormula?function(){onApply(0,null);setOpen(false);}:null}
    />,
    document.body
  ):null;
  return (
    <>
      <div onClick={function(){setOpen(true);}} title={hasFormula?"Formula active — click to edit":"Click to set bonus"}
        style={{cursor:"pointer",fontFamily:"'Cinzel',serif",textAlign:"center",
          color:hasFormula?"rgba(201,150,42,.5)":hasVal?"var(--gold-l)":"rgba(232,213,176,.25)",
          ...(inputStyle||{})}}>
        {hasVal?(num>=0?"+"+num:""+num):"+0"}
      </div>
      {modal}
    </>
  );
}

function FormulaModal({c,initialFormula,onApply,onClose,title,minResult,onClear,hideProfFull}){
  const allClasses=(c.classes&&c.classes.length>0?c.classes:[{nm:c.cls||"",lv:"",hd:"d6"}]).filter(function(cl){return (cl.nm||"").trim();});
  const totalLv=allClasses.reduce(function(t,cl){return t+(parseInt(cl.lv)||0);},0);
  const pb=(function(){var lv=totalLv;var base=lv<1?2:Math.ceil(lv/4)+1;return base+(parseInt((c.pbBonus||"").replace("+",""))||0);})();
  const getMod=function(abl){var base=parseInt((c.statsBase&&c.statsBase[abl])||c.stats[abl])||10;var bon=parseInt((c.statsBon&&c.statsBon[abl])||0)||0;return Math.floor((base+bon-10)/2);};

  const migrate=function(f){
    if(!f) return {flat:"",abls:[],profs:[],lvlEntries:[]};
    var profs=f.profs?[...f.profs]:(f.prof&&f.prof!=="none"?[f.prof]:[]);
    var lvlEntries=f.lvlEntries?[...f.lvlEntries]:(f.lvlType&&f.lvlType!=="none"?[{type:f.lvlType,cls:f.lvlClass||""}]:[]);
    return {flat:f.flat||"",abls:[...(f.abls||[])],profs,lvlEntries};
  };
  const [formula,setFormula]=React.useState(migrate(initialFormula));
  const setF=function(field,val){setFormula(function(prev){return {...prev,[field]:val};});};

  const profValFn=function(p){return p==="full"?pb:p==="half-up"?Math.ceil(pb/2):p==="half"?Math.floor(pb/2):0;};
  const profLabelFn=function(p){return p==="full"?"Prof (+"+pb+")":p==="half-up"?"½↑ Prof ("+Math.ceil(pb/2)+")":p==="half"?"½↓ Prof ("+Math.floor(pb/2)+")":p;};
  const lvlValFn=function(e){
    var type=e.type||"none";
    if(type==="total-full") return totalLv;
    if(type==="total-half-down") return Math.floor(totalLv/2);
    if(type==="total-half-up") return Math.ceil(totalLv/2);
    var cl=allClasses.find(function(x){return x.nm===e.cls;});
    var clLv=cl?parseInt(cl.lv)||0:0;
    if(type==="class-full") return clLv;
    if(type==="class-half-down") return Math.floor(clLv/2);
    if(type==="class-half-up") return Math.ceil(clLv/2);
    return 0;
  };
  const lvlLabelFn=function(e){
    var type=e.type||"none";
    var base=type.startsWith("total")?"Total ("+totalLv+")":(e.cls||"?")+" ("+((allClasses.find(function(x){return x.nm===e.cls;})||{lv:0}).lv||0)+")";
    if(type.includes("half-down")) return "½↓ "+base;
    if(type.includes("half-up")) return "½↑ "+base;
    return base;
  };
  const lvlKeyFn=function(e){return e.type+":"+(e.cls||"");};

  const flat=parseInt((formula.flat||"").replace("+",""))||0;
  const ablSum=(formula.abls||[]).reduce(function(t,a){return t+getMod(a);},0);
  const profSum=(formula.profs||[]).reduce(function(t,p){return t+profValFn(p);},0);
  const lvlSum=(formula.lvlEntries||[]).reduce(function(t,e){return t+lvlValFn(e);},0);
  const rawTotal=flat+ablSum+profSum+lvlSum;
  const total=(minResult!==null&&minResult!==undefined)?Math.max(minResult,rawTotal):rawTotal;

  const row=function(label,children){
    return <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:12,flexWrap:"wrap"}}>
      <span style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:1,color:"rgba(201,150,42,.6)",textTransform:"uppercase",width:52,flexShrink:0,paddingTop:4}}>{label}</span>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",flex:1}}>{children}</div>
    </div>;
  };

  const counterChip=function(label,count,onAdd,onRemove,col,key){
    col=col||"rgba(123,79,207,1)";
    var active=count>0;
    var bg=active?col.replace(",1)",",0.15)"):col.replace(",1)",",0.04)");
    var border=active?col.replace(",1)",",0.55)"):col.replace(",1)",",0.15)");
    var color=active?col.replace(",1)",",0.9)"):"rgba(232,213,176,.3)";
    return <div key={key} style={{display:"flex",alignItems:"center",gap:0,borderRadius:10,background:bg,border:"1px solid "+border,overflow:"hidden",userSelect:"none"}}>
      {active&&<div onClick={onRemove} style={{cursor:"pointer",padding:"3px 7px",fontFamily:"'Cinzel',serif",fontSize:11,color:color,borderRight:"1px solid "+border}}>−</div>}
      <div onClick={onAdd} style={{cursor:"pointer",padding:"3px 8px",fontFamily:"'Cinzel',serif",fontSize:9,color:color}}>
        {label}{count>1&&<span style={{marginLeft:3,fontSize:8,opacity:.8}}>×{count}</span>}
      </div>
      {active&&<div onClick={onAdd} style={{cursor:"pointer",padding:"3px 7px",fontFamily:"'Cinzel',serif",fontSize:11,color:color,borderLeft:"1px solid "+border}}>+</div>}
    </div>;
  };

  var profOpts=["half","half-up"];
  if(!hideProfFull) profOpts.push("full");

  var lvlOpts=[
    {type:"total-full",cls:""},
    {type:"total-half-down",cls:""},
    {type:"total-half-up",cls:""},
  ];
  allClasses.forEach(function(cl){
    lvlOpts.push({type:"class-full",cls:cl.nm});
    lvlOpts.push({type:"class-half-down",cls:cl.nm});
    lvlOpts.push({type:"class-half-up",cls:cl.nm});
  });

  return <div style={{position:"fixed",inset:0,zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,.75)"}} onClick={onClose}>
    <div style={{background:"#1a1208",border:"1px solid rgba(201,150,42,.35)",padding:"20px 24px",minWidth:320,maxWidth:500,width:"92vw",boxShadow:"0 8px 40px rgba(0,0,0,.9)",position:"relative",maxHeight:"90vh",overflowY:"auto"}} onClick={function(e){e.stopPropagation();}}>
      <div style={{fontFamily:"'Cinzel',serif",fontSize:12,letterSpacing:2,color:"rgba(201,150,42,.8)",textTransform:"uppercase",marginBottom:16,borderBottom:"1px solid rgba(201,150,42,.15)",paddingBottom:8}}>{title||"Formula"}</div>

      {row("Flat",
        <input value={formula.flat||""} onChange={function(e){setF("flat",e.target.value);}} placeholder="0"
          style={{width:56,background:"transparent",border:"none",borderBottom:"1px solid rgba(201,150,42,.35)",color:"var(--gold-l)",fontFamily:"'Cinzel',serif",fontSize:16,textAlign:"center",outline:"none"}} />
      )}

      {row("Ability",
        ["STR","DEX","CON","INT","WIS","CHA"].map(function(abl){
          var count=(formula.abls||[]).filter(function(x){return x===abl;}).length;
          return counterChip(abl+" ("+getMod(abl)+")",count,
            function(){setF("abls",[...(formula.abls||[]),abl]);},
            function(){var cur=formula.abls||[];var idx=cur.lastIndexOf(abl);if(idx>=0){var next=[...cur];next.splice(idx,1);setF("abls",next);}},
            "rgba(56,178,172,1)","abl-"+abl);
        })
      )}

      {row("Prof",
        <div style={{display:"flex",flexDirection:"column",gap:6,width:"100%"}}>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {profOpts.map(function(p){
              var count=(formula.profs||[]).filter(function(x){return x===p;}).length;
              return counterChip(profLabelFn(p),count,
                function(){setF("profs",[...(formula.profs||[]),p]);},
                function(){var cur=formula.profs||[];var idx=cur.lastIndexOf(p);if(idx>=0){var next=[...cur];next.splice(idx,1);setF("profs",next);}},
                "rgba(201,74,42,1)","prof-"+p);
            })}
          </div>
          <div style={{fontFamily:"'EB Garamond',serif",fontSize:10,color:"rgba(232,213,176,.3)",fontStyle:"italic",lineHeight:1.5}}>
            Multiple prof bonuses stack freely. The ½↓ Prof toggle in Checks/Skills is the only source that self-limits to rolls with no existing prof.
          </div>
        </div>
      )}

      {row("Level",
        <div style={{display:"flex",flexDirection:"column",gap:6,width:"100%"}}>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {lvlOpts.map(function(opt){
              var key=lvlKeyFn(opt);
              var count=(formula.lvlEntries||[]).filter(function(e){return lvlKeyFn(e)===key;}).length;
              return counterChip(lvlLabelFn(opt),count,
                function(){setF("lvlEntries",[...(formula.lvlEntries||[]),{type:opt.type,cls:opt.cls}]);},
                function(){var cur=formula.lvlEntries||[];var idx=cur.map(lvlKeyFn).lastIndexOf(key);if(idx>=0){var next=[...cur];next.splice(idx,1);setF("lvlEntries",next);}},
                "rgba(184,154,240,1)","lv-"+key);
            })}
          </div>
        </div>
      )}

      <div style={{borderTop:"1px solid rgba(201,150,42,.15)",paddingTop:12,marginTop:4,display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,flexWrap:"wrap"}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:10,color:"rgba(232,213,176,.35)",flex:1}}>
          {(function(){
            var parts=[];
            if(flat) parts.push("Flat("+flat+")");
            if(ablSum) parts.push((formula.abls||[]).map(function(a){return a+"("+getMod(a)+")";}).join("+"));
            if(profSum) parts.push((formula.profs||[]).map(profLabelFn).join("+"));
            if(lvlSum) parts.push((formula.lvlEntries||[]).map(function(e){return lvlLabelFn(e)+"("+lvlValFn(e)+")";}).join("+"));
            return parts.filter(Boolean).join(" + ")||"—";
          })()}
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <div style={{fontFamily:"'Cinzel Decorative',serif",fontSize:24,fontWeight:700,color:"var(--gold-l)"}}>{(minResult!==null&&minResult!==undefined)?total:(total>=0?"+"+total:""+total)}</div>
          <button onClick={function(){onApply(total,formula);}} style={{background:"rgba(74,156,92,.15)",border:"1px solid rgba(74,156,92,.4)",color:"rgba(74,156,92,.9)",fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:1,padding:"5px 12px",cursor:"pointer",borderRadius:2}}>Apply</button>
          {onClear&&<button onClick={onClear} style={{background:"transparent",border:"1px solid rgba(201,74,42,.25)",color:"rgba(201,74,42,.45)",fontFamily:"'Cinzel',serif",fontSize:10,padding:"5px 10px",cursor:"pointer",borderRadius:2}}>Clear</button>}
          <button onClick={onClose} style={{background:"transparent",border:"1px solid rgba(201,74,42,.3)",color:"rgba(201,74,42,.5)",fontFamily:"'Cinzel',serif",fontSize:10,padding:"5px 10px",cursor:"pointer",borderRadius:2}}>Cancel</button>
        </div>
      </div>
    </div>
  </div>;
}

// Extended formula evaluator for creature statblocks
// ctx = {c, creature, spellLevel}
function computeCreatureFormula(formula, ctx){
  if(!formula) return 0;
  const c=ctx.c, creature=ctx.creature||{}, spellLevel=ctx.spellLevel||0;
  // Base character formula parts (flat + charAbls + profs + lvlEntries)
  const baseFormula={flat:formula.flat||"",abls:formula.charAbls||formula.abls||[],profs:formula.profs||[],lvlEntries:formula.lvlEntries||[]};
  const base=computeBonusFromFormula(baseFormula,c);
  // Creature's own ability mods
  const crStats=creature.stats||{STR:10,DEX:10,CON:10,INT:10,WIS:10,CHA:10};
  // Resolve @ABL references to character's live score
  const _resolveStat=function(v){
    if(v&&typeof v==="string"&&v.startsWith("@")){
      var a=v.slice(1);
      var base=parseInt((c.statsBase&&c.statsBase[a])||c.stats[a])||10;
      var bon=parseInt((c.statsBon&&c.statsBon[a])||0)||0;
      return base+bon;
    }
    return v===""||v==null?0:parseInt(v)||0;
  };
  const crAblSum=(formula.creatureAbls||[]).reduce(function(t,a){return t+Math.floor((_resolveStat(crStats[a])-10)/2);},0);
  // Spell level × multiplier
  const spLvlPart=Math.round((parseFloat(formula.spellLevelMult)||0)*spellLevel);
  // Creature's own prof component
  var crPbVal=(function(){
    if(creature.pbFormula) return computeCreatureFormula(creature.pbFormula,{c,creature:{...creature,pbFormula:null},spellLevel});
    return parseInt(creature.pbFlat)||2;
  })();
  var crProf=(formula.creatureProfs||[]).reduce(function(t,p){
    return t+(p==="full"?crPbVal:p==="half-up"?Math.ceil(crPbVal/2):p==="half"?Math.floor(crPbVal/2):0);
  },0);
  var spellAtkPart=0;
  // Character's exhaustion penalty — applies to character-sourced components (spell atk, charAbls)
  const charExhPen=Math.min(5,Math.max(0,parseInt(c.exhaustion)||0))*-2;
  if(formula.useSpellAtk!=null&&formula.useSpellAtk!==undefined){
    const sc=(c.spellClasses||[])[formula.useSpellAtk];
    if(sc){
      const allCls=(c.classes&&c.classes.length>0?c.classes:[{nm:c.cls||"",lv:"",hd:"d6"}]).filter(function(cl){return (cl.nm||"").trim();});
      const totalLv=allCls.reduce(function(t,cl){return t+(parseInt(cl.lv)||0);},0);
      const pb=(totalLv<1?2:Math.ceil(totalLv/4)+1)+(parseInt((c.pbBonus||"").replace("+",""))||0);
      const abl=sc.abl||"INT";
      const base2=parseInt((c.statsBase&&c.statsBase[abl])||c.stats[abl])||10;
      const bon2=parseInt((c.statsBon&&c.statsBon[abl])||0)||0;
      const mod=Math.floor((base2+bon2-10)/2);
      const atkBon=sc.atkBonusFormula?computeBonusFromFormula(sc.atkBonusFormula,c):(parseInt((sc.atkBonus||"").replace("+",""))||0);
      // Character's exhaustion reduces their spell attack bonus
      spellAtkPart=pb+mod+atkBon+charExhPen;
    }
  }
  return base+crAblSum+spLvlPart+spellAtkPart+crProf;
}

function CreatureFormulaModal({c,creature,spellLevel,initialFormula,onApply,onClose,title,onClear,hideProfRows,hideCrtrProf}){
  const allClasses=(c.classes&&c.classes.length>0?c.classes:[{nm:c.cls||"",lv:"",hd:"d6"}]).filter(function(cl){return (cl.nm||"").trim();});

  const pb=(totalLv<1?2:Math.ceil(totalLv/4)+1)+(parseInt((c.pbBonus||"").replace("+",""))||0);
  const getCharMod=function(abl){var base=parseInt((c.statsBase&&c.statsBase[abl])||c.stats[abl])||10;var bon=parseInt((c.statsBon&&c.statsBon[abl])||0)||0;return Math.floor((base+bon-10)/2);};
  const crStats=(creature&&creature.stats)||{STR:10,DEX:10,CON:10,INT:10,WIS:10,CHA:10};
  const _resolveCrStat=function(v){if(v&&typeof v==="string"&&v.startsWith("@")){var a=v.slice(1);var base=parseInt((c.statsBase&&c.statsBase[a])||c.stats[a])||10;var bon=parseInt((c.statsBon&&c.statsBon[a])||0)||0;return base+bon;}return v===""||v==null?0:parseInt(v)||0;};
  const getCrMod=function(abl){return Math.floor((_resolveCrStat(crStats[abl])-10)/2);};

  // Migrate old formula

    if(!f) return {flat:"",charAbls:[],creatureAbls:[],profs:[],lvlEntries:[],spellLevelMult:0,useSpellAtk:null};

      flat:f.flat||"",

      <div onClick={onAdd} style={{cursor:"pointer",padding:"3px 8px",fontFamily:"'Cinzel',serif",fontSize:9,color:color}}>
        {label}{count>1&&<span style={{marginLeft:3,fontSize:8,opacity:.8}}>×{count}</span>}
      </div>

        <div style={{fontFamily:"'Cinzel',serif",fontSize:11,letterSpacing:2,color:"rgba(201,150,42,.8)",textTransform:"uppercase",marginBottom:16,borderBottom:"1px solid rgba(201,150,42,.15)",paddingBottom:8}}>{title||"Formula"}</div>

        {row("Flat",<input value={formula.flat||""} onChange={function(e){setF("flat",e.target.value);}} placeholder="0"
          style={{width:56,background:"transparent",border:"none",borderBottom:"1px solid rgba(201,150,42,.35)",color:"var(--gold-l)",fontFamily:"'Cinzel',serif",fontSize:16,textAlign:"center",outline:"none"}} />)}

        {row("Char Ability",["STR","DEX","CON","INT","WIS","CHA"].map(function(abl){
          var count=(formula.charAbls||[]).filter(function(x){return x===abl;}).length;
          return counterChip(abl+" ("+getCharMod(abl)+")",count,
            function(){setF("charAbls",[...(formula.charAbls||[]),abl]);},
            function(){var cur=formula.charAbls||[];var idx=cur.lastIndexOf(abl);if(idx>=0){var n=[...cur];n.splice(idx,1);setF("charAbls",n);}},
            "rgba(56,178,172,1)","ca-"+abl);
        }))}

        {row("Crtr Ability",["STR","DEX","CON","INT","WIS","CHA"].map(function(abl){
          var count=(formula.creatureAbls||[]).filter(function(x){return x===abl;}).length;
          return counterChip(abl+" ("+getCrMod(abl)+")",count,
            function(){setF("creatureAbls",[...(formula.creatureAbls||[]),abl]);},
            function(){var cur=formula.creatureAbls||[];var idx=cur.lastIndexOf(abl);if(idx>=0){var n=[...cur];n.splice(idx,1);setF("creatureAbls",n);}},
            "rgba(172,130,56,1)","cra-"+abl);
        }))}

        {!hideProfRows&&row("Char Prof",<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {["half","half-up","full"].map(function(p){
            var count=(formula.profs||[]).filter(function(x){return x===p;}).length;
            return counterChip(profLabelFn(p),count,
              function(){setF("profs",[...(formula.profs||[]),p]);},
              function(){var cur=formula.profs||[];var idx=cur.lastIndexOf(p);if(idx>=0){var n=[...cur];n.splice(idx,1);setF("profs",n);}},

        {!(hideProfRows||hideCrtrProf)&&row("Crtr Prof",<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {["half","half-up","full"].map(function(p){
            var crLabel=p==="full"?"Crtr Prof (+"+crPbVal+")":p==="half-up"?"½↑ Crtr ("+Math.ceil(crPbVal/2)+")":"½↓ Crtr ("+Math.floor(crPbVal/2)+")";
            var count=(formula.creatureProfs||[]).filter(function(x){return x===p;}).length;
            return counterChip(crLabel,count,
              function(){setF("creatureProfs",[...(formula.creatureProfs||[]),p]);},

            onBlur={function(){if(formula.spellLevelMult===""||formula.spellLevelMult==null)setF("spellLevelMult",0);}}
            style={{width:52,background:"rgba(0,0,0,.3)",border:"none",borderBottom:"1px solid rgba(184,154,240,.3)",color:"var(--arcane-l)",fontFamily:"'Cinzel',serif",fontSize:12,textAlign:"center",outline:"none"}} />
          {(parseFloat(formula.spellLevelMult)||0)!==0&&<span style={{fontFamily:"'Cinzel',serif",fontSize:10,color:"rgba(184,154,240,.5)"}}>= {spLvlPart} (at SL {spellLevel||0})</span>}
        </div>)}

        {spCls.length>0&&row("Spell Atk",<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {[{label:"—",idx:null},...spCls.map(function(sc,i){return {label:(sc.nm||"Spell "+(i+1))+" Atk",idx:i};})].map(function(opt){

            var col="rgba(123,79,207,1)";
            return <div key={"sa-"+opt.idx} onClick={function(){setF("useSpellAtk",opt.idx);}}
              style={{cursor:"pointer",padding:"3px 9px",borderRadius:10,
                background:active?col.replace(",1)",",0.15)"):col.replace(",1)",",0.04)"),
                border:"1px solid "+(active?col.replace(",1)",",0.55)"):col.replace(",1)",",0.15)")),
                fontFamily:"'Cinzel',serif",fontSize:9,

function LimitBlock({lim,idx,onChange,onDelete,isOnly,c}){
  const [showCalc,setShowCalc]=React.useState(false);

  // Live-recompute from formula whenever character state changes
  const computeFromFormula=function(formula){
    if(!formula) return null;
    const allCls=(c.classes&&c.classes.length>0?c.classes:[{nm:c.cls||"",lv:"",hd:"d6"}]).filter(function(cl){return (cl.nm||"").trim();});
    const totalLv=allCls.reduce(function(t,cl){return t+(parseInt(cl.lv)||0);},0);
    const pb2=(function(){var base=totalLv<1?2:Math.ceil(totalLv/4)+1;return base+(parseInt((c.pbBonus||"").replace("+",""))||0);})();
    const getMod2=function(abl){var base=parseInt((c.statsBase&&c.statsBase[abl])||c.stats[abl])||10;var bon=parseInt((c.statsBon&&c.statsBon[abl])||0)||0;return Math.floor((base+bon-10)/2);};
    const flat=parseInt((formula.flat||"").replace("+",""))||0;
    const ablSum=(formula.abls||[]).reduce(function(t,a){return t+getMod2(a);},0);
    // Support both new profs[] array and legacy prof string
    const profSum=(function(){
      if(formula.profs&&formula.profs.length>0){
        return formula.profs.reduce(function(t,p){return t+(p==="full"?pb2:p==="half-up"?Math.ceil(pb2/2):p==="half"?Math.floor(pb2/2):0);},0);
      }
      var p=formula.prof||"none";
      return p==="full"?pb2:p==="half-up"?Math.ceil(pb2/2):p==="half"?Math.floor(pb2/2):0;
    })();
    // Support both new lvlEntries[] array and legacy lvlType/lvlClass
    const lvlSum=(function(){
      if(formula.lvlEntries&&formula.lvlEntries.length>0){
        return formula.lvlEntries.reduce(function(t,e){
          var type=e.type||"none";
          if(type==="total-full") return t+totalLv;
          if(type==="total-half-down") return t+Math.floor(totalLv/2);
          if(type==="total-half-up") return t+Math.ceil(totalLv/2);
          var cl=allCls.find(function(x){return x.nm===e.cls;});
          var clLv=cl?parseInt(cl.lv)||0:0;
          if(type==="class-full") return t+clLv;
          if(type==="class-half-down") return t+Math.floor(clLv/2);
          if(type==="class-half-up") return t+Math.ceil(clLv/2);
          return t;
        },0);
      }
      if(formula.lvlType==="total-full") return totalLv;
      if(formula.lvlType==="total-half-down") return Math.floor(totalLv/2);
      if(formula.lvlType==="total-half-up") return Math.ceil(totalLv/2);
      if(formula.lvlType==="class-full"){var cl=allCls.find(function(x){return x.nm===formula.lvlClass;});return cl?parseInt(cl.lv)||0:0;}
      if(formula.lvlType==="class-half-down"){var cl2=allCls.find(function(x){return x.nm===formula.lvlClass;});return cl2?Math.floor((parseInt(cl2.lv)||0)/2):0;}
      if(formula.lvlType==="class-half-up"){var cl3=allCls.find(function(x){return x.nm===formula.lvlClass;});return cl3?Math.ceil((parseInt(cl3.lv)||0)/2):0;}
      return 0;
    })();
    return Math.max(1,flat+ablSum+profSum+lvlSum);
  };

  const formulaResult=lim.usesFormula?computeFromFormula(lim.usesFormula):null;
  const maxUses=formulaResult!==null?formulaResult:(parseInt(lim.uses)||0);
  const expended=parseInt(lim.exp)||0;
  const remaining=Math.max(0,maxUses-expended);
  const pipCol=maxUses===0?"#4a9c5c":remaining>maxUses*0.6?"#4a9c5c":remaining>maxUses*0.3?"#c9962a":"#c94a2a";
  const ch=(f,v)=>onChange(idx,f,v);
  return (
  <>
    <div style={{marginBottom:6,padding:"8px 10px",background:"rgba(201,74,42,.05)",borderRadius:2,border:"1px solid rgba(201,74,42,.15)",position:"relative"}}>
      <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6,flexWrap:"wrap"}}>
        <input value={lim.name||""} onChange={e=>ch("name",e.target.value)} placeholder="Limit name (e.g. Fireball)..."
          style={{flex:1,minWidth:100,background:"transparent",border:"none",borderBottom:"1px solid rgba(201,74,42,.3)",color:"var(--ember)",fontFamily:"'Cinzel',serif",fontSize:11,outline:"none",padding:"1px 0 3px"}} />
        {!isOnly&&<button onClick={()=>window.__confirm("Delete this feature?",()=>onDelete(idx))} style={{background:"transparent",border:"none",color:"rgba(201,74,42,.4)",cursor:"pointer",fontSize:12,padding:0,flexShrink:0}}>x</button>}
      </div>
      <div style={{display:"flex",gap:10,alignItems:"flex-end",flexWrap:"wrap"}}>
        <div style={{display:"flex",flexDirection:"column",gap:2}}>
          <label className="fl" style={{fontSize:8}}>Max Uses</label>
          <input value={formulaResult!==null?maxUses:(lim.uses||"")} readOnly onChange={function(){}} onClick={function(){setShowCalc(true);}} placeholder="0"
            style={{width:48,background:"transparent",border:"none",borderBottom:"1px solid rgba(201,150,42,.35)",color:formulaResult!==null?"rgba(201,150,42,.5)":"var(--gold-l)",fontFamily:"'Cinzel',serif",fontSize:16,textAlign:"center",outline:"none",cursor:"pointer"}} />
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:2}}>
          <label className="fl" style={{fontSize:8}}>Expended</label>
          <input value={lim.exp||""} onChange={e=>ch("exp",e.target.value)} placeholder="0"
            style={{width:48,background:"transparent",border:"none",borderBottom:"1px solid rgba(201,74,42,.45)",color:"var(--ember)",fontFamily:"'Cinzel',serif",fontSize:16,textAlign:"center",outline:"none"}} />
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:2,alignItems:"center"}}>
          <label className="fl" style={{fontSize:8}}>Remaining</label>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:20,fontWeight:700,color:pipCol,lineHeight:1}}>{maxUses>0?remaining:"-"}</div>
        </div>
        {maxUses>0&&maxUses<=20&&(
          <div style={{display:"flex",gap:3,alignItems:"center",flexWrap:"wrap",flex:1,minWidth:60}}>
            {Array.from({length:maxUses}).map(function(_,pi){
              const used=pi<expended;
              return <div key={pi} style={{width:12,height:12,borderRadius:2,border:"1px solid "+(used?"rgba(201,74,42,.5)":"rgba(201,150,42,.4)"),background:used?"rgba(201,74,42,.35)":"rgba(201,150,42,.12)",cursor:"pointer",transition:"all .15s"}} onClick={function(){ch("exp",used?Math.max(0,expended-1):Math.min(maxUses,expended+1));}} title={used?"Click to restore":"Click to expend"} />;
            })}
          </div>
        )}
        <div style={{display:"flex",flexDirection:"column",gap:2}}>
          <label className="fl" style={{fontSize:8}}>Die</label>
          <select value={lim.die||"NO"} onChange={e=>ch("die",e.target.value)}
            style={{background:"#1a1410",border:"1px solid rgba(123,79,207,.35)",color:"var(--arcane-l)",fontFamily:"'Cinzel',serif",fontSize:11,padding:"2px 4px",cursor:"pointer",outline:"none",borderRadius:2}}>
            {DIE_OPTS.map(d=><option key={d} value={d}>{d}</option>)}
          </select>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:2}}>
          <label className="fl" style={{fontSize:8}}>Recharge</label>
          <div style={{display:"flex",gap:4,alignItems:"center"}}>
            <TipInput value={lim.recharge||""} onChange={e=>ch("recharge",e.target.value)} placeholder="Long Rest"
              style={{width:78,background:"transparent",border:"none",borderBottom:"1px solid rgba(201,150,42,.2)",color:"rgba(232,213,176,.55)",fontFamily:"'EB Garamond',serif",fontSize:13,textAlign:"center",outline:"none"}} />
            <div onClick={()=>ch("exp","0")}
              style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:.5,color:"rgba(74,156,92,.7)",border:"1px solid rgba(74,156,92,.3)",padding:"2px 5px",borderRadius:2,flexShrink:0,transition:"all .15s",userSelect:"none"}} title="Click to recharge (reset expended to 0)">↺</div>
          </div>
        </div>
      </div>
    </div>
    {showCalc&&<UsesCalcModal lim={lim} c={c} onClose={function(){setShowCalc(false);}} onApply={function(total,formula){if(total===null){onChange(idx,"__full__",{...lim,uses:"",usesFormula:null});}else{onChange(idx,"__full__",{...lim,uses:""+total,usesFormula:formula});}setShowCalc(false);}} />}
  </>
  );
}

// ─── Tool Proficiency Reference (XGE p78) ─────────────────────────────────────
const TOOL_DATA=[
  {n:"Alchemist's Supplies",d:"Artisan's Tools · 50 gp · 8 lb · Ability: Intelligence\n\nAlchemist's supplies enable a character to produce useful concoctions, such as acid or alchemist's fire.\n\nComponents. Two glass beakers, a metal frame to hold a beaker over a flame, a glass stirring rod, a small mortar and pestle, and a pouch of common alchemical ingredients (salt, powdered iron, purified water).\n\nUtilize (2024). Identify a substance (DC 15), or start a fire (DC 15).\n\nSample DCs (2014). Puff of thick smoke 10 · Identify a poison 10 · Identify a substance 15 · Start a fire 15 · Neutralize acid 20.\n\nCraft (2024). Acid, Alchemist's Fire, Component Pouch, Oil, Paper, Perfume.\n\nExamples of Advantage on a Roll\n\nArcana. Unlock more information on Arcana checks involving potions and similar materials.\n\nInvestigation. Additional insight into any chemicals or substances used in an area.\n\nTool Features\n\nAlchemical Crafting (2014). Spend money to collect raw materials (1 lb per 50 gp). As part of a long rest, make one dose of acid, alchemist's fire, antitoxin, oil, perfume, or soap; subtract half the created item's value from your raw materials."},
  {n:"Brewer's Supplies",d:"Artisan's Tools · 20 gp · 9 lb · Ability: Intelligence\n\nBrewing produces beer and also purifies water. Takes weeks of fermentation but only a few hours of work.\n\nComponents. A large glass jug, a quantity of hops, a siphon, and several feet of tubing.\n\nUtilize (2024). Detect poisoned drink (DC 15), or identify alcohol (DC 10).\n\nSample DCs (2014). Detect poison/impurities in a drink 10 · Identify alcohol 15 · Ignore effects of alcohol 20.\n\nCraft (2024). Antitoxin.\n\nExamples of Advantage on a Roll\n\nHistory. Additional insight on History checks concerning events involving alcohol.\n\nMedicine. Insight when treating alcohol poisoning or using alcohol to dull pain.\n\nPersuasion. Ply someone with drink to mellow their mood.\n\nTool Features\n\nPotable Water (2014). Purify up to 6 gallons of water on a long rest, or 1 gallon on a short rest."},
  {n:"Calligrapher's Supplies",d:"Artisan's Tools · 10 gp · 5 lb · Ability: Dexterity\n\nCalligraphy treats writing as a delicate, beautiful art, hard to forge.\n\nComponents. Ink, a dozen sheets of parchment, and three quills.\n\nUtilize (2024). Write text with impressive flourishes that guard against forgery (DC 15).\n\nSample DCs (2014). Identify writer of nonmagical script 10 · Determine writer's state of mind 15 · Spot forged text 15 · Forge a signature 20.\n\nCraft (2024). Ink, Spell Scroll.\n\nExamples of Advantage on a Roll\n\nArcana. Aid in identifying who wrote a script of a magical nature.\n\nHistory. Augment checks to analyze or investigate ancient writings, scrolls, runes, or frescoes.\n\nTool Features\n\nDecipher Treasure Map (2014). Expertise examining maps — determine a map's age, hidden messages, or similar facts."},
  {n:"Carpenter's Tools",d:"Artisan's Tools · 8 gp · 6 lb · Ability: Strength\n\nSkill at carpentry enables building wooden structures — a house, shack, cabinet, or similar.\n\nComponents. A saw, hammer, nails, hatchet, square, ruler, adze, plane, and chisel.\n\nUtilize (2024). Seal or pry open a door or container (DC 20).\n\nSample DCs (2014). Build a simple structure 10 · Design a complex structure 15 · Find a weak point in a wooden wall 15 · Pry apart a door 20.\n\nCraft (2024). Club, Greatclub, Quarterstaff, Barrel, Chest, Ladder, Pole, Portable Ram, Torch.\n\nExamples of Advantage on a Roll\n\nHistory. Identify the use and origin of wooden buildings and large wooden objects.\n\nInvestigation. Insight inspecting wooden structures; you know tricks that conceal areas.\n\nPerception. Spot irregularities in wooden walls or floors (trap doors, secret passages).\n\nStealth. Assess weak spots in a wooden floor to avoid creaks.\n\nTool Features\n\nFortify (2014). 1 minute + materials to make a door or window harder to force (DC to open +5).\n\nTemporary Shelter (2014). As part of a long rest, build a lean-to that collapses 1d3 days later."},
  {n:"Cartographer's Tools",d:"Artisan's Tools · 15 gp · 6 lb · Ability: Wisdom\n\nCreate accurate maps, from mountain ranges to dungeon levels.\n\nComponents. A quill, ink, parchment, a pair of compasses, calipers, and a ruler.\n\nUtilize (2024). Draft a map of a small area (DC 15).\n\nSample DCs (2014). Determine a map's age and origin 10 · Estimate direction/distance to a landmark 15 · Discern a map is fake 15 · Fill in a missing part 20.\n\nCraft (2024). Map.\n\nExamples of Advantage on a Roll\n\nArcana, History, Religion. Unearth detailed information — spot hidden messages, identify when a map was made, etc.\n\nNature. Answer questions relating to surrounding terrain.\n\nSurvival. Find paths to civilization, predict settlements, avoid getting lost.\n\nTool Features\n\nCraft a Map (2014). Draw a map as you travel, in addition to other activity."},
  {n:"Cobbler's Tools",d:"Artisan's Tools · 5 gp · 5 lb · Ability: Dexterity\n\nA good pair of boots sees a character across rugged wilderness and deadly dungeons.\n\nComponents. A hammer, awl, knife, shoe stand, cutter, spare leather, and thread.\n\nUtilize (2024). Modify footwear to give Advantage on the wearer's next Dexterity (Acrobatics) check (DC 10).\n\nSample DCs (2014). Determine a shoe's age and origin 10 · Find a hidden compartment in a boot heel 15.\n\nCraft (2024). Climber's Kit.\n\nExamples of Advantage on a Roll\n\nArcana, History. Identify magical properties or history of enchanted boots.\n\nInvestigation. Learn where someone recently visited by examining wear and dirt on shoes.\n\nTool Features\n\nMaintain Shoes (2014). On a long rest, repair companions' shoes; for 24 hours up to six creatures can travel up to 10 hours/day without exhaustion saves.\n\nCraft Hidden Compartment (2014). 8 hours of work adds a compartment (up to 3×1×1 in) to a pair of shoes."},
  {n:"Cook's Utensils",d:"Artisan's Tools · 1 gp · 8 lb · Ability: Wisdom\n\nWith a cook along, meals are much better than hardtack and dried fruit.\n\nComponents. A metal pot, knives, forks, a stirring spoon, and a ladle.\n\nUtilize (2024). Improve food's flavor (DC 10), or detect spoiled or poisoned food (DC 15).\n\nSample DCs (2014). Create a typical meal 10 · Duplicate a meal 10 · Spot poison/impurities in food 15 · Create a gourmet meal 15.\n\nCraft (2024). Rations.\n\nExamples of Advantage on a Roll\n\nHistory. Assess social patterns in a culture's eating habits.\n\nMedicine. Transform bitter or sour medicine into a pleasing concoction.\n\nSurvival. Make do with scavenged ingredients others couldn't use.\n\nTool Features\n\nPrepare Meals (2014). As part of a short rest, you and up to five creatures regain 1 extra hit point per Hit Die spent, given food and your utensils."},
  {n:"Disguise Kit",d:"Tool · 25 gp · 3 lb · Ability: Charisma\n\nAdopt a false identity.\n\nComponents. Cosmetics, hair dye, small props, and a few pieces of clothing.\n\nUtilize (2024). Apply makeup (DC 10).\n\nSample DCs (2014). Cover injuries/marks 10 · Spot a disguise on someone else 15 · Copy a humanoid's appearance 20.\n\nCraft (2024). Costume.\n\nExamples of Advantage on a Roll\n\nDeception. A disguise can improve convincing lies.\n\nIntimidation. The right disguise can make you look more fearsome.\n\nPerformance. A cunning disguise can enhance a performance.\n\nPersuasion. Disguised as an authority figure, persuasion is more effective.\n\nTool Features\n\nCreate Disguise (2014). As part of a long rest; takes 1 minute to don. Carry only one without drawing attention (each weighs 1 lb). 10 min for moderate changes, 30 min for extensive."},
  {n:"Forgery Kit",d:"Tool · 15 gp · 5 lb · Ability: Dexterity\n\nDuplicate documents and copy a person's seal or signature.\n\nComponents. Several inks, parchments and papers, quills, seals and sealing wax, gold and silver leaf, and small tools to sculpt wax.\n\nUtilize (2024). Mimic 10 or fewer words of someone else's handwriting (DC 15), or duplicate a wax seal (DC 20).\n\nSample DCs (2014). Mimic handwriting 15 · Duplicate a wax seal 20.\n\nExamples of Advantage on a Roll\n\nArcana. Determine if a magic item is real or fake.\n\nDeception. A well-crafted forgery lends credence to a lie.\n\nHistory. Create fake historical documents or tell if an old document is authentic.\n\nInvestigation. Determine how an object was made and whether it is genuine.\n\nOther Tools. Combine with other tool proficiencies (e.g. cartographer's) for more believable forgeries.\n\nTool Features\n\nQuick Fake (2014). Short rest: a one-page forged document. Long rest: up to four pages. Your check sets the DC to spot it."},
  {n:"Gaming Set",d:"Cost: 1 sp · Ability: Wisdom\n\nProficiency applies to one type of game (e.g. Three-Dragon Ante or dice games).\n\nComponents. All pieces needed for a specific game — a deck of cards or a board and tokens.\n\nUtilize (2024). Discern whether someone is cheating (DC 10), or win the game (DC 20).\n\nSample DCs (2014). Catch a player cheating 15 · Gain insight into an opponent's personality 15.\n\nExamples of Advantage on a Roll\n\nHistory. Knowledge of a game's history and figures connected to it.\n\nInsight. Playing games reveals personality, helping you read lies and mood.\n\nSleight of Hand. Cheat by swapping pieces, palming cards, or altering a die; or distract for a pickpocket attempt."},
  {n:"Glassblower's Tools",d:"Artisan's Tools · 30 gp · 5 lb · Ability: Intelligence\n\nShape glass and know the methods used to produce glass objects.\n\nComponents. A blowpipe, a small marver, blocks, and tweezers. You need a source of heat.\n\nUtilize (2024). Discern what a glass object held in the past 24 hours (DC 15).\n\nSample DCs (2014). Identify source of glass 10 · Determine what a glass object once held 20.\n\nCraft (2024). Glass Bottle, Magnifying Glass, Spyglass, Vial.\n\nExamples of Advantage on a Roll\n\nArcana, History. Examine glass objects such as potion bottles or treasure-hoard glass; residue or deformation can hint at a potion's effects.\n\nInvestigation. Aid when clues include broken glass or glass objects.\n\nTool Features\n\nIdentify Weakness (2014). 1 minute of study identifies weak points; damage to a weak spot is doubled."},
  {n:"Herbalism Kit",d:"Tool · 5 gp · 3 lb · Ability: Intelligence\n\nIdentify plants and safely collect their useful elements.\n\nComponents. Pouches to store herbs, clippers and leather gloves, a mortar and pestle, and several glass jars.\n\nUtilize (2024). Identify a plant (DC 10).\n\nSample DCs (2014). Find plants 15 · Identify poison 20.\n\nCraft (2024). Antitoxin, Candle, Healer's Kit, Potion of Healing.\n\nExamples of Advantage on a Roll\n\nArcana. Insight into magical studies dealing with plants and identifying potions.\n\nInvestigation. Pick out details and clues in plant-overgrown areas.\n\nMedicine. Treat illnesses and wounds with medicinal plants.\n\nNature and Survival. Identify plants and spot food in the wild.\n\nTool Features\n\nIdentify Plants (2014). Identify most plants with a quick inspection."},
  {n:"Jeweler's Tools",d:"Artisan's Tools · 25 gp · 2 lb · Ability: Intelligence\n\nBeautify gems and identify precious stones.\n\nComponents. A small saw and hammer, files, pliers, and tweezers.\n\nUtilize (2024). Discern a gem's value (DC 15).\n\nSample DCs (2014). Modify a gem's appearance 15 · Determine a gem's history 20.\n\nCraft (2024). Arcane Focus, Holy Symbol.\n\nExamples of Advantage on a Roll\n\nArcana. Knowledge of the reputed mystical uses of gems.\n\nInvestigation. Pick out clues in jeweled objects.\n\nTool Features\n\nIdentify Gems (2014). Identify gems and determine their value at a glance."},
  {n:"Land and Water Vehicles",d:"Handle, repair, and maintain vehicles of that type. Water-vehicle proficiency also covers sailor's knowledge (the sea, knots, weather).\n\nSample DCs (2014). Navigate rough terrain/waters 10 · Assess a vehicle's condition 15 · Take a tight corner at high speed 20.\n\nExamples of Advantage on a Roll\n\nArcana. Uncover lore or determine how a magic vehicle operates.\n\nInvestigation, Perception. Notice things others miss when inspecting a vehicle.\n\nTool Features\n\nVehicle Handling (2014). While piloting, apply your proficiency bonus to the vehicle's AC and saving throws."},
  {n:"Leatherworker's Tools",d:"Artisan's Tools · 5 gp · 5 lb · Ability: Dexterity\n\nLore concerning animal hides and leather goods.\n\nComponents. A knife, a small mallet, an edger, a hole punch, thread, and leather scraps.\n\nUtilize (2024). Add a design to a leather item (DC 10).\n\nSample DCs (2014). Modify a leather item's appearance 10 · Determine a leather item's history 20.\n\nCraft (2024). Sling, Whip, Hide Armor, Leather Armor, Studded Leather Armor, Backpack, Crossbow Bolt Case, Map or Scroll Case, Parchment, Pouch, Quiver, Waterskin.\n\nExamples of Advantage on a Roll\n\nArcana. Insight inspecting magic items crafted from leather (boots, some cloaks).\n\nInvestigation. Insight studying leather items or related clues.\n\nTool Features\n\nIdentify Hides (2014). Determine the source of leather and techniques used (e.g. dwarven vs halfling methods)."},
  {n:"Mason's Tools",d:"Artisan's Tools · 10 gp · 8 lb · Ability: Strength\n\nCraft stone and brick structures.\n\nComponents. A trowel, hammer, chisel, brushes, and a square.\n\nUtilize (2024). Chisel a symbol or hole in stone (DC 10).\n\nSample DCs (2014). Chisel a small hole in a stone wall 10 · Find a weak point in a stone wall 15.\n\nCraft (2024). Block and Tackle.\n\nExamples of Advantage on a Roll\n\nHistory. Identify a stone building's date, purpose, and likely builder.\n\nInvestigation. Insight inspecting areas within stone structures.\n\nPerception. Spot irregularities in stone walls or floors (trap doors, secret passages).\n\nTool Features\n\nDemolition (2014). Spot weak points in brick walls; deal double damage to such structures with weapon attacks."},
  {n:"Musical Instrument",d:"Familiarity with techniques to play an instrument and knowledge of common songs.\n\nSample DCs (2014). Identify a tune 10 · Improvise a tune 20.\n\nExamples of Advantage on a Roll\n\nHistory. Recall lore related to your instrument.\n\nPerformance. Improve your act by incorporating an instrument.\n\nTool Features\n\nCompose a Tune (2014). As part of a long rest, compose a new tune and lyrics."},
  {n:"Navigator's Tools",d:"Tool · 25 gp · 2 lb · Ability: Wisdom\n\nDetermine a true course by the stars; insight into charts and direction.\n\nComponents. A sextant, compass, calipers, ruler, parchment, ink, and a quill.\n\nUtilize (2024). Plot a course (DC 10), or determine position by stargazing (DC 15).\n\nSample DCs (2014). Plot a course 10 · Discover your position on a nautical chart 15.\n\nExamples of Advantage on a Roll\n\nSurvival. Avoid getting lost; insight into likely roads and settlements.\n\nTool Features\n\nSighting (2014). Determine your position on a nautical chart and the time of day."},
  {n:"Painter's Supplies",d:"Artisan's Tools · 10 gp · 5 lb · Ability: Wisdom\n\nPaint and draw, with an understanding of art history.\n\nComponents. An easel, canvas, paints, brushes, charcoal sticks, and a palette.\n\nUtilize (2024). Paint a recognizable image of something you've seen (DC 10).\n\nSample DCs (2014). Paint an accurate portrait 10 · Create a painting with a hidden message 20.\n\nCraft (2024). Druidic Focus, Holy Symbol.\n\nExamples of Advantage on a Roll\n\nArcana, History, Religion. Uncover lore attached to a work of art.\n\nInvestigation, Perception. Insight when inspecting a painting or visual art.\n\nTool Features\n\nPainting and Drawing (2014). As part of a short or long rest, produce a simple work of art or a quick copy."},
  {n:"Poisoner's Kit",d:"Tool · 50 gp · 2 lb · Ability: Intelligence\n\nApply and create poisons, and treat them.\n\nComponents. Glass vials, a mortar and pestle, chemicals, and a glass stirring rod.\n\nUtilize (2024). Detect a poisoned object (DC 10).\n\nSample DCs (2014). Spot a poisoned object 10 · Determine the effects of a poison 20.\n\nCraft (2024). Basic Poison.\n\nExamples of Advantage on a Roll\n\nHistory. Recall facts about infamous poisonings.\n\nInvestigation, Perception. Edge inspecting poisoned objects or poison-related events.\n\nMedicine. Added insight treating a poison victim.\n\nNature, Survival. Lore about poisonous plants and animals.\n\nTool Features\n\nHandle Poison (2014). Handle and apply a poison without risk of exposing yourself."},
  {n:"Potter's Tools",d:"Artisan's Tools · 10 gp · 3 lb · Ability: Intelligence\n\nCreate ceramic objects, typically pots and vessels.\n\nComponents. Potter's needles, ribs, scrapers, a knife, and calipers.\n\nUtilize (2024). Discern what a ceramic object held in the past 24 hours (DC 15).\n\nSample DCs (2014). Determine what a vessel once held 10 · Create a serviceable pot 15 · Find a weak point in a ceramic object 20.\n\nCraft (2024). Jug, Lamp.\n\nExamples of Advantage on a Roll\n\nHistory. Identify ceramic objects' age and culture of origin.\n\nInvestigation, Perception. Insight inspecting ceramics for clues.\n\nTool Features\n\nReconstruction (2014). From shards, determine an object's original form and purpose."},
  {n:"Smith's Tools",d:"Artisan's Tools · 20 gp · 8 lb · Ability: Strength\n\nWork metal — alter shape, repair damage, or work ingots into items.\n\nComponents. Hammers, tongs, charcoal, rags, and a whetstone.\n\nUtilize (2024). Pry open a door or container (DC 20).\n\nSample DCs (2014). Sharpen a dull blade 10 · Repair a suit of armor 15 · Sunder a nonmagical metal object 15.\n\nCraft (2024). Any Melee weapon (except Club, Greatclub, Quarterstaff, Whip), Medium armor (except Hide), Heavy armor, Ball Bearings, Bucket, Caltrops, Chain, Crowbar, Firearm Bullets, Grappling Hook, Iron Pot, Iron Spikes, Sling Bullets.\n\nExamples of Advantage on a Roll\n\nArcana and History. Insight examining metal objects such as weapons.\n\nInvestigation. Spot clues when an investigation involves armor, weapons, or metalwork.\n\nTool Features\n\nRepair (2014). With tools and an open flame, restore 10 hit points to a damaged metal object per hour of work."},
  {n:"Thieves' Tools",d:"Tool · 25 gp · 1 lb · Ability: Dexterity\n\nPick locks and foil traps; general knowledge of traps and locks.\n\nComponents. A small file, lock picks, a small mirror on a handle, narrow-bladed scissors, and pliers.\n\nUtilize (2024). Pick a lock (DC 15), or disarm a trap (DC 15).\n\nSample DCs (2014). Pick a lock — Varies · Disable a trap — Varies.\n\nExamples of Advantage on a Roll\n\nHistory. Insight about locations renowned for their traps.\n\nInvestigation and Perception. Insight looking for traps via common tell-tale signs.\n\nTool Features\n\nSet a Trap (2014). As part of a short rest, create a trap; your check is the DC to discover or disable it."},
  {n:"Tinker's Tools",d:"Artisan's Tools · 50 gp · 10 lb · Ability: Dexterity\n\nRepair many mundane objects — mend clothes, sharpen a sword, patch chain mail.\n\nComponents. A variety of hand tools, thread, needles, a whetstone, scraps of cloth and leather, and a small pot of glue.\n\nUtilize (2024). Assemble a Tiny item composed of scrap, which falls apart in 1 minute (DC 20).\n\nSample DCs (2014). Temporarily repair a disabled device 10 · Repair an item in half the time 15 · Improvise a temporary item from scraps 20.\n\nCraft (2024). Musket, Pistol, Bell, Bullseye Lantern, Flask, Hooded Lantern, Hunting Trap, Lock, Manacles, Mirror, Shovel, Signal Whistle, Tinderbox.\n\nExamples of Advantage on a Roll\n\nHistory. Determine the age and origin of objects from a few remaining pieces.\n\nInvestigation. Learn how a damaged object was damaged and how long ago.\n\nTool Features\n\nRepair (2014). Restore 10 hit points to a damaged object per hour of work (materials required; metal needs an open flame)."},
  {n:"Weaver's Tools",d:"Artisan's Tools · 1 gp · 5 lb · Ability: Dexterity\n\nCreate cloth and tailor it into clothing.\n\nComponents. Thread, needles, and scraps of cloth. (A loom is too large to transport.)\n\nUtilize (2024). Mend a tear in clothing (DC 10), or sew a Tiny design (DC 10).\n\nSample DCs (2014). Repurpose cloth 10 · Mend a hole in cloth 10 · Tailor an outfit 15.\n\nCraft (2024). Padded Armor, Basket, Bedroll, Blanket, Fine Clothes, Net, Robe, Rope, Sack, String, Tent, Traveler's Clothes.\n\nExamples of Advantage on a Roll\n\nArcana, History. Insight examining cloth objects such as cloaks and robes.\n\nInvestigation. Spot clues others overlook when examining tapestries, upholstery, or clothing.\n\nTool Features\n\nRepair (2014). As part of a short rest, repair a single damaged cloth object.\n\nCraft Clothing (2014). With sufficient cloth and thread, create an outfit as part of a long rest."},
  {n:"Woodcarver's Tools",d:"Artisan's Tools · 1 gp · 5 lb · Ability: Dexterity\n\nCraft intricate objects from wood, such as tokens or arrows.\n\nComponents. A knife, a gouge, and a small saw.\n\nUtilize (2024). Carve a pattern in wood (DC 10).\n\nSample DCs (2014). Craft a small wooden figurine 10 · Carve an intricate pattern in wood 15.\n\nCraft (2024). Club, Greatclub, Quarterstaff, Ranged weapons (except Pistol, Musket, Sling), Arcane Focus, Arrows, Bolts, Druidic Focus, Ink Pen, Needles.\n\nExamples of Advantage on a Roll\n\nArcana, History. Insight examining wooden objects such as figurines or arrows.\n\nNature. Added insight when you examine trees.\n\nTool Features\n\nRepair (2014). As part of a short rest, repair a single damaged wooden object.\n\nCraft Arrows (2014). Short rest: up to five arrows. Long rest: up to twenty. Requires wood on hand."}
];

function ToolReferenceModal({onClose}){
  const {useState:us}=React;
  const [open,setOpen]=us({});
  const [q,setQ]=us("");
  function toggle(n){setOpen(function(e){var x=Object.assign({},e);x[n]=!x[n];return x;});}
  var list=TOOL_DATA.filter(function(t){return !q.trim()||t.n.toLowerCase().indexOf(q.toLowerCase())>=0;});
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",zIndex:100000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>

const SPELL_MD_URL="https://raw.githubusercontent.com/liapatiso95-ctrl/character-sheet/main/spells.md";
const _spellCache={data:null,status:"idle"}; // "idle"|"loading"|"ready"|"error"
const _spellListeners=[];
function _notifySpellListeners(){_spellListeners.forEach(function(fn){fn();});}

// Repo base for compendium JSON folders (spells/, feats/, exploits/, items/).
const REPO_RAW_BASE="https://raw.githubusercontent.com/liapatiso95-ctrl/character-sheet/main/";
// Load every JSON file listed in <folder>/index.json, read one array key from each
// (e.g. "spell"), run them through `convert`, and merge into `target` WITHOUT
// overwriting existing keys (so markdown, loaded first, wins name conflicts).
// `convert` takes the combined array and returns a {key: record} object.
// Calls `onDone` exactly once when finished (success or failure).
function loadCompendiumJsonFolder(folder,arrayKey,convert,target,onDone){
  var base=REPO_RAW_BASE+folder+"/";
  fetch(base+"index.json")
    .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
    .then(function(list){
      var files=Array.isArray(list)?list:(list&&list.files)||[];
      if(!files.length) return null;
      return Promise.all(files.map(function(fn){
        var url=/^https?:\/\//.test(fn)?fn:(base+fn);
        return fetch(url).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});
      })).then(function(datas){
        var combined=[];
        datas.forEach(function(d){
          if(!d) return;
          if(Array.isArray(d[arrayKey])) combined=combined.concat(d[arrayKey]);
          else if(Array.isArray(d)) combined=combined.concat(d); // bare array file
        });
        var conv=convert(combined)||{};
        Object.keys(conv).forEach(function(k){if(!target[k])target[k]=conv[k];});
      });
    })
    .catch(function(){})
    .finally(function(){if(onDone)onDone();});
}

function parseSpellMarkdown(md){
  var spells={};
  // Split on #### headings
  var blocks=md.split(/^####\s+/m).slice(1);
  blocks.forEach(function(block){
    var lines=block.split("\n");
    var name=(lines[0]||"").trim();
    if(!name) return;
    // Parse italic line: *3rd-level Abjuration* or *Evocation Cantrip*
    // Also handle ritual tag: *1st-level Divination (ritual)*
    var level=0, school="", ritual=false;
    var italicLine=(lines[1]||"").trim().replace(/^\*|\*$/g,"");
    // Extract (ritual) from anywhere in the italic line
    if(/\(ritual\)/i.test(italicLine)){ritual=true;italicLine=italicLine.replace(/\s*\(ritual\)/i,"").trim();}
    var cantrip=italicLine.match(/^(\w+)\s+Cantrip$/i);
    var leveled=italicLine.match(/^(\d+)(?:st|nd|rd|th)[- ]level\s+(.+)$/i);
    if(cantrip){school=cantrip[1];level=0;}
    else if(leveled){level=parseInt(leveled[1]);school=leveled[2].trim();}
    // Parse key: value fields — handle both **Key:** Value and plain Key Value
    var castingTime="",range="",components="",duration="",conc=false,classes="";
    var descLines=[];
    var pastDuration=false;
    for(var li=2;li<lines.length;li++){
      var ln=lines[li].trim();
      // Stop at any heading (## / ### section dividers between spell groups)
      if(/^#/.test(ln)) break;
      if(!pastDuration){
        // Match **Key:** Value OR plain Key Value (for keys we know)
        var kv=ln.match(/^\*\*([^*]+)\*\*[:\s]+(.+)$/)||ln.match(/^(Casting Time|Range|Components|Duration|Classes)[:\s]+(.+)$/i);
        if(kv){
          var k=kv[1].toLowerCase().trim().replace(/:$/,""), v=kv[2].trim();
          if(k==="casting time"){
            if(/ritual/i.test(v)){ritual=true;v=v.replace(/\s*or\s+ritual|\s*\(?ritual\)?/gi,"").trim();}
            castingTime=v;
          }
          else if(k==="range"){range=v;}
          else if(k==="components"){components=v;}
          else if(k==="classes"){classes=v;}
          else if(k==="duration"){
            if(/concentration/i.test(v)){conc=true;v=v.replace(/concentration,?\s*(up\s+to\s+)?/i,"").trim();}
            duration=v;
            pastDuration=true;
          }
          continue;
        }
        // Only flip to description mode on unrecognised lines if we've seen all 4 fields
        if(ln&&castingTime&&range&&components&&duration&&!pastDuration){pastDuration=true;}
      }
      if(pastDuration){
        var cleaned=ln.replace(/\*\*\*([^*]+)\*\*\*/g,"$1").replace(/\*\*([^*]+)\*\*/g,"$1").replace(/\*([^*]+)\*/g,"$1");
        // Skip layout artifacts like "column", "\column", "page", "\page", "{{...}}"
        if(cleaned&&!/^\\?(column|page)$/i.test(cleaned)&&!/^\{\{/.test(cleaned)){
          // Add blank line before "At Higher Levels" and "Cantrip Scaling"
          if(/^(at higher levels|cantrip scaling)/i.test(cleaned)&&descLines.length>0) descLines.push("");
          descLines.push(cleaned);
        }
      }
    }
    var desc=descLines.join("\n").trim();
    // Skip stub entries that are just a name with no real content
    if(!desc&&!castingTime&&!range&&!components&&!duration&&!school&&!classes) return;
    spells[name.toLowerCase()]={name,level,school,castingTime,range,components,duration,conc,ritual,classes,desc};
  });
  return spells;
}

const _SPELL_SCHOOL={A:"Abjuration",C:"Conjuration",D:"Divination",E:"Enchantment",V:"Evocation",I:"Illusion",N:"Necromancy",T:"Transmutation",P:"Psionic"};
// "1 action", "1 bonus action", "10 minutes", "1 reaction (...)" from time:[{number,unit,condition}].
function _fmtSpellTime(time){
  if(!Array.isArray(time)||!time.length) return "";
  return time.map(function(t){
    var n=t.number!=null?t.number:1;
    var unit=t.unit||"action";
    var s=n+" "+unit+(n===1?"":"s");
    if(t.condition) s+=" ("+strip5eTags(t.condition)+")";
    return s;
  }).join(" or ");
}
// "Self (30-foot cone)", "120 feet", "Touch", "Self" from range:{type,distance:{type,amount}}.
function _fmtSpellRange(range){
  if(!range||typeof range!=="object") return strip5eTags(range||"");
  var d=range.distance||{};
  var amt=d.amount, dtype=d.type;
  function dist(){
    if(dtype==="touch") return "Touch";
    if(dtype==="self") return "Self";
    if(dtype==="sight") return "Sight";
    if(dtype==="unlimited") return "Unlimited";
    if(dtype==="feet") return amt+" feet";
    if(dtype==="miles") return amt+" mile"+(amt===1?"":"s");
    return (amt!=null?amt+" ":"")+(dtype||"");
  }
  var rt=range.type;
  if(rt==="point") return dist();
  if(rt==="self") return "Self";
  if(rt==="touch") return "Touch";
  if(rt==="special") return "Special";
  // Shaped areas: cone/radius/line/sphere/cube/hemisphere — "Self (30-foot cone)" etc.
  if(rt&&dtype==="feet"&&amt!=null) return "Self ("+amt+"-foot "+rt+")";
  return dist();
}
// "V, S, M (a bit of fur)" from components:{v,s,m}.
function _fmtSpellComponents(comp){
  if(!comp||typeof comp!=="object") return strip5eTags(comp||"");
  var parts=[];
  if(comp.v) parts.push("V");
  if(comp.s) parts.push("S");
  if(comp.m){
    if(comp.m===true) parts.push("M");
    else if(typeof comp.m==="string") parts.push("M ("+strip5eTags(comp.m)+")");
    else if(comp.m.text) parts.push("M ("+strip5eTags(comp.m.text)+")");
    else parts.push("M");
  }
  if(comp.r) parts.push("R");
  return parts.join(", ");
}
// Returns {text, conc}. "Instantaneous", "1 minute", "Up to 1 hour", "Until dispelled".
function _fmtSpellDuration(dur){
  if(!Array.isArray(dur)||!dur.length) return {text:"",conc:false};
  var conc=false;
  var text=dur.map(function(d){
    if(d.concentration) conc=true;
    if(d.type==="instant") return "Instantaneous";
    if(d.type==="permanent"){
      var ends=(d.ends||[]).map(function(e){return e==="dispel"?"dispelled":e==="trigger"?"triggered":e;});
      return ends.length?"Until "+ends.join(" or "):"Permanent";
    }
    if(d.type==="special") return "Special";
    if(d.type==="timed"&&d.duration){
      var u=d.duration;
      var amt=u.amount!=null?u.amount:1;
      var unit=u.type||"round";
      return (d.concentration?"":"")+amt+" "+unit+(amt===1?"":"s");
    }
    return d.type||"";
  }).join(", ");
  return {text:text,conc:conc};
}
// Unique class names from classes.fromClassList (+ subclass/variant lists if present).
function _fmtSpellClasses(classes){
  if(!classes||typeof classes!=="object") return "";
  var names=[];
  (classes.fromClassList||[]).forEach(function(c){if(c&&c.name)names.push(c.name);});
  (classes.fromClassListVariant||[]).forEach(function(c){if(c&&c.name)names.push(c.name);});
  // dedupe, preserve order
  var seen={},out=[];
  names.forEach(function(n){var k=n.toLowerCase();if(!seen[k]){seen[k]=1;out.push(n);}});
  return out.join(", ");
}
function convertSpellJson(arr){
  var out={};
  (arr||[]).forEach(function(sp){
    if(!sp||!sp.name) return;
    var level=sp.level||0;
    var school=_SPELL_SCHOOL[(sp.school||"").toUpperCase()]||(sp.school||"");
    var ritual=!!(sp.meta&&sp.meta.ritual);
    var castingTime=_fmtSpellTime(sp.time);
    var range=_fmtSpellRange(sp.range);
    var components=_fmtSpellComponents(sp.components);
    var dd=_fmtSpellDuration(sp.duration);
    var classes=_fmtSpellClasses(sp.classes);
    // Description: entries, then higher-level/cantrip-scaling appended with a blank line.
    var descArr=flatten5eEntries(sp.entries,[]);
    if(sp.entriesHigherLevel&&sp.entriesHigherLevel.length){
      var hl=flatten5eEntries(sp.entriesHigherLevel,[]);
      if(hl.length){descArr.push("");descArr=descArr.concat(hl);}
    }
    var desc=descArr.join("\n").trim();
    out[sp.name.toLowerCase()]={
      name:sp.name,level:level,school:school,castingTime:castingTime,range:range,
      components:components,duration:dd.text,conc:dd.conc,ritual:ritual,classes:classes,desc:desc
    };
  });
  return out;
}

// Returns true if a result's document slug/key indicates official SRD content (2014 or 2024).
// Lenient: accepts known SRD slugs AND anything that isn't a recognised third-party publisher,
// because Open5e's various endpoints tag SRD content with inconsistent slugs (srd / wotc-srd / srd-2014 / srd-2024).
function isSrdDoc(slug){
  slug=(""+(slug||"")).toLowerCase();
  if(!slug) return true; // no slug → assume SRD rather than silently dropping
  // Explicit third-party publishers to exclude
  var thirdParty=["tob","toh","kp","vom","cc","menagerie","a5e","bfrd","dmag","warlock","blackflag","kp-","deepm","tob2","tob3","tob-"];
  for(var i=0;i<thirdParty.length;i++){
    if(slug.indexOf(thirdParty[i])>=0) return false;
  }
  return true;
}

// Open5e SRD spell search — pulls from both v1 (2014 SRD) and v2 (2024 SRD), merged & deduped.
function open5eSpellSearch(query){
  var q=encodeURIComponent(query);
  var v1=fetch("https://api.open5e.com/v1/spells/?search="+q+"&limit=15").then(function(r){return r.ok?r.json():{results:[]};}).catch(function(){return {results:[]};})
    .then(function(json){
      return (json.results||[]).filter(function(sp){return isSrdDoc(sp.document__slug);}).map(function(sp){
        var lvl=parseInt(sp.level_int!==undefined?sp.level_int:sp.level)||0;
        var desc=(sp.desc||"").toString();
        if(sp.higher_level) desc+="\n\nAt Higher Levels. "+sp.higher_level;
        return {name:sp.name,level:lvl,school:sp.school||"",castingTime:sp.casting_time||"",range:sp.range||"",components:sp.components||"",duration:sp.duration||"",conc:!!sp.concentration&&sp.concentration!=="no",ritual:!!sp.ritual&&sp.ritual!=="no",classes:sp.dnd_class||sp.class||"",desc:desc,src:"srd",srdVer:"14"};
      });
    });
  var v2=fetch("https://api.open5e.com/v2/spells/?name__icontains="+q+"&document__key=srd-2024&limit=15").then(function(r){return r.ok?r.json():{results:[]};}).catch(function(){return {results:[]};})
    .then(function(json){
      // Fallback: if the document__key filter yields nothing, try just name filter + client-side SRD filter
      if(!json.results||json.results.length===0){
        return fetch("https://api.open5e.com/v2/spells/?name__icontains="+q+"&limit=20").then(function(r){return r.ok?r.json():{results:[]};}).catch(function(){return {results:[]};})
          .then(function(j2){
            return (j2.results||[]).filter(function(sp){
              var dk=(sp.key||"")+"|"+(sp.document&&(sp.document.key||sp.document.slug)||sp.document||"");
              return dk.toLowerCase().indexOf("2024")>=0;
            });
          });
      }
      return json.results;
    })
    .then(function(results){
      return (results||[]).map(function(sp){
        var lvl=typeof sp.level==="number"?sp.level:(parseInt(sp.level_int!==undefined?sp.level_int:sp.level)||0);
        var school=sp.school&&sp.school.name?sp.school.name:(typeof sp.school==="string"?sp.school:"");
        var desc=(sp.desc||"").toString();
        if(sp.higher_level) desc+="\n\nAt Higher Levels. "+sp.higher_level;
        var comp=[];if(sp.verbal)comp.push("V");if(sp.somatic)comp.push("S");if(sp.material)comp.push("M"+(sp.material_specified?" ("+sp.material_specified+")":""));
        var compStr=comp.length?comp.join(", "):(typeof sp.components==="string"?sp.components:"");
        return {name:sp.name,level:lvl,school:school,castingTime:sp.casting_time||"",range:sp.range_text||sp.range||"",components:compStr,duration:sp.duration||"",conc:!!sp.concentration,ritual:!!sp.ritual,classes:(sp.classes&&sp.classes.length?sp.classes.map(function(x){return x.name||x;}).join(", "):(sp.dnd_class||"")),desc:desc,src:"srd",srdVer:"24"};
      });
    });
  return Promise.all([v1,v2]).then(function(arrs){
    // Dedup within each version only; keep both 2014 and 2024 versions of the same spell
    function dedup(arr){var seen={};return arr.filter(function(sp){var k=sp.name.toLowerCase();if(seen[k])return false;seen[k]=true;return true;});}
    return dedup(arrs[0]).concat(dedup(arrs[1]));
  });
}

// ─── Exploit compendium (laserllama Compendium of Exploits, raw text format) ─────
const EXPLOIT_MD_URL="https://raw.githubusercontent.com/liapatiso95-ctrl/character-sheet/main/exploits.md";
const _exploitCache={data:null,status:"idle"};
const _exploitListeners=[];
function _notifyExploitListeners(){_exploitListeners.forEach(function(fn){fn();});}

// Derive dice cost from an exploit's description text.
// "up to your Proficiency Bonus" => "up to PB"; otherwise "1 die".
function deriveExploitCost(desc){
  var d=(desc||"").toLowerCase();
  if(/up to your proficiency bonus/.test(d)) return "up to PB";
  return "1 die";
}

// Parse the raw laserllama Compendium text. A real entry is any line that is a name,
// immediately followed by a line matching "Nth-degree Exploit". Everything from the line
// after Execution (or after the last header field) until the next entry is the description.
function parseExploitMarkdown(md){
  var out={};
  var rawLines=md.replace(/\r\n/g,"\n").split("\n");
  // Find indices where a "<degree>-degree Exploit" line occurs; the line before it is the name.
  var degRe=/^(\d+)(?:st|nd|rd|th)-degree\s+Exploit\s*$/i;
  var entryStarts=[];
  for(var i=1;i<rawLines.length;i++){
    var m=rawLines[i].trim().match(degRe);
    if(m){
      var nameLine=(rawLines[i-1]||"").trim();
      // Name must be a non-empty, reasonably short line that isn't itself a field/heading
      if(nameLine && nameLine.length<=60 && !/[:.]$/.test(nameLine) && !/^(classes|prerequisites|execution)\b/i.test(nameLine)){
        entryStarts.push({nameIdx:i-1,degIdx:i,degree:parseInt(m[1])});
      }
    }
  }
  for(var e=0;e<entryStarts.length;e++){
    var cur=entryStarts[e];
    var endIdx=(e+1<entryStarts.length)?entryStarts[e+1].nameIdx:rawLines.length;
    var name=rawLines[cur.nameIdx].trim();
    var degree=cur.degree;
    var classes="",prereq="",execution="";
    var descLines=[];
    var sawHeaderField=false;
    for(var li=cur.degIdx+1;li<endIdx;li++){
      var ln=(rawLines[li]||"").trim();
      var kc=ln.match(/^Classes\s*[:：]\s*(.+)$/i);
      var kp=ln.match(/^Prerequisites\s*[:：]\s*(.+)$/i);
      var ke=ln.match(/^Execution\s*[:：]\s*(.+)$/i);
      if(kc){classes=kc[1].trim();sawHeaderField=true;continue;}
      if(kp){prereq=kp[1].trim();sawHeaderField=true;continue;}
      if(ke){execution=ke[1].trim();sawHeaderField=true;continue;}
      // Description lines come after the header fields
      if(sawHeaderField){
        descLines.push(rawLines[li]); // keep original (incl. blank lines for paragraphs)
      }
    }
    // Trim leading/trailing blank lines from description
    while(descLines.length&&!descLines[0].trim()) descLines.shift();
    while(descLines.length&&!descLines[descLines.length-1].trim()) descLines.pop();
    var desc=descLines.join("\n");
    if(!name) continue;
    out[name.toLowerCase()]={name:name,degree:degree,classes:classes,prereq:prereq,execution:execution,cost:deriveExploitCost(desc),desc:desc};
  }
  return out;
}

// ─── 5etools optionalfeature (LaserLlama exploit) JSON → markdown-parser shape ──
// NOTE: the JSON is lossy compared with the hand-authored markdown. Degree, cost,
// prereq and description convert faithfully; Classes and Execution are best-effort
// (the JSON encodes only exploit *families* and Foundry activation data, not the
// specific class list or the markdown's hand-written execution phrasing). When an
// exploit exists in both sources, the markdown wins, so authored entries keep their
// exact fields; only JSON-only exploits use this approximation.
const _EXPLOIT_FAMILY_CLASS={SE:"Barbarian",ME:"Fighter",DE:"Rogue",TE:"Warlord"};
// Pull the degree (1–5) and family classes out of featureType codes like "LL:1ME".
function _exploitDegreeAndClasses(featureType){
  var degree=0; var fams={};
  (featureType||[]).forEach(function(ft){
    var m=(""+ft).match(/(\d)?([SMDT]E)$/); // optional degree digit + family
    if(m){
      if(m[1]&&!degree) degree=parseInt(m[1]);
      var cls=_EXPLOIT_FAMILY_CLASS[m[2]];
      if(cls) fams[cls]=true;
    }
  });
  // Preserve a stable class order
  var order=["Barbarian","Fighter","Rogue","Warlord"];
  var classes=order.filter(function(c){return fams[c];}).join(", ");
  return {degree:degree,classes:classes};
}
// Best-effort execution string from a Foundry activity's activation block.
function _exploitExecution(opt){
  var acts=opt.foundryActivities||[];
  if(!acts.length) return "";
  var a=acts[0]||{};
  var act=a.activation||{};
  // activation may be {type,condition} or flattened "activation.type"
  var type=act.type||a["activation.type"]||"";
  var cond=act.condition||"";
  var label="";
  if(type==="action") label="1 action";
  else if(type==="bonus") label="1 bonus action";
  else if(type==="reaction") label="1 reaction";
  else if(type==="special") label=cond?strip5eTags(cond):"Special";
  else if(type) label="1 "+type;
  if(cond&&type!=="special"&&!/^(special)$/i.test(label)) label+=" ("+strip5eTags(cond)+")";
  return label.trim();
}
function convertExploitJson(arr){
  var out={};
  (arr||[]).forEach(function(opt){
    if(!opt||!opt.name) return;
    var dc=_exploitDegreeAndClasses(opt.featureType);
    var prereq=format5ePrerequisite(opt.prerequisite);
    if(!prereq) prereq="None";
    var desc=flatten5eEntries(opt.entries,[]).join("\n").trim();
    var execution=_exploitExecution(opt);
    out[opt.name.toLowerCase()]={
      name:opt.name,degree:dc.degree,classes:dc.classes,prereq:prereq,
      execution:execution,cost:deriveExploitCost(desc),desc:desc
    };
  });
  return out;
}

function useExploitCompendium(){
  const [tick,setTick]=React.useState(0);

    function onUpdate(){setTick(function(t){return t+1;});}
    _exploitListeners.push(onUpdate);

      fetch(EXPLOIT_MD_URL)

        .then(function(text){var md=parseExploitMarkdown(text);Object.keys(md).forEach(function(k){if(!_exploitCache.data[k])_exploitCache.data[k]=md[k];});})

    }

  },[]);
  return _exploitCache;
}

function SpellNameInput({value, onChange, onAutofill, placeholder, style, spellLevel}){
  const cache=useSpellCompendium();
  const [open,setOpen]=React.useState(false);
  const [rect,setRect]=React.useState(null);
  const inputRef=React.useRef(null);
  const pickingRef=React.useRef(false); // true while mouse is down on dropdown
  const [srdResults,setSrdResults]=React.useState([]);
  const [srdLoading,setSrdLoading]=React.useState(false);
  const debounceRef=React.useRef(null);

  const updateRect=React.useCallback(function(){
    if(inputRef.current){var r=inputRef.current.getBoundingClientRect();setRect({left:r.left,top:r.bottom,width:r.width});}
  },[]);

  // Local (spells.md) matches take priority
  var localMatches=[];
  if(cache.status==="ready"&&cache.data&&(value||"").length>=2){
    var q=(value||"").toLowerCase();
    localMatches=Object.values(cache.data).filter(function(sp){
      return sp.name.toLowerCase().includes(q)&&(spellLevel===undefined||sp.level===spellLevel);
    }).map(function(sp){return Object.assign({},sp,{src:"file"});}).slice(0,8);
  }

  React.useEffect(function(){
    if((value||"").length<2){setSrdResults([]);return;}
    if(debounceRef.current) clearTimeout(debounceRef.current);
    debounceRef.current=setTimeout(function(){
      setSrdLoading(true);
      open5eSpellSearch(value).then(function(res){setSrdResults(res);setSrdLoading(false);}).catch(function(){setSrdResults([]);setSrdLoading(false);});
    },350);
    return function(){if(debounceRef.current) clearTimeout(debounceRef.current);};
  },[value]);

  // Merge: file first, then SRD not already in file (filtered by level if specified)
  // Show both File and SRD results, even when names match — tags distinguish them
  var srdExtra=srdResults.filter(function(sp){return (spellLevel===undefined||sp.level===spellLevel);}).slice(0,8);
  var suggestions=localMatches.concat(srdExtra);

  React.useEffect(function(){

        <div
          onMouseDown={function(){pickingRef.current=true;}}

          style={{position:"fixed",top:rect.top,left:rect.left,zIndex:99999,background:"#1a1208",border:"1px solid rgba(201,150,42,.4)",boxShadow:"0 4px 24px rgba(0,0,0,.9)",minWidth:Math.max(rect.width,220),maxWidth:360,maxHeight:280,overflowY:"auto"}}
        >
          {suggestions.map(function(sp,idx){
            return (
              <div key={sp.name+idx}
                onClick={function(){applySpell(sp);}}
                style={{padding:"6px 10px",cursor:"pointer",borderBottom:"1px solid rgba(201,150,42,.08)",display:"flex",alignItems:"baseline",gap:8}}
              >
                <span style={{fontFamily:"'EB Garamond',serif",fontSize:13,color:"var(--gold-l)",fontWeight:600,flex:1}}>{sp.name}</span>
                <span style={{fontFamily:"'Cinzel',serif",fontSize:9,color:"rgba(184,154,240,.6)",whiteSpace:"nowrap"}}>{sp.level===0?"Cantrip":"Lv "+sp.level}</span>
                <span style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:.5,color:sp.src==="file"?"rgba(74,156,92,.6)":"rgba(96,180,196,.55)",whiteSpace:"nowrap",textTransform:"uppercase"}}>{sp.src==="file"?"File":("SRD"+(sp.srdVer||""))}</span>
              </div>
            );
          })}
          {srdLoading&&<div style={{padding:"6px 10px",fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:1,color:"rgba(201,150,42,.5)",textTransform:"uppercase"}}>Searching SRD…</div>}
        </div>
      )}

}
