      {kind==="feats"&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:8,alignItems:"center"}}>
          <select value={fPrereq} onChange={function(e){setFPrereq(e.target.value);}} style={selStyle}>
            <option value="any">Prereq: Any</option><option value="yes">Has Prerequisite</option><option value="no">No Prerequisite</option>
          </select>
          {fPrereq==="yes"&&<input value={fPrereqText} onChange={function(e){setFPrereqText(e.target.value);}} placeholder="Prereq contains..." style={Object.assign({},inputStyle,{width:170})} />}
          <span style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:1,color:"rgba(232,213,176,.4)",textTransform:"uppercase"}}>Increases:</span>
          {["STR","DEX","CON","INT","WIS","CHA"].map(function(ab){
            var on=fAbilities.indexOf(ab)>=0;
            return <div key={ab} onClick={function(){setFAbilities(function(prev){return prev.indexOf(ab)>=0?prev.filter(function(x){return x!==ab;}):prev.concat([ab]);});}}
              style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:1,padding:"4px 8px",borderRadius:2,userSelect:"none",border:"1px solid "+(on?"var(--gold)":"rgba(201,150,42,.2)"),background:on?"rgba(201,150,42,.15)":"transparent",color:on?"var(--gold-l)":"rgba(232,213,176,.45)"}}>{ab}</div>;
          })}
        </div>
      )}

      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
        <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:1,color:"rgba(232,213,176,.5)",textTransform:"uppercase"}}>
          <input type="checkbox" checked={includeSrd} onChange={function(e){setIncludeSrd(e.target.checked);}} />
          Include SRD
        </label>
        {srdLoading&&<span style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:1,color:"rgba(201,150,42,.5)",textTransform:"uppercase"}}>Searching SRD…</span>}
        <span style={{marginLeft:"auto",fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:1,color:"rgba(232,213,176,.35)"}}>{totalResults} result{totalResults===1?"":"s"}{totalPages>1?" · showing "+(curPage*PER_PAGE+1)+"–"+Math.min(curPage*PER_PAGE+PER_PAGE,totalResults):""}</span>
      </div>

      {/* Results */}
      <div style={{border:"1px solid rgba(201,150,42,.12)",borderRadius:2}}>
        {results.length===0&&<div style={{padding:"20px",textAlign:"center",fontFamily:"'EB Garamond',serif",fontSize:13,fontStyle:"italic",color:"rgba(232,213,176,.3)"}}>No matches. {kind==="spells"&&spellCache.status==="loading"?"Loading spells…":kind==="feats"&&featCache.status==="loading"?"Loading feats…":kind==="items"&&itemCache.status==="loading"?"Loading items…":"Try a different search."}</div>}
        {pageResults.map(function(r,idx){
          var id=r.src+"-"+(r.srdVer||"")+"-"+r.name+"-"+(curPage*PER_PAGE+idx);
          var isOpen=expanded[id];
          var sub="";
          if(kind==="spells") sub=(r.level===0?"Cantrip":"Level "+r.level)+(r.school?" · "+r.school:"")+(r.ritual?" · Ritual":"")+(r.conc?" · Conc":"");
          else if(kind==="items") sub=[r.rarity,r.type,(r.attune===true?"Attunement":""),(r.weight?r.weight+" lb":"")].filter(Boolean).join(" · ");
          else if(kind==="feats") sub=[(r.abilities&&r.abilities.length&&r.abilities.length<6?"+"+r.abilities.join("/"):(r.abilities&&r.abilities.length===6?"+Any":"")),(r.prereq?"Prereq":"")].filter(Boolean).join(" · ");
          var tag=r.src==="file"?"File":("SRD"+(r.srdVer||""));
          var tagCol=r.src==="file"?"rgba(74,156,92,.6)":"rgba(96,180,196,.55)";
          return (
            <div key={id} style={{borderBottom:"1px solid rgba(201,150,42,.07)"}}>
              <div onClick={function(){toggle(id);}} style={{display:"flex",alignItems:"baseline",gap:10,padding:"8px 12px",cursor:"pointer"}}>
                <span style={{fontFamily:"'Cinzel',serif",fontSize:10,color:"rgba(201,150,42,.4)",width:12,flexShrink:0}}>{isOpen?"−":"+"}</span>
                <span style={{fontFamily:"'EB Garamond',serif",fontSize:14,color:"var(--gold-l)",fontWeight:600,flex:1}}>{r.name}</span>
                {sub&&<span style={{fontFamily:"'EB Garamond',serif",fontSize:11,color:"rgba(232,213,176,.4)",whiteSpace:"nowrap"}}>{sub}</span>}
                <span style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:.5,color:tagCol,whiteSpace:"nowrap",textTransform:"uppercase"}}>{tag}</span>
              </div>
              {isOpen&&(
                <div style={{padding:"4px 12px 14px 34px",background:"rgba(0,0,0,.15)"}}>
                  {kind==="spells"&&(
                    <div style={{fontFamily:"'EB Garamond',serif",fontSize:11,color:"rgba(232,213,176,.5)",marginBottom:6,lineHeight:1.6}}>
                      {r.castingTime&&<span>Cast: {r.castingTime} · </span>}{r.range&&<span>Range: {r.range} · </span>}{r.components&&<span>Comp: {r.components} · </span>}{r.duration&&<span>Duration: {r.duration}</span>}
                    </div>
                  )}
                  <div style={{fontFamily:"'EB Garamond',serif",fontSize:13,color:"rgba(232,213,176,.8)",lineHeight:1.7,whiteSpace:"pre-wrap"}}>{r.desc||"(No description)"}</div>
                  <div onClick={function(){var spc=c.spellClasses||[];setAddCls(spc.length>0?(spc[0].nm||""):"");setConfirmAdd(r);}}
                    style={{display:"inline-block",marginTop:10,cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:1.5,textTransform:"uppercase",padding:"5px 14px",borderRadius:2,userSelect:"none",border:"1px solid rgba(74,156,92,.4)",color:"rgba(74,156,92,.85)",background:"rgba(74,156,92,.08)"}}>
                    + Add to {kind==="spells"?"Spell List":kind==="feats"?"Feats":"Inventory"}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Pagination controls */}
      {totalPages>1&&(
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12,marginTop:14}}>
          <div onClick={function(){if(curPage>0)setPage(curPage-1);}}
            style={{cursor:curPage>0?"pointer":"default",fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:1,textTransform:"uppercase",padding:"4px 12px",borderRadius:2,userSelect:"none",border:"1px solid rgba(201,150,42,.2)",color:curPage>0?"var(--gold-l)":"rgba(232,213,176,.2)",opacity:curPage>0?1:.4}}>‹ Prev</div>
          <span style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:1,color:"rgba(232,213,176,.5)"}}>Page {curPage+1} / {totalPages}</span>
          <div onClick={function(){if(curPage<totalPages-1)setPage(curPage+1);}}
            style={{cursor:curPage<totalPages-1?"pointer":"default",fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:1,textTransform:"uppercase",padding:"4px 12px",borderRadius:2,userSelect:"none",border:"1px solid rgba(201,150,42,.2)",color:curPage<totalPages-1?"var(--gold-l)":"rgba(232,213,176,.2)",opacity:curPage<totalPages-1?1:.4}}>Next ›</div>
        </div>
      )}
      {/* Confirm add modal */}
      {confirmAdd&&(
        <div onClick={function(){setConfirmAdd(null);}}
          style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.7)",zIndex:100000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div onClick={function(e){e.stopPropagation();}}
            style={{background:"#1a1410",border:"1px solid rgba(201,150,42,.4)",borderRadius:4,padding:"22px 26px",maxWidth:380,boxShadow:"0 8px 40px rgba(0,0,0,.8)"}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:13,letterSpacing:1,color:"var(--gold-l)",marginBottom:10}}>Add to {kind==="spells"?"Spell List":kind==="feats"?"Feats":"Inventory"}?</div>
            <div style={{fontFamily:"'EB Garamond',serif",fontSize:14,color:"rgba(232,213,176,.7)",marginBottom:18,lineHeight:1.5}}>
              Add <span style={{color:"var(--gold-l)",fontWeight:600}}>{confirmAdd.name}</span>{kind==="spells"&&confirmAdd.level!==undefined?(confirmAdd.level===0?" (cantrip)":" (level "+confirmAdd.level+")"):""} to your {kind==="spells"?"spell list":kind==="feats"?"feats":"main inventory"}?
            </div>
            {kind==="spells"&&(
              <div style={{marginBottom:18}}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:1,color:"rgba(232,213,176,.45)",textTransform:"uppercase",marginBottom:6}}>Add under class</div>
                {(c.spellClasses||[]).length>0?(
                  <select value={addCls} onChange={function(e){setAddCls(e.target.value);}}
                    style={{width:"100%",background:"rgba(0,0,0,.3)",border:"1px solid rgba(201,150,42,.2)",color:"var(--parch)",fontFamily:"'EB Garamond',serif",fontSize:13,outline:"none",padding:"6px 8px",borderRadius:2,cursor:"pointer"}}>
                    {(c.spellClasses||[]).map(function(sc,i){var nm=sc.nm||("Spellcasting "+(i+1));return <option key={i} value={sc.nm||""}>{nm}</option>;})}
                    <option value="">Other Spells</option>
                  </select>
                ):(
                  <div style={{fontFamily:"'EB Garamond',serif",fontSize:12,fontStyle:"italic",color:"rgba(232,213,176,.4)"}}>No spellcasting classes defined — it will be added under "Other Spells".</div>
                )}
              </div>
            )}
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <div onClick={function(){setConfirmAdd(null);}}
                style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:1,textTransform:"uppercase",padding:"6px 14px",borderRadius:2,userSelect:"none",border:"1px solid rgba(232,213,176,.2)",color:"rgba(232,213,176,.5)"}}>Cancel</div>
              <div onClick={function(){doAdd(confirmAdd,addCls);}}
                style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:1,textTransform:"uppercase",padding:"6px 14px",borderRadius:2,userSelect:"none",border:"1px solid rgba(74,156,92,.5)",color:"rgba(74,156,92,.9)",background:"rgba(74,156,92,.12)"}}>Add</div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const PAGES=[
  {label:"I - Character",hideable:false},
  {label:"II - Features",hideable:false},

function CreaturesPage({c,s}){
  const {useState:us}=React;
  const creatures=c.creatures||[];
  const TAGS=["Companion","Summon","Transformation"];
  const ABLS=["STR","DEX","CON","INT","WIS","CHA"];
  const SIZES=["Tiny","Small","Medium","Large","Huge","Gargantuan"];

  const mkCreature=function(tag){return {
    id:Date.now()+Math.random(),tag:tag||"Companion",
    nm:"",subtype:"Beast",size:"Medium",alignment:"Unaligned",
    spellLevel:1,spellClassIdx:0,
    stats:{STR:10,DEX:10,CON:10,INT:10,WIS:10,CHA:10},
    pbFlat:"2",pbFormula:null,
    saveProficiencies:{STR:false,DEX:false,CON:false,INT:false,WIS:false,CHA:false},
    skillProficiencies:[],
    acFlat:"13",acFormula:null,
    hpMax:"40",hpFormula:null,hpCurrent:"",
    speed:"30 ft.",
    resistances:"",immunities:"",vulnerabilities:"",conditionImmunities:"",
    senses:"",languages:"",
    actions:[],reactions:[],bonusActions:[],
    dcs:[],traits:[],
    collapsed:false,editing:true,
    exhaustion:0,
    iniFormula:null,
  };};

  const upd=function(id,field,val){s("creatures",creatures.map(function(cr){return cr.id===id?{...cr,[field]:val}:cr;}));};
  const updNested=function(id,field,idx,subField,val){s("creatures",creatures.map(function(cr){if(cr.id!==id)return cr;var arr=[...cr[field]];arr[idx]={...arr[idx],[subField]:val};return {...cr,[field]:arr};}));};

  // Evaluate formula for a creature (returns numeric)
  const evalF=function(formula,cr){return computeCreatureFormula(formula,{c,creature:cr,spellLevel:cr.spellLevel||1});};
  const fmtAtk=function(n){return n>=0?"+"+n:""+n;};
  // Resolve a creature stat — "@WIS" etc. means use character's live score
  const resolveCreatureStat=function(st,cr){
    var v=cr.stats&&cr.stats[st];
    if(v&&typeof v==="string"&&v.startsWith("@")){
      var charAbl=v.slice(1);
      var base=parseInt((c.statsBase&&c.statsBase[charAbl])||c.stats[charAbl])||10;
      var bon=parseInt((c.statsBon&&c.statsBon[charAbl])||0)||0;
      return base+bon;
    }
    if(v===""||v==null) return 0;
    return parseInt(v)||0;
  };
  const getMod=function(st,cr){return Math.floor((resolveCreatureStat(st,cr)-10)/2);};
  const fmtStat=function(st,cr){
    var v=cr.stats&&cr.stats[st];
    if(v&&typeof v==="string"&&v.startsWith("@")) return resolveCreatureStat(st,cr);
    if(v==null) return 10;
    return v;
  };

  // Exhaustion penalty for creature
  const crExhPen=function(cr){return Math.min(5,Math.max(0,parseInt(cr.exhaustion)||0))*-2;};
  // Initiative display
  const crIniTotal=function(cr){
    var exhP=crExhPen(cr);
    if(cr.iniFormula) return computeCreatureFormula(cr.iniFormula,{c,creature:cr,spellLevel:cr.spellLevel||1})+exhP;
    return getMod("DEX",cr)+exhP;
  };
  // HP display
  const hpDisplay=function(cr){
    if(cr.hpFormula) return evalF(cr.hpFormula,cr)+(cr.hpFormula.spellLevelMult?" (SL "+cr.spellLevel+")":"");
    return "—";
  };
  const acDisplay=function(cr){
    if(cr.acFormula) return evalF(cr.acFormula,cr);
    return "—";
  };

  // Attack computed values
  const atkTotal=function(atk,cr){
    if(!atk.atkFormula) return null;
    // If the formula delegates to the character's spell attack, don't apply creature exhaustion
    var usesSpellAtk=atk.atkFormula.useSpellAtk!=null&&atk.atkFormula.useSpellAtk!==undefined;
    return evalF(atk.atkFormula,cr)+(usesSpellAtk?0:crExhPen(cr));
  };
  const dmgBonus=function(atk,cr){
    if(!atk.dmgFormula) return null;
    return evalF(atk.dmgFormula,cr);
  };

  const tagColor=function(tag){
    return tag==="Summon"?"rgba(123,79,207,1)":tag==="Companion"?"rgba(56,178,172,1)":tag==="Familiar"?"rgba(201,150,42,1)":tag==="Transformation"?"rgba(201,74,42,1)":"rgba(184,154,240,1)";
  };

  // Per-creature edit state for formula modals
  const [atkModal,setAtkModal]=us(null);
  const [acModal,setAcModal]=us(null);
  const [hpModal,setHpModal]=us(null);
  const [hdModal,setHdModal]=us(null);
  const [tfStatModal,setTfStatModal]=us(null); // {crId, abl}
  const [dcModal,setDcModal]=us(null);
  const [pbModal,setPbModal]=us(null);   // crId
  const [skillModal,setSkillModal]=us(null); // crId
  const [crIniModal,setCrIniModal]=us(null); // crId

  const SKILLS=[
    {n:"Acrobatics",a:"DEX"},{n:"Animal Handling",a:"WIS"},{n:"Arcana",a:"INT"},
    {n:"Athletics",a:"STR"},{n:"Deception",a:"CHA"},{n:"History",a:"INT"},
    {n:"Insight",a:"WIS"},{n:"Intimidation",a:"CHA"},{n:"Investigation",a:"INT"},
    {n:"Medicine",a:"WIS"},{n:"Nature",a:"INT"},{n:"Perception",a:"WIS"},
    {n:"Performance",a:"CHA"},{n:"Persuasion",a:"CHA"},{n:"Religion",a:"INT"},
    {n:"Sleight of Hand",a:"DEX"},{n:"Stealth",a:"DEX"},{n:"Survival",a:"WIS"},
  ];

  const crPb=function(cr){
    if(cr.pbFormula) return computeCreatureFormula(cr.pbFormula,{c,creature:cr,spellLevel:cr.spellLevel||1});
    return parseInt(cr.pbFlat)||2;
  };

  return <div>
    <div className="orn">Creatures</div>
    <div style={{marginTop:32}}>
      {creatures.length===0&&<div style={{fontFamily:"'EB Garamond',serif",fontSize:14,color:"rgba(232,213,176,.3)",fontStyle:"italic",textAlign:"center",padding:"32px 0"}}>No creatures added yet. Add a companion, summon or transformation below.</div>}

      {creatures.map(function(cr){
        var col=tagColor(cr.tag);
        var colLight=col.replace(",1)",",0.7)");

        return <div key={cr.id} style={{marginBottom:16,border:"1px solid "+col.replace(",1)",",0.3)"),background:"rgba(0,0,0,.2)",borderRadius:2}}>

          {/* Header bar */}
          <div style={{display:"flex",gap:8,alignItems:"center",padding:"8px 12px",background:col.replace(",1)",",0.08)"),borderBottom:cr.collapsed?"none":"1px solid "+col.replace(",1)",",0.2)")}}>
            <div onClick={function(){upd(cr.id,"collapsed",!cr.collapsed);}} style={{cursor:"pointer",flex:1,display:"flex",gap:8,alignItems:"center"}}>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:1.5,padding:"2px 8px",borderRadius:10,background:col.replace(",1)",",0.15)"),border:"1px solid "+col.replace(",1)",",0.4)"),color:colLight,userSelect:"none"}}>{cr.tag}</span>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:14,fontWeight:600,color:"var(--parch)"}}>{cr.nm||"Unnamed"}</span>

              <span style={{fontFamily:"'Cinzel',serif",fontSize:12,color:"rgba(232,213,176,.5)"}}>{hpDisplay(cr)}</span>
            </div>}
            <button onClick={function(){window.__confirm("Delete this creature?",function(){s("creatures",creatures.filter(function(x){return x.id!==cr.id;}));});}} style={{background:"transparent",border:"none",color:"rgba(201,74,42,.4)",cursor:"pointer",fontSize:14,padding:"0 4px"}}>×</button>
          </div>

          {!cr.collapsed&&<div style={{padding:"14px 16px"}}>

            {/* Identity row */}
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12,alignItems:"flex-end"}}>
              <div style={{display:"flex",flexDirection:"column",gap:2,flex:3,minWidth:100}}>
                <label style={{fontFamily:"'Cinzel',serif",fontSize:7,letterSpacing:1,color:"rgba(201,150,42,.5)",textTransform:"uppercase"}}>Name</label>
                <input value={cr.nm||""} onChange={function(e){upd(cr.id,"nm",e.target.value);}} placeholder="Creature name..."
                  style={{background:"transparent",border:"none",borderBottom:"1px solid rgba(201,150,42,.2)",color:"var(--parch)",fontFamily:"'Cinzel',serif",fontSize:14,outline:"none",padding:"2px 0"}} />
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:2}}>
                <label style={{fontFamily:"'Cinzel',serif",fontSize:7,letterSpacing:1,color:"rgba(201,150,42,.5)",textTransform:"uppercase"}}>Tag</label>
                <select value={cr.tag} onChange={function(e){upd(cr.id,"tag",e.target.value);}}
                  style={{background:"rgba(0,0,0,.4)",border:"none",borderBottom:"1px solid rgba(201,150,42,.2)",color:"var(--parch)",fontFamily:"'Cinzel',serif",fontSize:11,padding:"2px 4px",outline:"none",cursor:"pointer"}}>
                  {TAGS.map(function(t){return <option key={t} value={t} style={{background:"#1a1208"}}>{t}</option>;})}
                </select>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:2}}>
                <label style={{fontFamily:"'Cinzel',serif",fontSize:7,letterSpacing:1,color:"rgba(201,150,42,.5)",textTransform:"uppercase"}}>Size</label>
                <select value={cr.size||"Medium"} onChange={function(e){upd(cr.id,"size",e.target.value);}}
                  style={{background:"rgba(0,0,0,.4)",border:"none",borderBottom:"1px solid rgba(201,150,42,.2)",color:"var(--parch)",fontFamily:"'Cinzel',serif",fontSize:11,padding:"2px 4px",outline:"none",cursor:"pointer"}}>
                  {SIZES.map(function(sz){return <option key={sz} value={sz} style={{background:"#1a1208"}}>{sz}</option>;})}
                </select>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:2,flex:2,minWidth:80}}>
                <label style={{fontFamily:"'Cinzel',serif",fontSize:7,letterSpacing:1,color:"rgba(201,150,42,.5)",textTransform:"uppercase"}}>Type</label>
                <input value={cr.subtype||""} onChange={function(e){upd(cr.id,"subtype",e.target.value);}} placeholder="Beast"
                  style={{background:"transparent",border:"none",borderBottom:"1px solid rgba(201,150,42,.2)",color:"var(--parch)",fontFamily:"'Cinzel',serif",fontSize:11,outline:"none",padding:"2px 0"}} />
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:2,flex:2,minWidth:80}}>
                <label style={{fontFamily:"'Cinzel',serif",fontSize:7,letterSpacing:1,color:"rgba(201,150,42,.5)",textTransform:"uppercase"}}>Alignment</label>
                <input value={cr.alignment||""} onChange={function(e){upd(cr.id,"alignment",e.target.value);}} placeholder="Unaligned"
                  style={{background:"transparent",border:"none",borderBottom:"1px solid rgba(201,150,42,.2)",color:"var(--parch)",fontFamily:"'Cinzel',serif",fontSize:11,outline:"none",padding:"2px 0"}} />
              </div>
              {cr.tag==="Summon"&&<div style={{display:"flex",flexDirection:"column",gap:2,alignItems:"center"}}>
                <label style={{fontFamily:"'Cinzel',serif",fontSize:7,letterSpacing:1,color:col.replace(",1)",",0.6)"),textTransform:"uppercase"}}>Spell Level</label>
                <input type="number" min={1} max={9} value={cr.spellLevel===1&&cr._slEmpty?"":cr.spellLevel||1}
                  onChange={function(e){
                    if(e.target.value==="") upd(cr.id,"_slEmpty",true)||s("creatures",creatures.map(function(x){return x.id===cr.id?{...x,spellLevel:1,_slEmpty:true}:x;}));
                    else s("creatures",creatures.map(function(x){return x.id===cr.id?{...x,spellLevel:Math.min(9,Math.max(1,parseInt(e.target.value)||1)),_slEmpty:false}:x;}));
                  }}
                  onBlur={function(){s("creatures",creatures.map(function(x){return x.id===cr.id?{...x,_slEmpty:false}:x;}));}}
                  style={{width:44,background:"rgba(0,0,0,.3)",border:"none",borderBottom:"1px solid "+col.replace(",1)",",0.4)"),color:colLight,fontFamily:"'Cinzel',serif",fontSize:16,textAlign:"center",outline:"none",fontWeight:700}} />
              </div>}
            </div>

            {/* 5e style stat block separator */}
            <div style={{height:2,background:"linear-gradient(to right,transparent,"+col.replace(",1)",",0.4)")+",transparent)",margin:"4px 0 12px"}} />

            {/* Core stats: AC HP Speed */}
            <div style={{display:"flex",gap:10,marginBottom:12,flexWrap:"wrap",alignItems:"flex-end"}}>
              {/* AC */}
              <div style={{textAlign:"center"}}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:1,color:"rgba(201,150,42,.5)",textTransform:"uppercase",marginBottom:2}}>AC</div>
                <div onClick={function(){setAcModal(cr.id);}} title="Click to configure AC formula"
                  style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:20,fontWeight:700,color:cr.acFormula?"var(--parch)":"rgba(232,213,176,.3)",borderBottom:"1px solid rgba(201,150,42,.15)",paddingBottom:1}}>
                  {acDisplay(cr)}
                </div>
              </div>
              {/* HP */}
              <div>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:1,color:"rgba(201,150,42,.5)",textTransform:"uppercase",marginBottom:2}}>Max HP</div>
                <div onClick={function(){setHpModal(cr.id);}} title="Click to configure HP formula"
                  style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:20,fontWeight:700,color:cr.hpFormula?"#e07060":"rgba(232,213,176,.3)",borderBottom:"1px solid rgba(201,74,42,.15)",paddingBottom:1}}>
                  {hpDisplay(cr)}
                </div>
              </div>
              {/* Hit Dice */}
              <div style={{textAlign:"center"}}>

                    {(function(){if(!cr.hdFormula) return "—"; return evalF(cr.hdFormula,cr);})()}
                  </div>
                  <select value={cr.hdType||"d8"} onChange={function(e){upd(cr.id,"hdType",e.target.value);}}

                    {["d4","d6","d8","d10","d12","d20"].map(function(d){return <option key={d} value={d} style={{background:"#1a1208"}}>{d}</option>;})}
                  </select>
                </div>
              </div>

              {/* Speed */}
              <div style={{flex:1,minWidth:100}}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:1,color:"rgba(201,150,42,.5)",textTransform:"uppercase",marginBottom:2}}>Speed</div>
                <TipInput value={cr.speed||""} onChange={function(e){upd(cr.id,"speed",e.target.value);}} placeholder="30 ft."

              </div>
              {/* Initiative */}
              <div style={{textAlign:"center"}}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:1,color:"rgba(56,178,172,.6)",textTransform:"uppercase",marginBottom:2}}>Initiative</div>
                <div onClick={function(){setCrIniModal(cr.id);}} title="Click to configure initiative formula"
                  style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:20,fontWeight:700,
                    color:cr.iniFormula?"rgba(184,154,240,.9)":"var(--parch)",
                    borderBottom:"1px solid rgba(56,178,172,.2)",paddingBottom:1,minWidth:32,textAlign:"center"}}>
                  {(function(){var v=crIniTotal(cr);return v>=0?"+"+v:""+v;})()}
                </div>
              </div>
              {/* Exhaustion */}
              <div style={{textAlign:"center"}}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:1,color:"rgba(201,150,42,.5)",textTransform:"uppercase",marginBottom:4}}>Exhaustion</div>
                <div style={{display:"flex",gap:3,justifyContent:"center",flexWrap:"wrap",maxWidth:76}}>
                  {[1,2,3,4,5,6].map(function(lv){
                    var crExh=Math.min(6,Math.max(0,parseInt(cr.exhaustion)||0));
                    var active=crExh>=lv;
                    var isDeath=lv===6;
                    return <div key={lv}
                      onClick={function(){upd(cr.id,"exhaustion",crExh===lv?lv-1:lv);}}
                      title={"Level "+lv+(isDeath?" — Death":": -"+(lv*2)+" to attacks, saves & checks")}
                      style={{
                        width:11,height:11,borderRadius:2,cursor:"pointer",flexShrink:0,transition:"all .15s",
                        background:active?(isDeath?"#c94a2a":"rgba(201,150,42,.75)"):"rgba(0,0,0,.3)",
                        border:"1px solid "+(active?(isDeath?"rgba(201,74,42,.9)":"rgba(201,150,42,.65)"):"rgba(201,150,42,.2)"),
                        boxShadow:active&&isDeath?"0 0 6px rgba(201,74,42,.5)":active?"0 0 4px rgba(201,150,42,.3)":"none",
                      }} />;
                  })}
                </div>
                {(function(){
                  var crExh=Math.min(6,Math.max(0,parseInt(cr.exhaustion)||0));
                  if(crExh===0) return <div style={{fontFamily:"'Cinzel',serif",fontSize:8,color:"rgba(232,213,176,.2)",marginTop:3}}>none</div>;
                  if(crExh===6) return <div style={{fontFamily:"'Cinzel',serif",fontSize:8,color:"#c94a2a",fontWeight:700,marginTop:3,letterSpacing:.5}}>DEATH</div>;
                  return <div style={{fontFamily:"'Cinzel',serif",fontSize:8,color:"rgba(201,150,42,.6)",marginTop:3}}>{"-"+(crExh*2)+" all rolls"}</div>;
                })()}
              </div>

            </div>

            {/* Proficiency Bonus */}
            <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:10}}>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:1,color:"rgba(201,150,42,.5)",textTransform:"uppercase"}}>Proficiency Bonus</span>
              <div onClick={function(){setPbModal(cr.id);}} title="Click to configure proficiency bonus"
                style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:16,fontWeight:700,
                  color:cr.pbFormula?"rgba(201,150,42,.5)":"var(--parch)",
                  borderBottom:"1px solid rgba(201,150,42,.2)",paddingBottom:1,minWidth:28,textAlign:"center"}}>
                {crPb(cr)>=0?"+"+crPb(cr):""+crPb(cr)}
              </div>
            </div>

            {/* Ability scores — classic 5e 6-column layout with save prof */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:4,marginBottom:12,background:"rgba(0,0,0,.2)",padding:"8px",borderRadius:2,border:"1px solid rgba(201,150,42,.1)"}}>
              {ABLS.map(function(abl){
                var val=fmtStat(abl,cr);
                var mod=getMod(abl,cr);
                var saveProf=!!(cr.saveProficiencies&&cr.saveProficiencies[abl]);
                var saveBonus=mod+(saveProf?crPb(cr):0)+crExhPen(cr);
                return <div key={abl} style={{textAlign:"center"}}>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:1,color:"rgba(201,150,42,.5)",textTransform:"uppercase",marginBottom:2}}>{abl}</div>
                  {cr.tag==="Transformation"
                    ?(function(){
                        var raw=cr.stats&&cr.stats[abl];
                        var isRef=raw&&typeof raw==="string"&&raw.startsWith("@");
                        var refAbl=isRef?raw.slice(1):null;
                        var display=isRef?resolveCreatureStat(abl,cr):val;
                        return <div onClick={function(){setTfStatModal({crId:cr.id,abl:abl});}}
                          style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:14,fontWeight:600,textAlign:"center",color:isRef?"rgba(184,154,240,.9)":"var(--parch)",borderBottom:"1px solid "+(isRef?"rgba(184,154,240,.25)":"rgba(201,150,42,.15)"),paddingBottom:1,minHeight:20,position:"relative"}}
                          title={isRef?"Linked to character's "+refAbl:"Click to set"}>
                          {display===""||display==null?<span style={{color:"rgba(232,213,176,.2)"}}>0</span>:display}
                          {isRef&&<span style={{position:"absolute",top:-4,right:0,fontFamily:"'Cinzel',serif",fontSize:6,color:"rgba(184,154,240,.5)",letterSpacing:.5}}>{refAbl}</span>}
                        </div>;
                      })()
                    :<input type="text" value={val} placeholder="0" onChange={function(e){var v=e.target.value;if(v===""||/^-?\d*$/.test(v)) upd(cr.id,"stats",{...cr.stats,[abl]:v});}}
                      onBlur={function(e){var v=e.target.value;if(v==="") upd(cr.id,"stats",{...cr.stats,[abl]:""});}}
                      style={{width:"100%",background:"transparent",border:"none",borderBottom:"1px solid rgba(201,150,42,.15)",color:"var(--parch)",fontFamily:"'Cinzel',serif",fontSize:14,fontWeight:600,textAlign:"center",outline:"none"}} />
                  }
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:10,color:"rgba(232,213,176,.45)",marginTop:1}}>{mod>=0?"+"+mod:mod}</div>

                    onClick={function(){upd(cr.id,"saveProficiencies",{...(cr.saveProficiencies||{}),[abl]:!saveProf});}}>
                    <div style={{width:8,height:8,borderRadius:2,border:"1px solid "+(saveProf?"rgba(201,150,42,.7)":"rgba(201,150,42,.2)"),background:saveProf?"rgba(201,150,42,.5)":"transparent",flexShrink:0,transition:"all .15s"}} />
                    <span style={{fontFamily:"'Cinzel',serif",fontSize:9,color:saveProf?"var(--gold-l)":"rgba(232,213,176,.3)"}}>{saveBonus>=0?"+"+saveBonus:saveBonus}</span>
                  </div>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:7,color:"rgba(201,150,42,.3)",letterSpacing:.5,marginTop:1}}>save</div>
                </div>;
              })}
            </div>

            {/* Skills */}
            <div style={{marginBottom:12}}>
              <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:2,color:colLight,textTransform:"uppercase"}}>Skills</div>
                <div onClick={function(){setSkillModal(cr.id);}} style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:8,color:"rgba(201,150,42,.4)",border:"1px dashed rgba(201,150,42,.2)",padding:"1px 7px",borderRadius:2,userSelect:"none"}}>edit</div>
              </div>
              {Object.keys(cr.skillProficiencies||{}).length===0&&!(Array.isArray(cr.skillProficiencies)&&cr.skillProficiencies.length>0)&&<div style={{fontFamily:"'EB Garamond',serif",fontSize:11,color:"rgba(232,213,176,.25)",fontStyle:"italic"}}>No skill proficiencies — click edit to add</div>}
              <div style={{display:"flex",flexDirection:"column",gap:3}}>
                {(function(){
                  var sp=cr.skillProficiencies||[];
                  // Backward compat: array = all prof
                  var entries=Array.isArray(sp)
                    ?sp.map(function(n){return {n:n,level:"prof"};})
                    :Object.entries(sp).map(function(kv){return {n:kv[0],level:kv[1]};});
                  return entries.map(function(e){
                    var sk=SKILLS.find(function(x){return x.n===e.n;});
                    if(!sk) return null;
                    var expert=e.level==="expert";
                    var bonus=getMod(sk.a,cr)+crPb(cr)*(expert?2:1)+crExhPen(cr);
                    return <div key={e.n} style={{display:"flex",gap:6,alignItems:"center"}}>
                      <span style={{fontFamily:"'Cinzel',serif",fontSize:9,fontWeight:600,color:expert?"var(--arcane-l)":"var(--gold-l)",width:120,flexShrink:0}}>{sk.n}{expert?" ×2":""}</span>

                      <span style={{fontFamily:"'Cinzel',serif",fontSize:11,fontWeight:700,color:"var(--parch)"}}>{bonus>=0?"+"+bonus:bonus}</span>
                    </div>;
                  });
                })()}
              </div>
            </div>

            <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:12}}>

                {field:"resistances",label:"Damage Resistances"},
                {field:"immunities",label:"Damage Immunities"},
                {field:"vulnerabilities",label:"Damage Vulnerabilities"},
                {field:"conditionImmunities",label:"Condition Immunities"},
                {field:"senses",label:"Senses"},
                {field:"languages",label:"Languages"},

                return <div key={row.field} style={{display:"flex",gap:8,alignItems:"baseline"}}>

                  <TipInput value={cr[row.field]||""} onChange={function(e){upd(cr.id,row.field,e.target.value);}} placeholder="—"
                    style={{flex:1,background:"transparent",border:"none",borderBottom:"1px solid rgba(201,150,42,.1)",color:"var(--parch)",fontFamily:"'EB Garamond',serif",fontSize:12,outline:"none"}} />
                </div>;
              })}
              {/* Passive Perception — auto-calculated */}
              {(function(){
                var percSkill=SKILLS.find(function(sk){return sk.n==="Perception";});
                var wisMod=getMod("WIS",cr);
                var hasPerc=Array.isArray(cr.skillProficiencies)?(cr.skillProficiencies||[]).indexOf("Perception")>=0:!!(cr.skillProficiencies&&cr.skillProficiencies["Perception"]);
                var expertPerc=!Array.isArray(cr.skillProficiencies)&&cr.skillProficiencies&&cr.skillProficiencies["Perception"]==="expert";
                var percBonus=wisMod+(hasPerc?crPb(cr)*(expertPerc?2:1):0);
                var passivePerc=10+percBonus;
                return <div style={{display:"flex",gap:8,alignItems:"baseline"}}>
                  <span style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:1,color:"rgba(201,150,42,.5)",textTransform:"uppercase",width:110,flexShrink:0}}>Passive Percep.</span>
                  <span style={{fontFamily:"'EB Garamond',serif",fontSize:12,color:"rgba(232,213,176,.6)"}}>{passivePerc}</span>
                  {hasPerc&&<span style={{fontFamily:"'EB Garamond',serif",fontSize:10,color:"rgba(232,213,176,.25)",fontStyle:"italic",marginLeft:4}}>{expertPerc?"(expertise)":"(prof)"}</span>}
                </div>;
              })()}
            </div>

            <div style={{height:1,background:"rgba(201,150,42,.15)",margin:"8px 0 12px"}} />

            {/* Traits */}
            <div style={{marginBottom:12}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:2,color:colLight,textTransform:"uppercase",marginBottom:6}}>Traits</div>

                return <div key={ti} style={{display:"flex",gap:6,marginBottom:6,alignItems:"flex-start"}}>
                  <TipInput value={tr.nm||""} onChange={function(e){updNested(cr.id,"traits",ti,"nm",e.target.value);}} placeholder="Trait name"
                    style={{width:110,background:"transparent",border:"none",borderBottom:"1px solid rgba(201,150,42,.15)",color:"var(--gold-l)",fontFamily:"'Cinzel',serif",fontSize:11,fontWeight:600,outline:"none",flexShrink:0}} />
                  <AutoTextarea value={tr.desc||""} onChange={function(e){updNested(cr.id,"traits",ti,"desc",e.target.value);}} placeholder="Description..."
                    style={{flex:1,background:"transparent",border:"none",borderBottom:"1px solid rgba(201,150,42,.1)",color:"var(--parch)",fontFamily:"'EB Garamond',serif",fontSize:12,outline:"none",resize:"vertical",minHeight:40,lineHeight:1.5}} />
                  <span onClick={function(){window.__confirm("Delete this trait?",function(){s("creatures",creatures.map(function(x){return x.id===cr.id?{...x,traits:(x.traits||[]).filter(function(_,j){return j!==ti;})}:x;}));});}}
                    style={{cursor:"pointer",color:"rgba(201,74,42,.35)",fontSize:13,flexShrink:0,paddingTop:2}}>×</span>
                </div>;
              })}

    {/* PB formula modal */}
    {crIniModal&&(function(){
      var cr=creatures.find(function(x){return x.id===crIniModal;});
      if(!cr) return null;
      return <CreatureFormulaModal c={c} creature={cr} spellLevel={cr.spellLevel||1}
        initialFormula={cr.iniFormula||{flat:"",charAbls:[],creatureAbls:["DEX"],profs:[],lvlEntries:[],spellLevelMult:0,useSpellAtk:null}}
        title="Initiative Bonus"
        hideProfRows={false}
        onApply={function(total,frm){s("creatures",creatures.map(function(x){return x.id===cr.id?{...x,iniFormula:frm}:x;}));setCrIniModal(null);}}
        onClose={function(){setCrIniModal(null);}}
        onClear={cr.iniFormula?function(){s("creatures",creatures.map(function(x){return x.id===cr.id?{...x,iniFormula:null}:x;}));setCrIniModal(null);}:null}
      />;
    })()}

    {pbModal&&(function(){
      var cr=creatures.find(function(x){return x.id===pbModal;});
      if(!cr) return null;
      return <CreatureFormulaModal c={c} creature={cr} spellLevel={cr.spellLevel||1}
        initialFormula={cr.pbFormula||{flat:cr.pbFlat||"2",charAbls:[],creatureAbls:[],profs:[],lvlEntries:[],spellLevelMult:0,useSpellAtk:null}}
        title="Proficiency Bonus"
        hideCrtrProf={true}
        onApply={function(total,frm){s("creatures",creatures.map(function(x){return x.id===cr.id?{...x,pbFormula:frm,pbFlat:""+total}:x;}));setPbModal(null);}}
        onClose={function(){setPbModal(null);}}
        onClear={cr.pbFormula?function(){s("creatures",creatures.map(function(x){return x.id===cr.id?{...x,pbFormula:null}:x;}));setPbModal(null);}:null}
      />;
    })()}

    {/* Skill proficiency selection modal */}
    {skillModal&&(function(){
      var cr=creatures.find(function(x){return x.id===skillModal;});
      if(!cr) return null;
      // Normalize to object format
      var sp=cr.skillProficiencies||[];
      var profObj=Array.isArray(sp)
        ?sp.reduce(function(o,n){o[n]="prof";return o;},{})
        :Object.assign({},sp);
      var cycle=function(current){return !current?"prof":current==="prof"?"expert":null;};
      return ReactDOM.createPortal(
        <div style={{position:"fixed",inset:0,zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,.78)"}}
          onClick={function(){setSkillModal(null);}}>
          <div style={{background:"#1a1208",border:"1px solid rgba(201,150,42,.35)",padding:"20px 24px",minWidth:320,maxWidth:480,width:"92vw",maxHeight:"88vh",overflowY:"auto",boxShadow:"0 8px 40px rgba(0,0,0,.9)"}}
            onClick={function(e){e.stopPropagation();}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:12,letterSpacing:2,color:"rgba(201,150,42,.8)",textTransform:"uppercase",marginBottom:4,borderBottom:"1px solid rgba(201,150,42,.15)",paddingBottom:8}}>
              Skill Proficiencies — {cr.nm||"Creature"}
            </div>
            <div style={{fontFamily:"'EB Garamond',serif",fontSize:10,color:"rgba(232,213,176,.3)",fontStyle:"italic",marginBottom:12}}>Click once for proficiency, again for expertise, again to remove</div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              {SKILLS.map(function(sk){
                var level=profObj[sk.n]||null;
                var expert=level==="expert";
                var prof=level==="prof";
                var bonus=getMod(sk.a,cr)+crPb(cr)*(expert?2:prof?1:0);
                var col=expert?"rgba(123,79,207,1)":prof?"rgba(201,150,42,1)":"rgba(201,150,42,1)";
                var active=!!level;
                return <div key={sk.n} onClick={function(){
                  var next=cycle(level);
                  var newObj=Object.assign({},profObj);
                  if(next) newObj[sk.n]=next; else delete newObj[sk.n];
                  upd(cr.id,"skillProficiencies",newObj);
                  // update local for immediate re-render
                  if(next) profObj[sk.n]=next; else delete profObj[sk.n];
                }} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 6px",cursor:"pointer",borderRadius:2,
                  background:expert?"rgba(123,79,207,.1)":prof?"rgba(201,150,42,.08)":"transparent",
                  border:"1px solid "+(active?(expert?"rgba(123,79,207,.3)":"rgba(201,150,42,.2)"):"transparent"),transition:"all .12s"}}>
                  <div style={{width:11,height:11,borderRadius:2,flexShrink:0,transition:"all .12s",
                    border:"1px solid "+(expert?"rgba(123,79,207,.7)":prof?"rgba(201,150,42,.6)":"rgba(201,150,42,.2)"),
                    background:expert?"rgba(123,79,207,.5)":prof?"rgba(201,150,42,.4)":"transparent"}} />
                  <span style={{fontFamily:"'Cinzel',serif",fontSize:11,color:expert?"var(--arcane-l)":prof?"var(--gold-l)":"rgba(232,213,176,.5)",flex:1}}>
                    {sk.n}{expert?" (Expertise)":""}
                  </span>
                  <span style={{fontFamily:"'Cinzel',serif",fontSize:9,color:"rgba(232,213,176,.3)",width:28,textAlign:"right"}}>{sk.a}</span>
                  <span style={{fontFamily:"'Cinzel',serif",fontSize:11,color:active?"var(--parch)":"rgba(232,213,176,.3)",width:28,textAlign:"right"}}>{active?(bonus>=0?"+"+bonus:bonus):"—"}</span>
                </div>;
              })}
            </div>
            <div style={{marginTop:14,display:"flex",justifyContent:"flex-end"}}>
              <button onClick={function(){setSkillModal(null);}} style={{background:"rgba(74,156,92,.12)",border:"1px solid rgba(74,156,92,.35)",color:"rgba(74,156,92,.9)",fontFamily:"'Cinzel',serif",fontSize:10,padding:"5px 16px",cursor:"pointer",borderRadius:2}}>Done</button>
            </div>
          </div>
        </div>,
        document.body
      );
    })()}

    {/* DC custom formula modal */}
    {dcModal&&(function(){
      var cr=creatures.find(function(x){return x.id===dcModal.crId;});
      if(!cr) return null;
      var dc=(cr.dcs||[])[dcModal.dcIdx];
      if(!dc) return null;
      return <CreatureFormulaModal c={c} creature={cr} spellLevel={cr.spellLevel||1}
        initialFormula={dc.customFormula||{flat:"8",charAbls:[],creatureAbls:[],profs:["full"],lvlEntries:[],spellLevelMult:0,useSpellAtk:null}}
        title={(dc.nm||"DC")+" Formula"}
        onApply={function(total,frm){
          s("creatures",creatures.map(function(x){
            if(x.id!==dcModal.crId) return x;
            return {...x,dcs:(x.dcs||[]).map(function(d,i){return i===dcModal.dcIdx?{...d,customFormula:frm}:d;})};
          }));
          setDcModal(null);
        }}
        onClose={function(){setDcModal(null);}}
        onClear={dc.customFormula?function(){
          s("creatures",creatures.map(function(x){
            if(x.id!==dcModal.crId) return x;
            return {...x,dcs:(x.dcs||[]).map(function(d,i){return i===dcModal.dcIdx?{...d,customFormula:null}:d;})};
          }));
          setDcModal(null);
        }:null}
      />;
    })()}
  </div>;
}

function ConfirmModal({message,onYes,onNo}){
  return ReactDOM.createPortal(
    <div style={{position:"fixed",inset:0,zIndex:99999,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,.8)"}} onClick={onNo}>
      <div style={{background:"#1a1208",border:"1px solid rgba(201,74,42,.4)",padding:"22px 28px",minWidth:280,maxWidth:400,width:"90vw",boxShadow:"0 8px 40px rgba(0,0,0,.9)"}} onClick={function(e){e.stopPropagation();}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:11,letterSpacing:1,color:"rgba(232,213,176,.7)",marginBottom:18,lineHeight:1.6}}>{message||"Are you sure you want to delete this?"}</div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <button onClick={onNo} style={{background:"transparent",border:"1px solid rgba(201,150,42,.25)",color:"rgba(232,213,176,.45)",fontFamily:"'Cinzel',serif",fontSize:10,padding:"5px 14px",cursor:"pointer",borderRadius:2}}>Cancel</button>
          <button onClick={onYes} style={{background:"rgba(201,74,42,.2)",border:"1px solid rgba(201,74,42,.5)",color:"#e07060",fontFamily:"'Cinzel',serif",fontSize:10,padding:"5px 14px",cursor:"pointer",borderRadius:2}}>Delete</button>
        </div>
      </div>
    </div>,
    document.body
  );
}

function App(){
  const [pg,setPg]=useState(0);
  const [c,setC]=useState(init());
  const s=(k,v)=>setC(function(prev){const next={...prev,[k]:typeof v==="function"?v(prev[k]):v};if(window.__characterAutoSave)setTimeout(function(){window.__characterAutoSave(next);},100);return next;});
  const [hiddenTabs,setHiddenTabs]=useState(function(){try{var h=JSON.parse(localStorage.getItem('_ht'));return Array.isArray(h)?h:[];}catch(e){return [];}});
  const [showTabMgr,setShowTabMgr]=useState(false);
  const savedRolls=c.savedRolls||[];
  const saveSRApp=function(updater){s("savedRolls",updater);};

  // Global confirm modal
  const [confirmState,setConfirmState]=useState({open:false,message:"",onConfirm:null});
  React.useEffect(function(){
    window.__confirm=function(message,onConfirm){
      setConfirmState({open:true,message,onConfirm});
    };
    return function(){delete window.__confirm;};
  },[]);
  const toggleHide=function(i){
    setHiddenTabs(function(prev){
      var next=prev.indexOf(i)>=0?prev.filter(function(x){return x!==i;}):[...prev,i];
      try{localStorage.setItem('_ht',JSON.stringify(next));}catch(e){}
      // If current page is being hidden, jump to first visible page
      if(next.indexOf(pg)>=0) setPg(PAGES.findIndex(function(_,j){return next.indexOf(j)<0;}));
      return next;
    });
  };

  // Avatar pan/zoom stored in character state so it persists with save/load
  const avX=c.avX||0;
  const avY=c.avY||0;
  const avScale=c.avScale||1;
  const setAvX=(v)=>s("avX",typeof v==="function"?v(avX):v);
  const setAvY=(v)=>s("avY",typeof v==="function"?v(avY):v);
  const setAvScale=(v)=>s("avScale",typeof v==="function"?v(avScale):v);
  const [dragging,setDragging]=useState(false);
  const [dragStart,setDragStart]=useState({x:0,y:0,ox:0,oy:0});

  const onAvMouseDown=function(e){
    if(!c.portrait) return;
    e.preventDefault();
    setDragging(true);
    setDragStart({x:e.clientX,y:e.clientY,ox:avX,oy:avY});
  };
  const onAvMouseMove=function(e){
    if(!dragging) return;
    setAvX(dragStart.ox+(e.clientX-dragStart.x));
    setAvY(dragStart.oy+(e.clientY-dragStart.y));
  };
  const onAvMouseUp=function(){setDragging(false);};
  const onAvWheel=function(e){
    if(!c.portrait) return;
    e.preventDefault();
    setAvScale(function(prev){return Math.min(8,Math.max(0.3,prev-(e.deltaY>0?0.1:-0.1)));});
  };
  const lastTouchDist=useState(null);
  const onAvTouchStart=function(e){
    if(!c.portrait) return;
    if(e.touches.length===1){
      setDragging(true);
      setDragStart({x:e.touches[0].clientX,y:e.touches[0].clientY,ox:avX,oy:avY});
    }
  };
  const onAvTouchMove=function(e){
    if(!dragging||!c.portrait) return;
    if(e.touches.length===1){
      setAvX(dragStart.ox+(e.touches[0].clientX-dragStart.x));
      setAvY(dragStart.oy+(e.touches[0].clientY-dragStart.y));
    }
  };

  return (
    <>
      <style>{CSS}</style>
      {confirmState.open&&<ConfirmModal
        message={confirmState.message}
        onYes={function(){if(confirmState.onConfirm)confirmState.onConfirm();setConfirmState({open:false,message:"",onConfirm:null});}}
        onNo={function(){setConfirmState({open:false,message:"",onConfirm:null});}}
      />}
      <div className="app" onMouseMove={onAvMouseMove} onMouseUp={onAvMouseUp}>
        <div className="hdr">
          <div className="hdr-row">
            {/* Title — always centred; portrait anchors to its left */}
            <div className="hdr-text">
              {c.portrait&&(
                <div className="hdr-avatar-wrap">
                  <div
                    className="hdr-avatar"
                    onMouseDown={onAvMouseDown}
                    onWheel={onAvWheel}
                    onTouchStart={onAvTouchStart}
                    onTouchMove={onAvTouchMove}
                    onTouchEnd={function(){setDragging(false);}}
                    title="Drag to reposition - scroll to zoom"
                  >
                    <img
                      src={c.portrait}
                      alt="Avatar"
                      style={{
                        position:"absolute",
                        maxWidth:"none",maxHeight:"none",
                        width:"auto",height:"auto",
                        top:"50%",left:"50%",
                        transform:"translate(-50%, -50%) translate("+avX+"px,"+avY+"px) scale("+avScale+")",
                        transformOrigin:"50% 50%"
                      }}
                      draggable={false}
                    />
                  </div>
                  <div className="hdr-avatar-hint">drag to reposition</div>
                  <div style={{display:"flex",alignItems:"center",gap:4,marginTop:4,width:104}}>
                    <button onClick={function(e){e.stopPropagation();setAvScale(function(p){return Math.max(0.1,+(p-0.1).toFixed(2));});}}
                      style={{background:"transparent",border:"1px solid rgba(201,150,42,.3)",color:"rgba(201,150,42,.6)",cursor:"pointer",width:16,height:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,lineHeight:1,flexShrink:0,padding:0}}>-</button>
                    <input type="range" min="1" max="300" step="1" value={Math.round(avScale*100)}
                      onChange={function(e){setAvScale(parseInt(e.target.value)/100);}}
                      style={{flex:1,height:3,accentColor:"rgba(201,150,42,.7)",cursor:"pointer"}} />
                    <button onClick={function(e){e.stopPropagation();setAvScale(function(p){return Math.min(3,+(p+0.1).toFixed(2));});}}
                      style={{background:"transparent",border:"1px solid rgba(201,150,42,.3)",color:"rgba(201,150,42,.6)",cursor:"pointer",width:16,height:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,lineHeight:1,flexShrink:0,padding:0}}>+</button>
                  </div>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:1,color:"rgba(201,150,42,.3)",marginTop:2,textAlign:"center"}}>{Math.round(avScale*100)+"%"}</div>
                </div>
              )}
              <div className="hdr-title">Character Record</div>
              <div className="hdr-sub">{c.name||"D\u0026D 5th Edition"}</div>
              {(()=>{
                const cls=(c.classes&&c.classes.length>0?c.classes:[{nm:c.cls||"",lv:"",hd:"d6"}]).filter(function(cl){return (cl.nm||"").trim();});
                if(!cls.length) return null;
                const totalLv=cls.reduce(function(t,cl){return t+(parseInt(cl.lv)||0);},0);
                const classStr=cls.length===1
                  ?(totalLv>0?"Level "+totalLv+" ":"")+cls[0].nm
                  :(totalLv>0?"Level "+totalLv+" · ":"")+cls.map(function(cl){return cl.nm+(parseInt(cl.lv)>0?" "+cl.lv:"");}).join(" / ");
                return <div style={{fontFamily:"'EB Garamond',serif",fontSize:13,fontStyle:"italic",color:"rgba(232,213,176,.45)",letterSpacing:.5,marginTop:1}}>{classStr}</div>;
              })()}
              <div className="divider"><span>*</span></div>
            </div>
            {/* Tabs button — absolutely top-right */}
            <div style={{position:"absolute",right:0,top:0,paddingTop:4}}>
              <button onClick={function(){setShowTabMgr(function(v){return !v;});}}
                title="Show / hide tabs"
                style={{background:"transparent",border:"1px solid rgba(201,150,42,.25)",color:"rgba(201,150,42,.5)",fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:1,padding:"4px 8px",cursor:"pointer",borderRadius:2,transition:"all .15s",whiteSpace:"nowrap"}}>
                ☰ Tabs
              </button>
              {showTabMgr&&(
                <div style={{position:"absolute",right:0,top:"100%",marginTop:4,background:"#1a1410",border:"1px solid rgba(201,150,42,.3)",padding:"10px 14px",zIndex:200,minWidth:200,boxShadow:"0 4px 24px rgba(0,0,0,.6)"}}>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:2,color:"rgba(201,150,42,.5)",textTransform:"uppercase",marginBottom:8}}>Visible Tabs</div>
                  {PAGES.map(function(page,i){
                    if(!page.hideable) return null;
                    var hidden=hiddenTabs.indexOf(i)>=0;
                    return (
                      <div key={i} onClick={function(){toggleHide(i);}}
                        style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",cursor:"pointer",borderBottom:"1px solid rgba(201,150,42,.07)"}}>
                        <div style={{width:13,height:13,borderRadius:2,border:"1px solid "+(hidden?"rgba(184,154,240,.25)":"var(--arcane)"),background:hidden?"rgba(0,0,0,.3)":"var(--arcane)",flexShrink:0,transition:"all .15s"}} />
                        <span style={{fontFamily:"'EB Garamond',serif",fontSize:13,color:hidden?"rgba(232,213,176,.3)":"rgba(232,213,176,.85)",transition:"color .15s"}}>{page.label}</span>
                      </div>
                    );
                  })}
                  <div onClick={function(){setShowTabMgr(false);}} style={{marginTop:8,fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:1,color:"rgba(201,150,42,.4)",textAlign:"center",cursor:"pointer",paddingTop:6,borderTop:"1px solid rgba(201,150,42,.1)"}}>close</div>
                </div>
              )}
            </div>
          </div>
        </div>
        <nav className="nav">
          {PAGES.map(function(p,i){
            if(hiddenTabs.indexOf(i)>=0) return null;
            return <button key={i} className={pg===i?"nb act":"nb"} onClick={()=>setPg(i)}>{p.label}</button>;
          })}
        </nav>
        <div className="sheet">
          <div className="si">
            {pg===0&&<Page1 c={c} s={s} />}
            {pg===1&&<Page3 c={c} s={s} />}
            {pg===2&&<Page2 c={c} s={s} />}
            {pg===3&&<Page4 c={c} s={s} />}
            {pg===4&&<SpellPage c={c} s={s} from={0} to={9} />}
            {pg===5&&<ExploitPage c={c} s={s} />}
            {pg===6&&<CreaturesPage c={c} s={s} />}
            {pg===7&&<DiceRollerPage c={c} s={s} savedRolls={savedRolls} saveSRApp={saveSRApp} />}
            {pg===8&&<CompendiumPage c={c} s={s} />}
          </div>
          {(function(){const vis=PAGES.map(function(_,i){return i;}).filter(function(i){return hiddenTabs.indexOf(i)<0;});const cur=vis.indexOf(pg)+1;const tot=vis.length;return <div className="pgn">- {cur} / {tot} -</div>;})()}
        </div>
      </div>
    </>
  );
}

const _root=ReactDOM.createRoot(document.getElementById("root"));_root.render(React.createElement(App));
</script>
<div style="text-align:center;padding:18px 0 10px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;color:rgba(201,150,42,.35);user-select:none">D&D 5e Character Record · v1.16</div>

</script>
</body>
</html>
