                                  return <div key={di} onClick={function(){rerollDie(r.id,globalDi);}} title={"d"+d.sides+" – click to reroll"}
                                    style={{fontFamily:"'Cinzel',serif",fontSize:11,fontWeight:700,
                                      color:d.val===d.sides?"#4a9c5c":d.val===1?"#c94a2a":"var(--arcane-l)",
                                      border:"1px solid "+(d.val===d.sides?"rgba(74,156,92,.5)":d.val===1?"rgba(201,74,42,.5)":"rgba(123,79,207,.4)"),
                                      background:d.val===d.sides?"rgba(74,156,92,.1)":d.val===1?"rgba(201,74,42,.1)":"rgba(123,79,207,.08)",
                                      padding:"2px 5px",borderRadius:3,cursor:"pointer",userSelect:"none",minWidth:22,textAlign:"center"}}>
                                    {d.val}
                                  </div>;
                                })}
                              </div>
                            </div>
                          </React.Fragment>;
                        })}
                      </div>
                    </div>
                  ):(
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                    <span style={{fontFamily:"'Cinzel Decorative',serif",fontSize:28,fontWeight:700,color:isCrit?"#4a9c5c":isFumble?"#c94a2a":"var(--gold-l)",lineHeight:1}}>{total}</span>
                    <span style={{fontFamily:"'EB Garamond',serif",fontSize:14,color:"rgba(232,213,176,.4)"}}>
                      {"("+r.dice.map(function(d){return d.val;}).join("+")+")"}
                      {r.bonus!==0?fmtBonus(r.bonus):""}
                    </span>
                    <div style={{display:"flex",gap:5,flexWrap:"wrap",marginLeft:8}}>
                      {r.dice.map(function(d,di){
                        return (
                          <div key={di} onClick={function(){rerollDie(r.id,di);}} title={"d"+d.sides+" – click to reroll"}
                            style={{fontFamily:"'Cinzel',serif",fontSize:13,fontWeight:700,color:d.val===d.sides?"#4a9c5c":d.val===1?"#c94a2a":"var(--arcane-l)",
                              border:"1px solid "+(d.val===d.sides?"rgba(74,156,92,.5)":d.val===1?"rgba(201,74,42,.5)":"rgba(123,79,207,.4)"),
                              background:d.val===d.sides?"rgba(74,156,92,.1)":d.val===1?"rgba(201,74,42,.1)":"rgba(123,79,207,.08)",
                              padding:"3px 7px",borderRadius:3,cursor:"pointer",transition:"all .15s",userSelect:"none",minWidth:28,textAlign:"center"}}>
                            {d.val}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Compendium Search Page ───────────────────────────────────────────────────
function CompendiumPage({c,s}){
  const {useState:us}=React;
  const spellCache=useSpellCompendium();
  const featCache=useFeatCompendium();
  const itemCache=useItemCompendium();
  const exploitCache=useExploitCompendium();
  const [kind,setKind]=us("spells"); // spells | feats | items | exploits
  const [query,setQuery]=us("");
  const [descQuery,setDescQuery]=us("");
  // Debounced copies — used when filtering the large item set so typing stays responsive.
  const [dQuery,setDQuery]=us("");
  const [dDescQuery,setDDescQuery]=us("");
  React.useEffect(function(){var t=setTimeout(function(){setDQuery(query);},140);return function(){clearTimeout(t);};},[query]);
  React.useEffect(function(){var t=setTimeout(function(){setDDescQuery(descQuery);},140);return function(){clearTimeout(t);};},[descQuery]);
  const qEff=kind==="items"?dQuery:query;
  const dqEff=kind==="items"?dDescQuery:descQuery;
  const [fLevel,setFLevel]=us("any");
  const [fSchool,setFSchool]=us("any");
  const [fClass,setFClass]=us("");
  const [fCast,setFCast]=us("any");
  const [fRitual,setFRitual]=us("any"); // any | yes | no
  const [fConc,setFConc]=us("any");
  const [fRarity,setFRarity]=us("any");
  const [fAttune,setFAttune]=us("any");
  const [fType,setFType]=us("");
  const [fAttuneTag,setFAttuneTag]=us("");
  const [showGeneric,setShowGeneric]=us(false); // show variant/generic item parents (default off)
  const [fPrereq,setFPrereq]=us("any"); // any | yes | no
  const [fPrereqText,setFPrereqText]=us("");
  const [fAbilities,setFAbilities]=us([]); // selected ability codes
  const [fDegree,setFDegree]=us("any"); // exploit degree filter
  const [fExec,setFExec]=us(""); // exploit execution textbox filter
  const [fExClass,setFExClass]=us(""); // exploit class textbox filter
  const [expanded,setExpanded]=us({});
  const [page,setPage]=us(0);
  const [confirmAdd,setConfirmAdd]=us(null); // the result object pending confirmation
  const [addCls,setAddCls]=us(""); // selected class when adding a spell
  const [confirmAddAll,setConfirmAddAll]=us(false); // confirm modal for "add all" spells
  const [skippedInfo,setSkippedInfo]=us(null); // {names:[...], cls:""} popup for spells skipped as duplicates
  const [weightPrompt,setWeightPrompt]=us(null); // {invIndex} item just added needing a weight
  const [weightVal,setWeightVal]=us("");
  const [srdResults,setSrdResults]=us([]);
  const [srdLoading,setSrdLoading]=us(false);
  const [includeSrd,setIncludeSrd]=us(true);
  const debounceRef=React.useRef(null);

  // Reset filters when switching kind
  function switchKind(k){setKind(k);setExpanded({});setSrdResults([]);setPage(0);setFDegree("any");setFExec("");setFExClass("");}

  // Reset to first page whenever a search or filter changes
  React.useEffect(function(){setPage(0);},[query,descQuery,fLevel,fSchool,fClass,fCast,fRitual,fConc,fRarity,fAttune,fType,fAttuneTag,fPrereq,fPrereqText,fAbilities,fDegree,fExec,fExClass,includeSrd,kind,showGeneric]);

  // SRD fetch (debounced) — only when there's a query
  React.useEffect(function(){
    if(!includeSrd){setSrdResults([]);return;}
    if(kind==="exploits"){setSrdResults([]);return;} // exploits have no SRD API
    var qq=(query||descQuery||"").trim();
    if(qq.length<2){setSrdResults([]);return;}
    if(debounceRef.current) clearTimeout(debounceRef.current);
    debounceRef.current=setTimeout(function(){
      setSrdLoading(true);
      var term=query.trim()||descQuery.trim();
      var p= kind==="spells"?open5eSpellSearch(term)
            :kind==="feats"?open5eFeatSearch(term)
            :open5eSearch(term);
      p.then(function(res){setSrdResults(res||[]);setSrdLoading(false);}).catch(function(){setSrdResults([]);setSrdLoading(false);});
    },400);
    return function(){if(debounceRef.current) clearTimeout(debounceRef.current);};
  },[query,descQuery,kind,includeSrd]);

  // Build the file-based list for the current kind
  var fileList=[];
  if(kind==="spells"&&spellCache.status==="ready"&&spellCache.data) fileList=Object.values(spellCache.data).map(function(x){return Object.assign({},x,{src:"file"});});
  else if(kind==="feats"&&featCache.status==="ready"&&featCache.data) fileList=Object.values(featCache.data).map(function(x){return Object.assign({},x,{src:"file"});});
  else if(kind==="items"&&itemCache.status==="ready"&&itemCache.data) fileList=Object.values(itemCache.data).map(function(x){return Object.assign({},x,{src:"file",name:x.name});});
  else if(kind==="exploits"&&exploitCache.status==="ready"&&exploitCache.data) fileList=Object.values(exploitCache.data).map(function(x){return Object.assign({},x,{src:"file"});});

  // Merge SRD results in
  var all=fileList.concat(srdResults||[]);

  // Apply filters
  var nq=(qEff||"").toLowerCase().trim();
  var ndq=(dqEff||"").toLowerCase().trim();
  var results=all.filter(function(r){
    if(nq&&(r.name||"").toLowerCase().indexOf(nq)<0) return false;
    if(ndq&&(r.desc||"").toLowerCase().indexOf(ndq)<0) return false;
    if(kind==="spells"){
      if(fLevel!=="any"&&(r.level===undefined||r.level!==parseInt(fLevel))) return false;
      if(fSchool!=="any"&&(r.school||"").toLowerCase()!==fSchool.toLowerCase()) return false;
      if(fClass.trim()&&(r.classes||"").toString().toLowerCase().indexOf(fClass.toLowerCase())<0) return false;
      if(fCast!=="any"&&(r.castingTime||"").toLowerCase().indexOf(fCast.toLowerCase())<0) return false;
      if(fRitual==="yes"&&!r.ritual) return false;
      if(fRitual==="no"&&r.ritual) return false;
      if(fConc==="yes"&&!r.conc) return false;
      if(fConc==="no"&&r.conc) return false;
    }
    if(kind==="items"){
      if(r.generic&&!showGeneric) return false; // hide generic/variant parents unless opted in
      if(fRarity==="__mundane"){ if((r.rarity||"").trim()) return false; }
      else if(fRarity!=="any"&&(r.rarity||"").toLowerCase()!==fRarity.toLowerCase()) return false;
      if(fAttune==="yes"&&r.attune!==true) return false;
      if(fAttune==="no"&&r.attune!==false) return false;
      if(fType.trim()&&(r.type||"").toLowerCase().indexOf(fType.toLowerCase())<0) return false;
      if(fAttuneTag.trim()&&(r.attuneTag||"").toLowerCase().indexOf(fAttuneTag.toLowerCase())<0) return false;
    }
    if(kind==="feats"){
      var hasPre=!!(r.prereq&&(""+r.prereq).trim());
      if(fPrereq==="yes"&&!hasPre) return false;
      if(fPrereq==="no"&&hasPre) return false;
      if(fPrereq==="yes"&&fPrereqText.trim()&&(r.prereq||"").toLowerCase().indexOf(fPrereqText.toLowerCase())<0) return false;
      if(fAbilities.length>0){
        var ab=r.abilities||[];
        // Match if the feat can increase ANY of the selected abilities
        var any=fAbilities.some(function(a){return ab.indexOf(a)>=0;});
        if(!any) return false;
      }
    }
    if(kind==="exploits"){
      if(fDegree!=="any"&&r.degree!==parseInt(fDegree)) return false;
      if(fExClass.trim()&&(r.classes||"").toString().toLowerCase().indexOf(fExClass.toLowerCase())<0) return false;
      if(fExec.trim()&&(r.execution||"").toString().toLowerCase().indexOf(fExec.toLowerCase())<0) return false;
    }
    return true;
  });
  // Sort: file first, then by name (spells by level then name)
  results.sort(function(a,b){
    if(kind==="spells"){var la=a.level||0,lb=b.level||0;if(la!==lb)return la-lb;}
    if(kind==="exploits"){var da=a.degree||0,db=b.degree||0;if(da!==db)return da-db;}
    // When searching by name, surface exact match first, then prefix matches.
    if(nq){
      var an=(a.name||"").toLowerCase(),bn=(b.name||"").toLowerCase();
      var ar=an===nq?0:(an.indexOf(nq)===0?1:2);
      var br=bn===nq?0:(bn.indexOf(nq)===0?1:2);
      if(ar!==br) return ar-br;
    }
    return (a.name||"").localeCompare(b.name||"");
  });
  var PER_PAGE=20;
  var totalResults=results.length;
  var totalPages=Math.max(1,Math.ceil(totalResults/PER_PAGE));
  var curPage=Math.min(page,totalPages-1);
  var pageResults=results.slice(curPage*PER_PAGE,curPage*PER_PAGE+PER_PAGE);

  var SCHOOLS=["Abjuration","Conjuration","Divination","Enchantment","Evocation","Illusion","Necromancy","Transmutation"];
  var inputStyle={background:"rgba(0,0,0,.3)",border:"1px solid rgba(201,150,42,.2)",color:"var(--parch)",fontFamily:"'EB Garamond',serif",fontSize:13,outline:"none",padding:"5px 8px",borderRadius:2};
  var selStyle=Object.assign({},inputStyle,{cursor:"pointer"});
  var tabBtn=function(k,label){return <div onClick={function(){switchKind(k);}} style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:11,letterSpacing:1.5,textTransform:"uppercase",padding:"6px 16px",borderRadius:2,userSelect:"none",border:"1px solid "+(kind===k?"var(--gold)":"rgba(201,150,42,.2)"),background:kind===k?"rgba(201,150,42,.12)":"transparent",color:kind===k?"var(--gold-l)":"rgba(232,213,176,.45)"}}>{label}</div>;};

  function toggle(id){setExpanded(function(e){var n=Object.assign({},e);n[id]=!n[id];return n;});}

  // Shared duplicate matcher for spells. Two spells are the same if all identity fields match
  // UNDER THE SAME CLASS (empty class = "Other Spells"). Notes (nt) and prep status are ignored.
  function spellMatches(sp,candidate){
    var norm=function(x){return (x||"").toString().trim().toLowerCase();};
    return norm(sp.nm)===norm(candidate.nm)
        && norm(sp.sc)===norm(candidate.sc)
        && norm(sp.ti)===norm(candidate.ti)
        && norm(sp.rng)===norm(candidate.rng)
        && norm(sp.cmp)===norm(candidate.cmp)
        && norm(sp.dur)===norm(candidate.dur)
        && (!!sp.conc)===(!!candidate.conc)
        && (!!sp.ritual)===(!!candidate.ritual)
        && norm(sp.cls)===norm(candidate.cls);
  }

  // Exploit duplicate matcher — same name + degree + class (empty class = unassigned).
  function exploitMatches(ex,candidate){
    var norm=function(x){return (x||"").toString().trim().toLowerCase();};
    return norm(ex.nm)===norm(candidate.nm)
        && norm(ex.cls)===norm(candidate.cls);
  }

  function doAdd(r,clsName){
    if(kind==="spells"){
      var lv=r.level||0;
      var candidate={nm:r.name||"",ti:r.castingTime||"",rng:r.range||"",cmp:r.components||"",dur:r.duration||"",conc:!!r.conc,prep:false,nt:r.desc||"",cls:clsName||"",sc:r.school||"",ritual:!!r.ritual};
      var existing=(c.sp&&c.sp[lv])||[];
      var alreadyExists=existing.some(function(sp){return spellMatches(sp,candidate);});
      if(alreadyExists){
        setConfirmAdd(null);
        setSkippedInfo({names:[candidate.nm],cls:clsName||""});
        return;
      }
      var cp=Object.assign({},c.sp);
      cp[lv]=existing.concat([candidate]);
      s("sp",cp);
    } else if(kind==="feats"){
      s("fts",(c.fts||[]).concat([{nm:r.name||"",ds:r.desc||"",lv:"",limited:false,limits:[{name:"",uses:"",exp:"",die:"NO",recharge:""}]}]));
    } else if(kind==="items"){
      var ch=r.charges||parseChargesFromDesc(r.desc);
      var newInv=(c.inv||[]).concat([{nm:r.name||"",qt:"1",wt:r.weight||"",nt:r.cost?"Cost: "+r.cost:"",desc:r.desc||"",showDesc:!!r.desc,eq:false,wl:false,charges:ch||null}]);
      s("inv",newInv);
      // Only prompt when WE inferred the weight (the item had no official weight).
      if(r.weightInferred){
        var w=(r.weight==null?"":(""+r.weight)).trim();
        setWeightVal(w);
        setWeightPrompt({invIndex:newInv.length-1,name:r.name||""});
      }
    } else if(kind==="exploits"){
      var deg=r.degree||1;
      var candidate={nm:r.name||"",uses:r.cost||"1 die",exec:r.execution||"",prereq:r.prereq||"",desc:r.desc||"",nt:"",used:false,cls:clsName||"",showDesc:false};
      var existingEx=(c.expl&&c.expl[deg])||[];
      var dup=existingEx.some(function(ex){return exploitMatches(ex,candidate);});
      if(dup){
        setConfirmAdd(null);
        setSkippedInfo({names:[candidate.nm],cls:clsName||""});
        return;
      }
      var cpe=Object.assign({},c.expl);
      cpe[deg]=existingEx.concat([candidate]);
      s("expl",cpe);
    }
    setConfirmAdd(null);
  }

  function doAddAll(clsName){
    // Add all current filtered results to the spell list, skipping any spell already present
    // UNDER THE SAME CLASS. Collects the names of skipped spells to report afterward.
    // Deep-copy each level array so mutations don't affect the original and
    // so we check against the growing list (catches duplicates within the batch too).
    var newSp={};
    Object.keys(c.sp||{}).forEach(function(lv){ newSp[lv]=(c.sp[lv]||[]).slice(); });
    var skipped=[];
    results.forEach(function(r){
      var lv=r.level||0;
      var candidate={nm:r.name||"",ti:r.castingTime||"",rng:r.range||"",cmp:r.components||"",dur:r.duration||"",conc:!!r.conc,prep:false,nt:r.desc||"",cls:clsName||"",sc:r.school||"",ritual:!!r.ritual};
      if(!newSp[lv]) newSp[lv]=[];
      var alreadyExists=newSp[lv].some(function(sp){return spellMatches(sp,candidate);});
      if(!alreadyExists){
        newSp[lv].push(candidate);
      } else {
        skipped.push(candidate.nm);
      }
    });
    s("sp",newSp);
    setConfirmAddAll(false);
    if(skipped.length>0) setSkippedInfo({names:skipped,cls:clsName||""});
  }

  function doAddAllExploits(clsName){
    // Add all current filtered exploit results, skipping any already present under the same class.
    var newExpl={};
    Object.keys(c.expl||{}).forEach(function(deg){ newExpl[deg]=(c.expl[deg]||[]).slice(); });
    var skipped=[];
    results.forEach(function(r){
      var deg=r.degree||1;
      var candidate={nm:r.name||"",uses:r.cost||"1 die",exec:r.execution||"",prereq:r.prereq||"",desc:r.desc||"",nt:"",used:false,cls:clsName||"",showDesc:false};
      if(!newExpl[deg]) newExpl[deg]=[];
      var dup=newExpl[deg].some(function(ex){return exploitMatches(ex,candidate);});
      if(!dup){ newExpl[deg].push(candidate); }
      else { skipped.push(candidate.nm); }
    });
    s("expl",newExpl);
    setConfirmAddAll(false);
    if(skipped.length>0) setSkippedInfo({names:skipped,cls:clsName||""});
  }

  return (
    <div>
      <div className="orn">Compendium</div>
      <div className="sh" style={{display:"flex",alignItems:"center"}}>
        <span>Compendium Search</span>
        {(function(){
          var st=kind==="spells"?spellCache.status:kind==="feats"?featCache.status:kind==="exploits"?exploitCache.status:itemCache.status;
          var col=st==="ready"?"rgba(74,156,92,.6)":st==="loading"?"rgba(201,150,42,.5)":"rgba(201,74,42,.5)";
          var lbl=st==="ready"?"Compendium file loaded":st==="loading"?"Loading compendium file…":"Compendium file unavailable (offline or missing)";
          return <span title={lbl} style={{display:"inline-flex",alignItems:"center",gap:4,fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:1,color:col,userSelect:"none",marginLeft:"auto",fontWeight:"normal",textTransform:"uppercase"}}>
            <span style={{width:6,height:6,borderRadius:"50%",background:col,display:"inline-block",flexShrink:0}} />
            {kind==="spells"?"Spells":kind==="feats"?"Feats":kind==="exploits"?"Exploits":"Items"} File
          </span>;
        })()}
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>{tabBtn("spells","Spells")}{tabBtn("feats","Feats")}{tabBtn("items","Items")}{tabBtn("exploits","Exploits")}</div>

      {/* Search controls */}
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:8,alignItems:"center"}}>
        <input value={query} onChange={function(e){setQuery(e.target.value);}} placeholder="Name contains..." style={Object.assign({},inputStyle,{flex:"1 1 160px",minWidth:140})} />
        <input value={descQuery} onChange={function(e){setDescQuery(e.target.value);}} placeholder="Description contains..." style={Object.assign({},inputStyle,{flex:"1 1 160px",minWidth:140})} />
      </div>

      {kind==="spells"&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:8,alignItems:"center"}}>
          <select value={fLevel} onChange={function(e){setFLevel(e.target.value);}} style={selStyle}>
            <option value="any">Any Level</option><option value="0">Cantrip</option>
            {[1,2,3,4,5,6,7,8,9].map(function(l){return <option key={l} value={""+l}>Level {l}</option>;})}
          </select>
          <select value={fSchool} onChange={function(e){setFSchool(e.target.value);}} style={selStyle}>
            <option value="any">Any School</option>
            {SCHOOLS.map(function(sc){return <option key={sc} value={sc}>{sc}</option>;})}
          </select>
          <input value={fClass} onChange={function(e){setFClass(e.target.value);}} placeholder="Class..." style={Object.assign({},inputStyle,{width:110})} />
          <select value={fCast} onChange={function(e){setFCast(e.target.value);}} style={selStyle}>
            <option value="any">Any Cast Time</option><option value="action">Action</option><option value="bonus">Bonus Action</option><option value="reaction">Reaction</option><option value="minute">Minute(s)</option><option value="hour">Hour(s)</option>
          </select>
          <select value={fRitual} onChange={function(e){setFRitual(e.target.value);}} style={selStyle}>
            <option value="any">Ritual: Any</option><option value="yes">Ritual only</option><option value="no">Non-ritual</option>
          </select>
          <select value={fConc} onChange={function(e){setFConc(e.target.value);}} style={selStyle}>
            <option value="any">Conc: Any</option><option value="yes">Concentration</option><option value="no">No Concentration</option>
          </select>
        </div>
      )}

      {kind==="items"&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:8,alignItems:"center"}}>
          <select value={fRarity} onChange={function(e){setFRarity(e.target.value);}} style={selStyle}>
            <option value="any">Any Rarity</option>
            <option value="__mundane">Mundane (no rarity)</option>
            {["Common","Uncommon","Rare","Very Rare","Legendary","Artifact"].map(function(rr){return <option key={rr} value={rr}>{rr}</option>;})}
          </select>
          <select value={fAttune} onChange={function(e){setFAttune(e.target.value);}} style={selStyle}>
            <option value="any">Attunement: Any</option><option value="yes">Requires Attunement</option><option value="no">No Attunement</option>
          </select>
          <input value={fType} onChange={function(e){setFType(e.target.value);}} placeholder="Type contains... (e.g. Wondrous, Weapon)" style={Object.assign({},inputStyle,{flex:"1 1 160px",minWidth:130})} />
          <input value={fAttuneTag} onChange={function(e){setFAttuneTag(e.target.value);}} placeholder="Attune by... (e.g. Warlock)" style={Object.assign({},inputStyle,{flex:"1 1 140px",minWidth:120})} />
          <label title="Show generic 'parent' items (e.g. Armor of Resistance) that list their variants in a table. These never appear in your inventory." style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontFamily:"'EB Garamond',serif",fontSize:13,color:showGeneric?"rgba(232,213,176,.85)":"rgba(232,213,176,.45)",whiteSpace:"nowrap",userSelect:"none"}}>
            <input type="checkbox" checked={showGeneric} onChange={function(e){setShowGeneric(e.target.checked);}} style={{accentColor:"var(--arcane)",cursor:"pointer"}} />
            Show generic items
          </label>
        </div>
      )}

      {kind==="feats"&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:8,alignItems:"center"}}>
          <select value={fPrereq} onChange={function(e){setFPrereq(e.target.value);}} style={selStyle}>
            <option value="any">Prereq: Any</option><option value="yes">Has Prerequisite</option><option value="no">No Prerequisite</option>
          </select>
          {fPrereq==="yes"&&<input value={fPrereqText} onChange={function(e){setFPrereqText(e.target.value);}} placeholder="Prereq contains..." style={Object.assign({},inputStyle,{width:170})} />}
          <span style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:1,color:"rgba(232,213,176,.4)",textTransform:"uppercase"}}>Increases:</span>
          {["STR","DEX","CON","INT","WIS","CHA"].map(function(ab){
            var on=fAbilities.indexOf(ab)>=0;

            <div style={{fontFamily:"'Cinzel',serif",fontSize:13,letterSpacing:1,color:"var(--gold-l)",marginBottom:10}}>{(function(){var w=kind==="exploits"?"Exploit":"Spell";return skippedInfo.names.length===1?(w+" Already in List"):(skippedInfo.names.length+" "+w+"s Already in List");})()}</div>
            <div style={{fontFamily:"'EB Garamond',serif",fontSize:13,color:"rgba(232,213,176,.6)",marginBottom:14,lineHeight:1.6}}>
              The following {kind==="exploits"?(skippedInfo.names.length===1?"exploit was":"exploits were"):(skippedInfo.names.length===1?"spell was":"spells were")} not added because {skippedInfo.names.length===1?"it already exists":"they already exist"} under <span style={{color:"var(--gold-l)",fontWeight:600}}>{skippedInfo.cls?skippedInfo.cls:(kind==="exploits"?"Other / Unassigned":"Other Spells")}</span>:
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:3,marginBottom:18,paddingLeft:4}}>
              {skippedInfo.names.map(function(nm,i){return (
                <div key={i} style={{fontFamily:"'EB Garamond',serif",fontSize:13,color:"var(--parch)"}}>• {nm}</div>
              );})}
            </div>
            <div style={{display:"flex",justifyContent:"flex-end"}}>
              <div onClick={function(){setSkippedInfo(null);}}
                style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:1,textTransform:"uppercase",padding:"6px 16px",borderRadius:2,userSelect:"none",border:"1px solid rgba(201,150,42,.5)",color:"var(--gold-l)",background:"rgba(201,150,42,.12)"}}>OK</div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function CreaturesPage({c,s}){

  const creatures=c.creatures||[];
  const TAGS=["Companion","Summon","Transformation"];
  const ABLS=["STR","DEX","CON","INT","WIS","CHA"];

  const mkCreature=function(tag){return {

    acFlat:"13",acFormula:null,
    hpMax:"40",hpFormula:null,hpCurrent:"",
    speed:"30 ft.",
    resistances:"",immunities:"",vulnerabilities:"",conditionImmunities:"",

  const upd=function(id,field,val){s("creatures",creatures.map(function(cr){return cr.id===id?{...cr,[field]:val}:cr;}));};
  const updNested=function(id,field,idx,subField,val){s("creatures",creatures.map(function(cr){if(cr.id!==id)return cr;var arr=[...cr[field]];arr[idx]={...arr[idx],[subField]:val};return {...cr,[field]:arr};}));};

  // Evaluate formula for a creature (returns numeric)
  const evalF=function(formula,cr){return computeCreatureFormula(formula,{c,creature:cr,spellLevel:cr.spellLevel||1});};
  const fmtAtk=function(n){return n>=0?"+"+n:""+n;};
  // Resolve a creature stat — "@WIS" etc. means use character's live score
  const resolveCreatureStat=function(st,cr){
    var v=cr.stats&&cr.stats[st];
    if(v&&typeof v==="string"&&v.startsWith("@")){
      var charAbl=v.slice(1);
      var base=parseInt((c.statsBase&&c.statsBase[charAbl])||c.stats[charAbl])||10;
      var bon=parseInt((c.statsBon&&c.statsBon[charAbl])||0)||0;
      return base+bon;
    }
    if(v===""||v==null) return 0;
    return parseInt(v)||0;
  };
  const getMod=function(st,cr){return Math.floor((resolveCreatureStat(st,cr)-10)/2);};
  const fmtStat=function(st,cr){
    var v=cr.stats&&cr.stats[st];
    if(v&&typeof v==="string"&&v.startsWith("@")) return resolveCreatureStat(st,cr);
    if(v==null) return 10;
    return v;
  };

  // Exhaustion penalty for creature
  const crExhPen=function(cr){return Math.min(5,Math.max(0,parseInt(cr.exhaustion)||0))*-2;};
  // Initiative display
  const crIniTotal=function(cr){
    var exhP=crExhPen(cr);
    if(cr.iniFormula) return computeCreatureFormula(cr.iniFormula,{c,creature:cr,spellLevel:cr.spellLevel||1})+exhP;
    return getMod("DEX",cr)+exhP;
  };
  // HP display
  const hpDisplay=function(cr){
    if(cr.hpFormula) return evalF(cr.hpFormula,cr)+(cr.hpFormula.spellLevelMult?" (SL "+cr.spellLevel+")":"");
    return "—";
  };
  const acDisplay=function(cr){
    if(cr.acFormula) return evalF(cr.acFormula,cr);
    return "—";
  };

  // Attack computed values
  const atkTotal=function(atk,cr){
    if(!atk.atkFormula) return null;
    // If the formula delegates to the character's spell attack, don't apply creature exhaustion
    var usesSpellAtk=atk.atkFormula.useSpellAtk!=null&&atk.atkFormula.useSpellAtk!==undefined;
    return evalF(atk.atkFormula,cr)+(usesSpellAtk?0:crExhPen(cr));
  };
  const dmgBonus=function(atk,cr){
    if(!atk.dmgFormula) return null;
    return evalF(atk.dmgFormula,cr);
  };

  const tagColor=function(tag){
    return tag==="Summon"?"rgba(123,79,207,1)":tag==="Companion"?"rgba(56,178,172,1)":tag==="Familiar"?"rgba(201,150,42,1)":tag==="Transformation"?"rgba(201,74,42,1)":"rgba(184,154,240,1)";
  };

  // Per-creature edit state for formula modals

  const [acModal,setAcModal]=us(null);
  const [hpModal,setHpModal]=us(null);
  const [hdModal,setHdModal]=us(null);
  const [tfStatModal,setTfStatModal]=us(null); // {crId, abl}
  const [dcModal,setDcModal]=us(null);
  const [pbModal,setPbModal]=us(null);   // crId
  const [skillModal,setSkillModal]=us(null); // crId
  const [crIniModal,setCrIniModal]=us(null); // crId

  const SKILLS=[
    {n:"Acrobatics",a:"DEX"},{n:"Animal Handling",a:"WIS"},{n:"Arcana",a:"INT"},
    {n:"Athletics",a:"STR"},{n:"Deception",a:"CHA"},{n:"History",a:"INT"},
    {n:"Insight",a:"WIS"},{n:"Intimidation",a:"CHA"},{n:"Investigation",a:"INT"},
    {n:"Medicine",a:"WIS"},{n:"Nature",a:"INT"},{n:"Perception",a:"WIS"},
    {n:"Performance",a:"CHA"},{n:"Persuasion",a:"CHA"},{n:"Religion",a:"INT"},
    {n:"Sleight of Hand",a:"DEX"},{n:"Stealth",a:"DEX"},{n:"Survival",a:"WIS"},
  ];

  const crPb=function(cr){
    if(cr.pbFormula) return computeCreatureFormula(cr.pbFormula,{c,creature:cr,spellLevel:cr.spellLevel||1});

  return <div>
    <div className="orn">Creatures</div>

      {creatures.map(function(cr){
        var col=tagColor(cr.tag);
        var colLight=col.replace(",1)",",0.7)");

        return <div key={cr.id} style={{marginBottom:16,border:"1px solid "+col.replace(",1)",",0.3)"),background:"rgba(0,0,0,.2)",borderRadius:2}}>

          {/* Header bar */}
          <div style={{display:"flex",gap:8,alignItems:"center",padding:"8px 12px",background:col.replace(",1)",",0.08)"),borderBottom:cr.collapsed?"none":"1px solid "+col.replace(",1)",",0.2)")}}>
            <div onClick={function(){upd(cr.id,"collapsed",!cr.collapsed);}} style={{cursor:"pointer",flex:1,display:"flex",gap:8,alignItems:"center"}}>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:1.5,padding:"2px 8px",borderRadius:10,background:col.replace(",1)",",0.15)"),border:"1px solid "+col.replace(",1)",",0.4)"),color:colLight,userSelect:"none"}}>{cr.tag}</span>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:14,fontWeight:600,color:"var(--parch)"}}>{cr.nm||"Unnamed"}</span>
              <span style={{fontFamily:"'EB Garamond',serif",fontSize:11,color:"rgba(232,213,176,.4)",fontStyle:"italic"}}>{cr.size} {cr.subtype}</span>
              {cr.tag==="Summon"&&<span style={{fontFamily:"'Cinzel',serif",fontSize:10,color:colLight,background:col.replace(",1)",",0.1)"),border:"1px solid "+col.replace(",1)",",0.3)"),padding:"1px 7px",borderRadius:10}}>SL {cr.spellLevel}</span>}
              {!cr.collapsed&&<span style={{marginLeft:4,fontFamily:"'Cinzel',serif",fontSize:11,color:"rgba(232,213,176,.3)"}}>▲</span>}
              {cr.collapsed&&<span style={{marginLeft:4,fontFamily:"'Cinzel',serif",fontSize:11,color:"rgba(232,213,176,.3)"}}>▼</span>}
            </div>
            {/* Quick HP tracker */}
            {!cr.collapsed&&<div style={{display:"flex",gap:4,alignItems:"center"}}>
              <input value={cr.hpCurrent||""} onChange={function(e){upd(cr.id,"hpCurrent",e.target.value);}} placeholder="HP"
                style={{width:44,background:"rgba(201,74,42,.1)",border:"1px solid rgba(201,74,42,.25)",borderRadius:3,color:"#e07060",fontFamily:"'Cinzel',serif",fontSize:12,textAlign:"center",outline:"none",padding:"2px 4px"}} />
              <span style={{color:"rgba(232,213,176,.3)",fontSize:11}}>/</span>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:12,color:"rgba(232,213,176,.5)"}}>{hpDisplay(cr)}</span>
            </div>}
            <button onClick={function(){window.__confirm("Delete this creature?",function(){s("creatures",creatures.filter(function(x){return x.id!==cr.id;}));});}} style={{background:"transparent",border:"none",color:"rgba(201,74,42,.4)",cursor:"pointer",fontSize:14,padding:"0 4px"}}>×</button>
          </div>

          {!cr.collapsed&&<div style={{padding:"14px 16px"}}>

            {/* Identity row */}
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12,alignItems:"flex-end"}}>
              <div style={{display:"flex",flexDirection:"column",gap:2,flex:3,minWidth:100}}>
                <label style={{fontFamily:"'Cinzel',serif",fontSize:7,letterSpacing:1,color:"rgba(201,150,42,.5)",textTransform:"uppercase"}}>Name</label>
                <input value={cr.nm||""} onChange={function(e){upd(cr.id,"nm",e.target.value);}} placeholder="Creature name..."
                  style={{background:"transparent",border:"none",borderBottom:"1px solid rgba(201,150,42,.2)",color:"var(--parch)",fontFamily:"'Cinzel',serif",fontSize:14,outline:"none",padding:"2px 0"}} />
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:2}}>
                <label style={{fontFamily:"'Cinzel',serif",fontSize:7,letterSpacing:1,color:"rgba(201,150,42,.5)",textTransform:"uppercase"}}>Tag</label>
                <select value={cr.tag} onChange={function(e){upd(cr.id,"tag",e.target.value);}}
                  style={{background:"rgba(0,0,0,.4)",border:"none",borderBottom:"1px solid rgba(201,150,42,.2)",color:"var(--parch)",fontFamily:"'Cinzel',serif",fontSize:11,padding:"2px 4px",outline:"none",cursor:"pointer"}}>

              </div>

                <input value={cr.alignment||""} onChange={function(e){upd(cr.id,"alignment",e.target.value);}} placeholder="Unaligned"

              </div>

                    else s("creatures",creatures.map(function(x){return x.id===cr.id?{...x,spellLevel:Math.min(9,Math.max(1,parseInt(e.target.value)||1)),_slEmpty:false}:x;}));

                  style={{width:44,background:"rgba(0,0,0,.3)",border:"none",borderBottom:"1px solid "+col.replace(",1)",",0.4)"),color:colLight,fontFamily:"'Cinzel',serif",fontSize:16,textAlign:"center",outline:"none",fontWeight:700}} />

                  {acDisplay(cr)}
                </div>
              </div>
              {/* HP */}
              <div>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:1,color:"rgba(201,150,42,.5)",textTransform:"uppercase",marginBottom:2}}>Max HP</div>

                <div style={{display:"flex",gap:3,justifyContent:"center",flexWrap:"wrap",maxWidth:76}}>

                      }} />;

                })()}

              {ABLS.map(function(abl){
                var val=fmtStat(abl,cr);
                var mod=getMod(abl,cr);
                var saveProf=!!(cr.saveProficiencies&&cr.saveProficiencies[abl]);

                  // Creature's own DC — apply exhaustion only if "Affects All DCs" is checked on page 1

                  dcVal=computeCreatureFormula(dc.customFormula,{c,creature:cr,spellLevel:cr.spellLevel||1})+dcExhPen2;

function ConfirmModal({message,onYes,onNo}){
  return ReactDOM.createPortal(
    <div style={{position:"fixed",inset:0,zIndex:99999,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,.8)"}} onClick={onNo}>
      <div style={{background:"#1a1208",border:"1px solid rgba(201,74,42,.4)",padding:"22px 28px",minWidth:280,maxWidth:400,width:"90vw",boxShadow:"0 8px 40px rgba(0,0,0,.9)"}} onClick={function(e){e.stopPropagation();}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:11,letterSpacing:1,color:"rgba(232,213,176,.7)",marginBottom:18,lineHeight:1.6}}>{message||"Are you sure you want to delete this?"}</div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <button onClick={onNo} style={{background:"transparent",border:"1px solid rgba(201,150,42,.25)",color:"rgba(232,213,176,.45)",fontFamily:"'Cinzel',serif",fontSize:10,padding:"5px 14px",cursor:"pointer",borderRadius:2}}>Cancel</button>
          <button onClick={onYes} style={{background:"rgba(201,74,42,.2)",border:"1px solid rgba(201,74,42,.5)",color:"#e07060",fontFamily:"'Cinzel',serif",fontSize:10,padding:"5px 14px",cursor:"pointer",borderRadius:2}}>Delete</button>
        </div>
      </div>
    </div>,
    document.body
  );
}

function App(){
  const [pg,setPg]=useState(0);
  const [c,setC]=useState(init());
  const s=(k,v)=>setC(function(prev){const next={...prev,[k]:typeof v==="function"?v(prev[k]):v};if(window.__characterAutoSave)setTimeout(function(){window.__characterAutoSave(next);},100);return next;});
  const [hiddenTabs,setHiddenTabs]=useState(function(){try{var h=JSON.parse(localStorage.getItem('_ht'));return Array.isArray(h)?h:[];}catch(e){return [];}});
  const [showTabMgr,setShowTabMgr]=useState(false);
  const savedRolls=c.savedRolls||[];
  const saveSRApp=function(updater){s("savedRolls",updater);};

  // Global confirm modal
  const [confirmState,setConfirmState]=useState({open:false,message:"",onConfirm:null});
  React.useEffect(function(){
    window.__confirm=function(message,onConfirm){
      setConfirmState({open:true,message,onConfirm});
    };
    return function(){delete window.__confirm;};
  },[]);
  const toggleHide=function(i){
    setHiddenTabs(function(prev){
      var next=prev.indexOf(i)>=0?prev.filter(function(x){return x!==i;}):[...prev,i];
      try{localStorage.setItem('_ht',JSON.stringify(next));}catch(e){}
      // If current page is being hidden, jump to first visible page
      if(next.indexOf(pg)>=0) setPg(PAGES.findIndex(function(_,j){return next.indexOf(j)<0;}));
      return next;
    });
  };

  // Avatar pan/zoom stored in character state so it persists with save/load
  const avX=c.avX||0;
  const avY=c.avY||0;
  const avScale=c.avScale||1;
  const setAvX=(v)=>s("avX",typeof v==="function"?v(avX):v);
  const setAvY=(v)=>s("avY",typeof v==="function"?v(avY):v);
  const setAvScale=(v)=>s("avScale",typeof v==="function"?v(avScale):v);
  const [dragging,setDragging]=useState(false);
  const [dragStart,setDragStart]=useState({x:0,y:0,ox:0,oy:0});

  const onAvMouseDown=function(e){
    if(!c.portrait) return;
    e.preventDefault();
    setDragging(true);
    setDragStart({x:e.clientX,y:e.clientY,ox:avX,oy:avY});
  };
  const onAvMouseMove=function(e){
    if(!dragging) return;
    setAvX(dragStart.ox+(e.clientX-dragStart.x));
    setAvY(dragStart.oy+(e.clientY-dragStart.y));
  };
  const onAvMouseUp=function(){setDragging(false);};
  const onAvWheel=function(e){
    if(!c.portrait) return;
    e.preventDefault();
    setAvScale(function(prev){return Math.min(8,Math.max(0.3,prev-(e.deltaY>0?0.1:-0.1)));});
  };
  const lastTouchDist=useState(null);
  const onAvTouchStart=function(e){
    if(!c.portrait) return;
    if(e.touches.length===1){
      setDragging(true);
      setDragStart({x:e.touches[0].clientX,y:e.touches[0].clientY,ox:avX,oy:avY});
    }
  };
  const onAvTouchMove=function(e){
    if(!dragging||!c.portrait) return;
    if(e.touches.length===1){
      setAvX(dragStart.ox+(e.touches[0].clientX-dragStart.x));
      setAvY(dragStart.oy+(e.touches[0].clientY-dragStart.y));
    }
  };

  return (
    <>
      <style>{CSS}</style>
      {confirmState.open&&<ConfirmModal
        message={confirmState.message}
        onYes={function(){if(confirmState.onConfirm)confirmState.onConfirm();setConfirmState({open:false,message:"",onConfirm:null});}}
        onNo={function(){setConfirmState({open:false,message:"",onConfirm:null});}}
      />}
      <div className="app" onMouseMove={onAvMouseMove} onMouseUp={onAvMouseUp}>
        <div className="hdr">
          <div className="hdr-row">
            {/* Title — always centred; portrait anchors to its left */}
            <div className="hdr-text">
              {c.portrait&&(
                <div className="hdr-avatar-wrap">
                  <div
                    className="hdr-avatar"
                    onMouseDown={onAvMouseDown}
                    onWheel={onAvWheel}
                    onTouchStart={onAvTouchStart}
                    onTouchMove={onAvTouchMove}
                    onTouchEnd={function(){setDragging(false);}}
                    title="Drag to reposition - scroll to zoom"
                  >
                    <img
                      src={c.portrait}
                      alt="Avatar"
                      style={{
                        position:"absolute",
                        maxWidth:"none",maxHeight:"none",
                        width:"auto",height:"auto",
                        top:"50%",left:"50%",
                        transform:"translate(-50%, -50%) translate("+avX+"px,"+avY+"px) scale("+avScale+")",
                        transformOrigin:"50% 50%"
                      }}
                      draggable={false}
                    />
                  </div>
                  <div className="hdr-avatar-hint">drag to reposition</div>
                  <div style={{display:"flex",alignItems:"center",gap:4,marginTop:4,width:104}}>
                    <button onClick={function(e){e.stopPropagation();setAvScale(function(p){return Math.max(0.1,+(p-0.1).toFixed(2));});}}
                      style={{background:"transparent",border:"1px solid rgba(201,150,42,.3)",color:"rgba(201,150,42,.6)",cursor:"pointer",width:16,height:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,lineHeight:1,flexShrink:0,padding:0}}>-</button>
                    <input type="range" min="1" max="300" step="1" value={Math.round(avScale*100)}
                      onChange={function(e){setAvScale(parseInt(e.target.value)/100);}}
                      style={{flex:1,height:3,accentColor:"rgba(201,150,42,.7)",cursor:"pointer"}} />
                    <button onClick={function(e){e.stopPropagation();setAvScale(function(p){return Math.min(3,+(p+0.1).toFixed(2));});}}
                      style={{background:"transparent",border:"1px solid rgba(201,150,42,.3)",color:"rgba(201,150,42,.6)",cursor:"pointer",width:16,height:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,lineHeight:1,flexShrink:0,padding:0}}>+</button>
                  </div>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:1,color:"rgba(201,150,42,.3)",marginTop:2,textAlign:"center"}}>{Math.round(avScale*100)+"%"}</div>
                </div>
              )}
              <div className="hdr-title">Character Record</div>
              <div className="hdr-sub">{c.name||"D\u0026D 5th Edition"}</div>
              {(()=>{
                const cls=(c.classes&&c.classes.length>0?c.classes:[{nm:c.cls||"",lv:"",hd:"d6"}]).filter(function(cl){return (cl.nm||"").trim();});
                if(!cls.length) return null;
                const totalLv=cls.reduce(function(t,cl){return t+(parseInt(cl.lv)||0);},0);
                const classStr=cls.length===1
                  ?(totalLv>0?"Level "+totalLv+" ":"")+cls[0].nm
                  :(totalLv>0?"Level "+totalLv+" · ":"")+cls.map(function(cl){return cl.nm+(parseInt(cl.lv)>0?" "+cl.lv:"");}).join(" / ");
                return <div style={{fontFamily:"'EB Garamond',serif",fontSize:13,fontStyle:"italic",color:"rgba(232,213,176,.45)",letterSpacing:.5,marginTop:1}}>{classStr}</div>;
              })()}
              <div className="divider"><span>*</span></div>
            </div>
            {/* Tabs button — absolutely top-right */}
            <div style={{position:"absolute",right:0,top:0,paddingTop:4}}>
              <button onClick={function(){setShowTabMgr(function(v){return !v;});}}
                title="Show / hide tabs"
                style={{background:"transparent",border:"1px solid rgba(201,150,42,.25)",color:"rgba(201,150,42,.5)",fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:1,padding:"4px 8px",cursor:"pointer",borderRadius:2,transition:"all .15s",whiteSpace:"nowrap"}}>
                ☰ Tabs
              </button>
              {showTabMgr&&(
                <div style={{position:"absolute",right:0,top:"100%",marginTop:4,background:"#1a1410",border:"1px solid rgba(201,150,42,.3)",padding:"10px 14px",zIndex:200,minWidth:200,boxShadow:"0 4px 24px rgba(0,0,0,.6)"}}>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:2,color:"rgba(201,150,42,.5)",textTransform:"uppercase",marginBottom:8}}>Visible Tabs</div>
                  {PAGES.map(function(page,i){
                    if(!page.hideable) return null;
                    var hidden=hiddenTabs.indexOf(i)>=0;
                    return (
                      <div key={i} onClick={function(){toggleHide(i);}}
                        style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",cursor:"pointer",borderBottom:"1px solid rgba(201,150,42,.07)"}}>
                        <div style={{width:13,height:13,borderRadius:2,border:"1px solid "+(hidden?"rgba(184,154,240,.25)":"var(--arcane)"),background:hidden?"rgba(0,0,0,.3)":"var(--arcane)",flexShrink:0,transition:"all .15s"}} />
                        <span style={{fontFamily:"'EB Garamond',serif",fontSize:13,color:hidden?"rgba(232,213,176,.3)":"rgba(232,213,176,.85)",transition:"color .15s"}}>{page.label}</span>
                      </div>
                    );
                  })}
                  <div onClick={function(){setShowTabMgr(false);}} style={{marginTop:8,fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:1,color:"rgba(201,150,42,.4)",textAlign:"center",cursor:"pointer",paddingTop:6,borderTop:"1px solid rgba(201,150,42,.1)"}}>close</div>
                </div>
              )}
            </div>
          </div>
        </div>
        <nav className="nav">
          {PAGES.map(function(p,i){
            if(hiddenTabs.indexOf(i)>=0) return null;
            return <button key={i} className={pg===i?"nb act":"nb"} onClick={()=>setPg(i)}>{p.label}</button>;
          })}
        </nav>
        <div className="sheet">
          <div className="si">
            {pg===0&&<Page1 c={c} s={s} />}
            {pg===1&&<Page3 c={c} s={s} />}
            {pg===2&&<Page2 c={c} s={s} />}
            {pg===3&&<Page4 c={c} s={s} />}
            {pg===4&&<SpellPage c={c} s={s} from={0} to={9} />}
            {pg===5&&<ExploitPage c={c} s={s} />}
            {pg===6&&<CreaturesPage c={c} s={s} />}
            {pg===7&&<DiceRollerPage c={c} s={s} savedRolls={savedRolls} saveSRApp={saveSRApp} />}
            {pg===8&&<CompendiumPage c={c} s={s} />}
          </div>
          {(function(){const vis=PAGES.map(function(_,i){return i;}).filter(function(i){return hiddenTabs.indexOf(i)<0;});const cur=vis.indexOf(pg)+1;const tot=vis.length;return <div className="pgn">- {cur} / {tot} -</div>;})()}
        </div>
      </div>
    </>
  );
}

const _root=ReactDOM.createRoot(document.getElementById("root"));_root.render(React.createElement(App));
</script>
<div style="text-align:center;padding:18px 0 10px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;color:rgba(201,150,42,.35);user-select:none">D&D 5e Character Record · v1.70</div>

</script>
</body>
</html>
