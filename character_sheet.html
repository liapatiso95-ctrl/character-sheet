<body>
<div id="save-bar">
  <span class="sb-title">D&amp;D 5e</span>
  <button class="btn-save" onclick="saveToFile()">&#8659; Save JSON</button>
  <button class="btn-load" onclick="document.getElementById('fi').click()">&#8657; Load JSON</button>
  <button class="btn-new" onclick="newCharacter()">+ New</button>
  <input type="file" id="fi" accept=".json" style="display:none" onchange="loadFromFile(event)">
  <span class="save-status" id="ss">Loading...</span>
</div>

<script>
var LS='dnd5e_char_v1';
var __fileHandle=null; // remembers the file handle for quick re-save (Chrome/Edge)

function getSaveData(){
  // Try localStorage first, fall back to last known in-memory state
  var data=null;
  try{data=localStorage.getItem(LS);}catch(e){}
  if(!data&&window.__lastSaveState) data=JSON.stringify(window.__lastSaveState);
  if(!data){alert('Nothing to save yet.');return null;}
  var parsed;
  try{parsed=JSON.parse(data);}catch(e){alert('Save data corrupted.');return null;}
  if(parsed.portrait==='__stored_separately__'){
    var storedPortrait=null;
    try{storedPortrait=localStorage.getItem(LS+'_portrait');}catch(e){}
    parsed.portrait=storedPortrait||'';
  }
  return parsed;
}

function getFileName(parsed){
  return ((parsed.name||'character').replace(/[^a-z0-9]/gi,'_').toLowerCase()||'character')+'_character.json';
}

async function saveToFile(){
  var parsed=getSaveData();
  if(!parsed) return;
  var json=JSON.stringify(parsed);
  var fileName=getFileName(parsed);
  var blob=new Blob([json],{type:'application/json'});

  // Chrome/Edge desktop: File System Access API (folder picker, overwrite prompt)
  if(window.showSaveFilePicker&&!isWebView()){
    try{
      var handle=__fileHandle;
      if(!handle){
        handle=await window.showSaveFilePicker({
          suggestedName:fileName,
          types:[{description:'JSON Character File',accept:{'application/json':['.json']}}],
        });
        __fileHandle=handle;
      }
      var writable=await handle.createWritable();
      await writable.write(json);
      await writable.close();
      ss('Saved to '+handle.name);
      return;
    }catch(e){
      if(e.name==='AbortError') return; // user cancelled picker
      if(__fileHandle){__fileHandle=null;saveToFile();return;} // stale handle, retry
      // fall through to share/download
    }
  }

  // iOS Safari + Android Chrome/WebView: Web Share API with file
  var shareFile=new File([blob],fileName,{type:'application/json'});
  if(navigator.share&&navigator.canShare&&navigator.canShare({files:[shareFile]})){
    try{
      await navigator.share({files:[shareFile],title:fileName});
      ss('Saved!');
      return;
    }catch(e){
      if(e.name==='AbortError'||e.name==='NotAllowedError') return; // user cancelled
      // share failed for other reason — fall through to download
    }
  }

  // Firefox, desktop Safari, fallback: classic <a download>
  var u=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=u; a.download=fileName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(u);},1000);
  ss('Downloaded!');
}

function isWebView(){
  var ua=navigator.userAgent||'';
  return /wv\b/.test(ua)||/Android.*Version\/[\d.]+.*Chrome\/[\d.]+ Mobile/.test(ua);
}
function loadFromFile(e){
  var f=e.target.files[0];if(!f)return;
  __fileHandle=null;
  if(f.size===0){
    // Some Android browsers report 0 before the file is ready — try anyway
    // alert('File appears to be empty (0 bytes). Try moving it to Downloads and loading from there.');
    // e.target.value='';return;
  }
  var r=new FileReader();
  r.onload=function(ev){
    var result=ev.target.result;
    var text;
    // Handle both ArrayBuffer and string results
    if(result instanceof ArrayBuffer){
      try{text=new TextDecoder('utf-8').decode(result);}
      catch(de){text=String.fromCharCode.apply(null,new Uint8Array(result));}
    } else {
      text=result;
    }
    if(!text||text.length===0){
      alert('File was read but contained no data (size reported: '+f.size+' bytes). Please try again.');
      return;
    }
    var parsed;
    try{parsed=JSON.parse(text);}
    catch(err){alert('Could not parse file: '+err.message+'\n\nFile size read: '+text.length+' chars');e.target.value='';return;}
    if(parsed.portrait&&parsed.portrait.length>100){
      try{localStorage.setItem(LS+'_portrait',parsed.portrait);}catch(pe){}
      parsed.portrait='__stored_separately__';
    }
    var saved=false;
    try{localStorage.setItem(LS,JSON.stringify(parsed));saved=true;}catch(se){}
    if(!saved){
      window.__characterLoad=function(){return parsed;};
      ss('Loaded (no local save) - reloading...');
      setTimeout(function(){location.reload();},500);
      return;
    }
    ss('Loaded - reloading...');
    setTimeout(function(){location.reload();},500);
  };
  r.onerror=function(){alert('FileReader error: '+r.error+'\nFile size: '+f.size);};
  // Try ArrayBuffer first — more reliable on Android
  try{r.readAsArrayBuffer(f);}
  catch(e2){r.readAsText(f);}
  e.target.value='';
}
function newCharacter(){
  if(confirm('Start fresh? Unsaved changes will be lost.')){
    try{localStorage.removeItem(LS);}catch(e){}
    try{localStorage.removeItem(LS+'_portrait');}catch(e){}
    __fileHandle=null;
    setTimeout(function(){location.reload();},200);
  }
}
function ss(msg){var el=document.getElementById('ss');if(el)el.textContent=msg;}
window.__characterAutoSave=function(state){
  window.__lastSaveState=state; // in-memory fallback for Safari
  var toSave=Object.assign({},state);
  var portraitSaved=false;
  if(toSave.portrait&&toSave.portrait.length>100){
    try{
      localStorage.setItem(LS+'_portrait',toSave.portrait);
      portraitSaved=true;
    }catch(e){
      // Portrait too large for localStorage — keep it in main save attempt
      portraitSaved=false;
    }
    if(portraitSaved) toSave.portrait='__stored_separately__';
  }
  try{
    localStorage.setItem(LS,JSON.stringify(toSave));
    ss('Saved '+new Date().toLocaleTimeString()+(portraitSaved===false&&toSave.portrait&&toSave.portrait.length>100?' (portrait may not persist - too large for storage)':''));
  }catch(e){
    // Main save failed even with portrait inline — try without
    try{
      var slim=Object.assign({},state,{portrait:'__stored_separately__'});
      localStorage.setItem(LS,JSON.stringify(slim));
      ss('Saved (portrait in separate storage)');
    }catch(e2){
      try{
        var slim2=Object.assign({},state,{portrait:''});
        localStorage.setItem(LS,JSON.stringify(slim2));
        ss('Saved (portrait excluded - storage full)');
      }catch(e3){ss('Save failed - storage full');}
    }
  }
};
window.__characterLoad=function(def){
  try{
    var s=localStorage.getItem(LS);
    if(s){
      var p=JSON.parse(s);
      // Restore portrait if stored separately
      if(p.portrait==='__stored_separately__'){
        var storedPortrait=localStorage.getItem(LS+'_portrait');
        if(storedPortrait) p.portrait=storedPortrait;
        else p.portrait='';
      }
      // Start with defaults, then overlay saved data
      var merged=Object.assign({},def,p);
      // For nested objects: merge defaults with saved so new fields added in updates dont vanish
      ['stats','statsBase','statsBon','cur','drHidden','dmgRes','skAbil','svExtra','skExtra','skExp','acAbls','abilCheckBonusPerAbl','abilCheckBonusPerAblFormula','hdExp','senses','taH','dsOpen','svExtraFormula','skExtraFormula'].forEach(function(k){
        if(def[k]&&typeof def[k]==='object'&&!Array.isArray(def[k])){
          merged[k]=Object.assign({},def[k],p[k]||{});
        } else if(p[k]!==undefined){
          merged[k]=p[k];
        }
      });
      // For spell/slot/exploit objects: use saved value directly (arrays inside)
      ['sp','sl','expl'].forEach(function(k){
        if(p[k]) merged[k]=p[k];
        else merged[k]=def[k];
      });
      // Arrays: use saved if present, else default
      ['classes','inv','wpn','attuned_inv','feat','fts','bags','npc','factions','nt1','nt2','nt3','feat','fts','ds','df','spellClasses','exploitClasses','savedRolls','creatures'].forEach(function(k){
        merged[k]=Array.isArray(p[k])?p[k]:def[k];
      });
      // Migrate legacy boh1/boh2 to new bags
      [1,2].forEach(function(n){
        if(merged['boh'+n]){
          var legacyInv=Array.isArray(merged['boh_inv'+n])?merged['boh_inv'+n]:[];
          var legacyCur=merged['boh_cur'+n]||{};
          var newBags=Array.isArray(merged.bags)?[...merged.bags]:[];
          newBags.push({id:'migrated_boh'+n+'_'+Date.now(),nm:'Bag of Holding',maxLbs:500,inv:legacyInv,cur:legacyCur});
          merged.bags=newBags;
          merged['boh'+n]=false;
          merged['boh_inv'+n]=[];
          merged['boh_cur'+n]={};
        }
      });
      ss('Character loaded');
      return merged;
    }
  }catch(e){ss('Load error: '+e.message);}
  ss('New character');
  return def;
};
</script>

const mods = s => { const n=parseInt(s)||10; const m=Math.floor((n-10)/2); return m>=0?"+"+m:""+m; };

// Shared helper: get total ability score from character state (base + bonus)
const getTotal=(c,st)=>(parseInt(c.statsBase&&c.statsBase[st]||0)||0)+(parseInt(c.statsBon&&c.statsBon[st]||0)||0);
const getMod=(c,st)=>Math.floor((getTotal(c,st)-10)/2);

// ─── Global Truncation Tooltip ────────────────────────────────────────────────
// Single floating tooltip, rendered via a portal-style fixed div injected once.
(function(){
  if(document.getElementById('trunc-tip-el')) return;
  var el=document.createElement('div');
  el.id='trunc-tip-el';
  document.body.appendChild(el);
})();

function showTruncTip(text, anchorEl){
  var el=document.getElementById('trunc-tip-el');
  if(!el) return;
  // Clear old
  el.innerHTML='';
  if(!text){return;}
  var tip=document.createElement('div');
  tip.className='trunc-tip';
  tip.textContent=text;
  el.appendChild(tip);
  // Position: below anchor by default
  var rect=anchorEl.getBoundingClientRect();
  var vw=window.innerWidth, vh=window.innerHeight;
  var tipW=Math.min(320, vw-16);
  // horizontal: align to anchor left, clamped
  var left=Math.max(8, Math.min(rect.left, vw-tipW-8));
  var top=rect.bottom+6;
  var above=false;
  // If would go off bottom, show above
  if(top+120>vh){top=rect.top-10;above=true;tip.classList.add('tip-above');}
  tip.style.left=left+'px';
  tip.style.top=above?(rect.top-tip.offsetHeight-10)+'px':top+'px';
  // Re-position vertically after render (we know height now)
  requestAnimationFrame(function(){
    var h=tip.offsetHeight;
    if(above) tip.style.top=(rect.top-h-10)+'px';
    // Clamp arrow: arrow left is always 14px from tip left, keep it over the input
    // (decorative; no adjustment needed for now)
  });
}

function hideTruncTip(){
  var el=document.getElementById('trunc-tip-el');
  if(el) el.innerHTML='';
}

// TipInput: input with an overlay "…" button that appears when text is truncated.
// Hover over the button (desktop) or tap it (mobile) to show the full text tooltip.
function TipInput({value, onChange, placeholder, style, className, type, checked, disabled, title}){
  const ref=React.useRef(null);
  const wrapRef=React.useRef(null);
  const [truncated, setTruncated]=React.useState(false);
  const [tipOpen, setTipOpen]=React.useState(false);

  // Check truncation after every render
  React.useEffect(function(){
    var el=ref.current;
    if(!el){setTruncated(false);return;}
    setTruncated(el.scrollWidth > el.clientWidth + 1);
  });

  function showTip(){
    var el=ref.current;
    if(!el||!el.value) return;
    setTipOpen(true);
    showTruncTip(el.value, wrapRef.current||el);
  }
  function hideTip(){
    setTipOpen(false);
    hideTruncTip();
  }

  // Close tooltip when clicking elsewhere
  React.useEffect(function(){
    if(!tipOpen) return;
    function onDown(e){
      if(wrapRef.current && !wrapRef.current.contains(e.target)) hideTip();
    }
    document.addEventListener('mousedown', onDown);
    document.addEventListener('touchstart', onDown);
    return function(){
      document.removeEventListener('mousedown', onDown);
      document.removeEventListener('touchstart', onDown);
    };
  }, [tipOpen]);

  // If it's a checkbox, pass through untouched
  if(type==='checkbox'){
    return <input type="checkbox" className={className} checked={checked} disabled={disabled}
      onChange={onChange} title={title} style={style} />;
  }

  return (
    <div ref={wrapRef} style={{position:"relative",display:"flex",alignItems:"center",width:style&&style.width||"100%",flexShrink:style&&style.flexShrink!=null?style.flexShrink:undefined,minWidth:style&&style.minWidth||undefined}}>
      <input
        ref={ref}
        type={type||"text"}
        value={value}
        onChange={onChange}
        placeholder={placeholder}
        style={{...style, paddingRight: truncated ? "18px" : (style&&style.paddingRight||style&&style.padding||"3px 4px")}}
        className={className}
        disabled={disabled}
        title={title}
        onFocus={hideTip}
      />
      {truncated && (
        <span
          onMouseEnter={showTip}
          onMouseLeave={hideTip}
          onClick={function(e){e.stopPropagation();e.preventDefault();tipOpen?hideTip():showTip();}}
          onTouchEnd={function(e){e.stopPropagation();e.preventDefault();tipOpen?hideTip():showTip();}}
          style={{
            position:"absolute", right:2, top:"50%", transform:"translateY(-50%)",
            fontFamily:"'EB Garamond',serif", fontSize:11, color:"rgba(201,150,42,0.45)",
            cursor:"pointer", userSelect:"none", lineHeight:1,
            padding:"0 2px", pointerEvents:"all",
            background:"transparent",
          }}
          title="Show full text"
        >…</span>
      )}
    </div>
  );
}

// ─── Sortable column header ────────────────────────────────────────────────────
function SortableTh({label, col, sort, onSort, style, title}){
  const active=sort&&sort.col===col;
  const dir=active?sort.dir:null;
  return (
    <th onClick={()=>onSort(col)} title={title}
      style={{cursor:"pointer",userSelect:"none",whiteSpace:"nowrap",...style}}>
      {label}
      <span style={{marginLeft:3,fontSize:9,opacity:active?0.9:0.2,color:active?"var(--gold-l)":"inherit",display:"inline-block",lineHeight:1,verticalAlign:"middle"}}>
        {dir==="asc"?"▲":dir==="desc"?"▼":"⇅"}
      </span>
    </th>
  );
}
// sortItems(arr, sort, keyFn) — returns a new sorted array with original indices preserved
// arr: array of items; sort: {col, dir}; keyFn: (item) => {col: value}
function sortItems(arr, sort){
  if(!sort||!sort.col||!sort.dir) return arr.map(function(item,i){return {item,i};});
  return arr.map(function(item,i){return {item,i};}).sort(function(a,b){
    var av=a.item[sort.col]; var bv=b.item[sort.col];
    // Boolean sort: ascending = true (checked) first
    var isBool=(typeof av==="boolean"||av===true||av===false||av===undefined)&&(typeof bv==="boolean"||bv===true||bv===false||bv===undefined);
    var primary;
    if(isBool){
      var an=av?1:0; var bn=bv?1:0;
      primary=sort.dir==="asc"?bn-an:an-bn; // asc = checked first = higher value first
    } else {
      av=(av||"").toString().toLowerCase(); bv=(bv||"").toString().toLowerCase();
      var an2=parseFloat(av), bn2=parseFloat(bv);
      primary=!isNaN(an2)&&!isNaN(bn2)?(sort.dir==="asc"?an2-bn2:bn2-an2):(sort.dir==="asc"?av.localeCompare(bv):bv.localeCompare(av));
    }
    if(primary!==0) return primary;
    if(sort.col==="nm") return 0;
    var an3=(a.item.nm||"").toString().toLowerCase();
    var bn3=(b.item.nm||"").toString().toLowerCase();
    return an3.localeCompare(bn3);
  });
}
function cycleSort(sort, col){
  if(!sort||sort.col!==col) return {col,dir:"asc"};
  if(sort.dir==="asc") return {col,dir:"desc"};
  return null; // reset
}

// ─── ChargeBadge — inline pill shown in the Notes cell ────────────────────────
function ChargeBadge({it, onClick}){
  if(!it.charges||!it.charges.enabled) return null;
  const chMax=parseInt(it.charges.max)||0;
  if(chMax===0) return null;
  const chUsed=parseInt(it.charges.used)||0;
  const chRem=Math.max(0,chMax-chUsed);
  const col=chRem>chMax*0.6?"#4a9c5c":chRem>chMax*0.2?"#c9962a":"#c94a2a";
  return (
    <span onClick={onClick} title="Charges remaining — click to expand"
      style={{flexShrink:0,fontFamily:"'Cinzel',serif",fontSize:9,fontWeight:600,
        color:col,border:"1px solid "+col+"55",
        padding:"1px 6px",borderRadius:10,whiteSpace:"nowrap",
        background:col+"14",cursor:"pointer",userSelect:"none"}}>
      {chRem}/{chMax}
    </span>
  );
}

// ─── ChargeTracker ─────────────────────────────────────────────────────────────
function parseRestoreFormula(str){
  // Parses "1d6+2", "2d4-1", "d8", "3", etc.
  str=(str||"").trim().toLowerCase();
  var m=str.match(/^(\d*)d(\d+)\s*([+-]\s*\d+)?$/);
  if(m){
    var n=parseInt(m[1]||"1");
    var s=parseInt(m[2]);
    var mod=m[3]?parseInt(m[3].replace(/\s/g,"")):0;
    return {n,s,mod,isFlat:false};
  }
  var flat=parseInt(str);
  if(!isNaN(flat)) return {n:0,s:0,mod:flat,isFlat:true};
  return null;
}
function rollRestoreFormula(parsed){
  if(!parsed) return null;
  if(parsed.isFlat) return {total:parsed.mod,rolls:[],mod:0,formula:String(parsed.mod)};
  var rolls=[];
  for(var i=0;i<parsed.n;i++) rolls.push(Math.floor(Math.random()*parsed.s)+1);
  var total=rolls.reduce(function(a,b){return a+b;},0)+parsed.mod;
  return {total,rolls,mod:parsed.mod,formula:parsed.n+"d"+parsed.s+(parsed.mod>0?"+"+parsed.mod:parsed.mod<0?""+parsed.mod:"")};
}

function ChargeTracker({it, onUpdate}){
  const ch=it.charges||{};
  const max=parseInt(ch.max)||0;
  const used=parseInt(ch.used)||0;
  const remaining=Math.max(0,max-used);
  const [restoreMsg,setRestoreMsg]=React.useState(null);
  const remCol=max===0?"rgba(201,150,42,.4)":remaining>max*0.6?"#4a9c5c":remaining>max*0.2?"#c9962a":"#c94a2a";

  function upd(field,val){onUpdate({...ch,[field]:val});}

  function doRestore(){
    var formula=(ch.restore||"").trim();
    if(!formula) return;
    var parsed=parseRestoreFormula(formula);
    if(!parsed){setRestoreMsg("Invalid formula");setTimeout(function(){setRestoreMsg(null);},2500);return;}
    var result=rollRestoreFormula(parsed);
    var restored=Math.min(result.total,used); // can't restore more than used
    var newUsed=Math.max(0,used-restored);
    onUpdate({...ch,used:String(newUsed)});
    var rollDetail=result.rolls.length>0?"["+result.rolls.join("+")+"]"+(result.mod!==0?(result.mod>0?"+"+result.mod:result.mod):"")+" = "+result.total:""+result.total;
    setRestoreMsg("Rolled "+rollDetail+" → restored "+restored+" charge"+(restored!==1?"s":"")+". Now "+String(max-newUsed)+" / "+max+".");
    setTimeout(function(){setRestoreMsg(null);},4000);
  }

  if(!ch.enabled) return (
    <div style={{marginTop:6,display:"inline-flex"}}>
      <span onClick={function(){onUpdate({enabled:true,max:"",used:"0",restore:"",msg:null});}}
        style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:1,textTransform:"uppercase",color:"rgba(201,150,42,.35)",border:"1px solid rgba(201,150,42,.15)",padding:"2px 8px",borderRadius:2,userSelect:"none"}}>
        + Track Charges
      </span>
    </div>
  );

  return (
    <div style={{marginTop:8,padding:"6px 10px",background:"rgba(201,150,42,.05)",border:"1px solid rgba(201,150,42,.15)",borderRadius:2}}>
      <div style={{display:"flex",gap:10,alignItems:"flex-end",flexWrap:"wrap"}}>
        {/* Max */}
        <div style={{display:"flex",flexDirection:"column",gap:2,alignItems:"center"}}>
          <label style={{fontFamily:"'Cinzel',serif",fontSize:7,letterSpacing:1,textTransform:"uppercase",color:"rgba(201,150,42,.5)"}}>Max</label>
          <input value={ch.max||""} onChange={function(e){upd("max",e.target.value);}} placeholder="0"
            style={{width:40,background:"transparent",border:"none",borderBottom:"1px solid rgba(201,150,42,.3)",color:"var(--gold-l)",fontFamily:"'Cinzel',serif",fontSize:12,textAlign:"center",outline:"none"}} />
        </div>
        {/* Used */}
        <div style={{display:"flex",flexDirection:"column",gap:2,alignItems:"center"}}>
          <label style={{fontFamily:"'Cinzel',serif",fontSize:7,letterSpacing:1,textTransform:"uppercase",color:"rgba(201,150,42,.5)"}}>Used</label>
          <input value={ch.used||""} onChange={function(e){upd("used",e.target.value);}} placeholder="0"
            style={{width:40,background:"transparent",border:"none",borderBottom:"1px solid rgba(201,74,42,.3)",color:"var(--ember)",fontFamily:"'Cinzel',serif",fontSize:12,textAlign:"center",outline:"none"}} />
        </div>
        {/* Remaining */}
        {max>0&&(
          <div style={{display:"flex",flexDirection:"column",gap:2,alignItems:"center"}}>
            <label style={{fontFamily:"'Cinzel',serif",fontSize:7,letterSpacing:1,textTransform:"uppercase",color:"rgba(201,150,42,.5)"}}>Left</label>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:18,fontWeight:700,color:remCol,lineHeight:1}}>{remaining}</div>
          </div>
        )}
        {/* − ↺ + controls */}
        <div style={{display:"flex",gap:3,alignItems:"flex-end"}}>
          <div onClick={function(){if(used<max)upd("used",String(used+1));}}
            style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:13,fontWeight:700,color:"rgba(201,74,42,.7)",border:"1px solid rgba(201,74,42,.3)",width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:2,userSelect:"none",lineHeight:1,opacity:used>=max?0.35:1}}
            title="Spend 1 charge">−</div>
          <div onClick={function(){upd("used","0");}}
            style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:9,color:"rgba(74,156,92,.7)",border:"1px solid rgba(74,156,92,.3)",padding:"0 6px",height:20,display:"flex",alignItems:"center",borderRadius:2,userSelect:"none"}}
            title="Reset charges">↺</div>
          <div onClick={function(){if(used>0)upd("used",String(used-1));}}
            style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:13,fontWeight:700,color:"rgba(74,156,92,.7)",border:"1px solid rgba(74,156,92,.3)",width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:2,userSelect:"none",lineHeight:1}}
            title="Recover 1 charge">+</div>
        </div>
        {/* Restore formula */}
        <div style={{display:"flex",flexDirection:"column",gap:2}}>
          <label style={{fontFamily:"'Cinzel',serif",fontSize:7,letterSpacing:1,textTransform:"uppercase",color:"rgba(201,150,42,.5)"}}>Restore Formula</label>
          <div style={{display:"flex",gap:4,alignItems:"center"}}>
            <input value={ch.restore||""} onChange={function(e){upd("restore",e.target.value);}} placeholder="1d6+1"
              style={{width:64,background:"transparent",border:"none",borderBottom:"1px solid rgba(201,150,42,.25)",color:"var(--parch)",fontFamily:"'EB Garamond',serif",fontSize:13,outline:"none",textAlign:"center"}} />
            <div onClick={doRestore}
              style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:.5,textTransform:"uppercase",color:"rgba(201,150,42,.7)",border:"1px solid rgba(201,150,42,.3)",padding:"2px 7px",borderRadius:2,userSelect:"none",opacity:(ch.restore||"").trim()?"1":"0.4"}}>
              Roll
            </div>
          </div>
        </div>
        {/* Remove tracker */}
        <div onClick={function(){window.__confirm("Remove charge tracker from this item?",function(){onUpdate(null);});}}
          style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:8,color:"rgba(201,74,42,.35)",border:"1px solid rgba(201,74,42,.15)",padding:"2px 6px",borderRadius:2,alignSelf:"flex-end",userSelect:"none",marginLeft:"auto"}}
          title="Remove charge tracker">✕ charges</div>
      </div>
      {restoreMsg&&(
        <div style={{marginTop:6,fontFamily:"'EB Garamond',serif",fontSize:12,color:"rgba(201,150,42,.8)",fontStyle:"italic",padding:"3px 6px",background:"rgba(201,150,42,.06)",borderRadius:2,border:"1px solid rgba(201,150,42,.15)"}}>
          {restoreMsg}
        </div>
      )}
    </div>
  );
}

function F({label,val,set,ph,lg}){
  return (
    <div className="fg">
      <label className="fl">{label}</label>
      <input className={lg?"fi fi-lg":"fi"} value={val} onChange={e=>set(e.target.value)} placeholder={ph||""} />
    </div>
  );
}

function TA({label,val,set,rows}){
  return (
    <div className="fg">
      {label&&<label className="fl">{label}</label>}
      <textarea className="fi" value={val} onChange={e=>set(e.target.value)} rows={rows||4} style={{minHeight:rows?rows*22:80}} />
    </div>
  );
}

function AutoTextarea({value,onChange,placeholder,style,className}){
  const ref=React.useRef(null);
  React.useEffect(function(){
    var el=ref.current;if(!el)return;
    el.style.height="auto";
    el.style.height=el.scrollHeight+"px";
  },[value]);
  return <textarea ref={ref} value={value||""} onChange={onChange} placeholder={placeholder}
    className={className}
    style={{minHeight:"1.5em",...style,height:"auto",overflow:"hidden",resize:"none"}} />;
}

function Page1({c,s}){
  const [acOpen,setAcOpen]=useState(false);
  const [iniModal,setIniModal]=useState(false);
  const [wpnOpen,setWpnOpen]=useState(null); // {idx, mode:"atk"|"dmg"}
  const [wpnSort,setWpnSort]=useState(null);
  const onWpnSort=(col)=>setWpnSort(prev=>cycleSort(prev,col));
  const stats=["STR","DEX","CON","INT","WIS","CHA"];
  const skills=[
    {n:"Acrobatics",a:"DEX"},{n:"Animal Handling",a:"WIS"},{n:"Arcana",a:"INT"},
    {n:"Athletics",a:"STR"},{n:"Deception",a:"CHA"},{n:"History",a:"INT"},
    {n:"Insight",a:"WIS"},{n:"Intimidation",a:"CHA"},{n:"Investigation",a:"INT"},
    {n:"Medicine",a:"WIS"},{n:"Nature",a:"INT"},{n:"Perception",a:"WIS"},
    {n:"Performance",a:"CHA"},{n:"Persuasion",a:"CHA"},{n:"Religion",a:"INT"},
    {n:"Sleight of Hand",a:"DEX"},{n:"Stealth",a:"DEX"},{n:"Survival",a:"WIS"},
  ];

  // Classes array drives level + prof bonus + hit dice
  const allClasses=c.classes&&c.classes.length>0?c.classes:[{nm:c.cls||"",lv:"",hd:"d6"}];
  const levelFromCls=()=>allClasses.reduce(function(t,cl){return t+(parseInt(cl.lv)||0);},0);
  const calcPb=()=>{const lv=levelFromCls();if(lv<1)return 2;return Math.ceil(lv/4)+1;};
  const pbBase=calcPb();
  const pbBon=parseInt((c.pbBonus||"").replace("+",""))||0;
  const pb=pbBase+pbBon;
  const HD_SIZES=["d4","d6","d8","d10","d12"];
  const conMod=()=>getMod(c,"CON");
  const calcMaxHP=()=>{
    var total=0,isFirst=true;
    allClasses.forEach(function(cl){
      var lv=parseInt(cl.lv)||0; if(lv<1)return;
      var ds=parseInt((cl.hd||"d6").replace("d",""))||6;
      var mean=Math.ceil((ds+1)/2);
      var hpBon=parseInt((cl.hpBonus||"").replace("+",""))||0;
      for(var i=0;i<lv;i++){
        if(isFirst){total+=Math.max(1,ds+conMod());isFirst=false;}
        else{total+=Math.max(1,mean+conMod());}
        total+=hpBon;
      }
    });
    return total>0?total:null;
  };

  // global manual/formula bonuses
  const svBon=c.svBonusFormula?computeBonusFromFormula(c.svBonusFormula,c):(parseInt((c.svBonus||"").replace("+",""))||0);
  const skBon=c.skBonusFormula?computeBonusFromFormula(c.skBonusFormula,c):(parseInt((c.skBonus||"").replace("+",""))||0);
  const getSvExtra=(abl)=>{const f=c.svExtraFormula&&c.svExtraFormula[abl];return f?computeBonusFromFormula(f,c):(parseInt((c.svExtra[abl]||"").replace("+",""))||0);};
  const getSkExtra=(nm)=>{const f=c.skExtraFormula&&c.skExtraFormula[nm];return f?computeBonusFromFormula(f,c):(parseInt((c.skExtra[nm]||"").replace("+",""))||0);};
  const modN=s2=>{const n=parseInt(s2)||10;return Math.floor((n-10)/2);};
  // Ability score total = base + bonus (uses shared helper)
  const statTotal=(st)=>getTotal(c,st);
  // Keep c.stats in sync for anything that reads it (saves, skills, spell DC etc)
  const getStatMod=(st)=>getMod(c,st);
  const modNSt=(st)=>getStatMod(st);

  // Exhaustion — must be defined before passives, skb, svb, initiative, attacks
  const exhLv=Math.min(6,Math.max(0,parseInt(c.exhaustion)||0));
  const exhPenalty=Math.min(5,exhLv)*-2;
  const exhSpeedPen=Math.min(5,exhLv)*-5;

  const abilChkBon=c.abilCheckBonusFormula?computeBonusFromFormula(c.abilCheckBonusFormula,c):(parseInt((c.abilCheckBonus||"").replace("+",""))||0);
  const abilChkBonPerAbl=(abl)=>{const f=(c.abilCheckBonusPerAblFormula||{})[abl];return f?computeBonusFromFormula(f,c):(parseInt(((c.abilCheckBonusPerAbl||{})[abl]||"").replace("+",""))||0);};
  const halfPb=c.halfProfChecks||c.halfProfSkills?Math.floor(pb/2):0;

  // "Has any prof" helpers — only used by the two toggle half-prof features
  const skillHasAnyProf=(sk)=>{
    if(c.skp&&c.skp[sk.n]) return true;
    const frms=[c.skBonusFormula,c.skExtraFormula&&c.skExtraFormula[sk.n],c.abilCheckBonusFormula,(c.abilCheckBonusPerAblFormula||{})[skAbil(sk)]];
    return frms.some(function(f){return formulaHasProf(f);});
  };
  const checkHasAnyProf=(abl)=>{
    const frms=[c.abilCheckBonusFormula,(c.abilCheckBonusPerAblFormula||{})[abl]];
    return frms.some(function(f){return formulaHasProf(f);});
  };

  // Initiative pre-computed (free stacking)
  const dexAblBon=abilChkBonPerAbl("DEX");
  const iniAblArrActual=c.iniFormula?(c.iniFormula.abls||["DEX"]):["DEX"];
  const iniProfModeActual=c.iniFormula?c.iniFormula.prof:"none"; // backward compat display
  const iniOwnProfBon=(()=>{
    if(c.iniFormula&&c.iniFormula.profs&&c.iniFormula.profs.length>0){
      return c.iniFormula.profs.reduce(function(t,p){return t+(p==="full"?pb:p==="half-up"?Math.ceil(pb/2):p==="half"?Math.floor(pb/2):0);},0);
    }
    var pm=c.iniFormula?c.iniFormula.prof:"none";
    return pm==="full"?pb:pm==="half-up"?Math.ceil(pb/2):pm==="half"?Math.floor(pb/2):0;
  })();
  const iniBonVal=c.iniFormula?(parseInt((c.iniFormula.flat||"").replace("+",""))||0):0;
  const iniAblSum2=iniAblArrActual.reduce(function(t,a){return t+getStatMod(a);},0);
  // Level component from formula (new lvlEntries array, legacy lvlType fallback)
  const iniLvlSum=(()=>{
    const f=c.iniFormula; if(!f) return 0;
    const entries=f.lvlEntries&&f.lvlEntries.length>0?f.lvlEntries:(f.lvlType&&f.lvlType!=="none"?[{type:f.lvlType,cls:f.lvlClass||""}]:[]);
    if(entries.length===0) return 0;
    const totalLv=levelFromCls();
    return entries.reduce(function(t,e){
      var type=e.type||"none";
      if(type==="total-full") return t+totalLv;
      if(type==="total-half-down") return t+Math.floor(totalLv/2);
      if(type==="total-half-up") return t+Math.ceil(totalLv/2);
      var cl=allClasses.find(function(x){return x.nm===e.cls;});
      var clLv=cl?parseInt(cl.lv)||0:0;
      if(type==="class-full") return t+clLv;
      if(type==="class-half-down") return t+Math.floor(clLv/2);
      if(type==="class-half-up") return t+Math.ceil(clLv/2);
      return t;
    },0);
  })();
  // halfProfChecks toggle only applies if initiative has no prof from any source
  const iniHalfProf=(c.halfProfChecks&&iniOwnProfBon===0&&!checkHasAnyProf("DEX"))?Math.floor(pb/2):0;
  const iniTotal=iniAblSum2+iniBonVal+iniOwnProfBon+iniLvlSum+iniHalfProf+abilChkBon+dexAblBon+exhPenalty;

  const fmtN=n=>n>=0?"+"+n:""+n;
  const skAbil=(sk)=>c.skAbil&&c.skAbil[sk.n]?c.skAbil[sk.n]:sk.a;

  // Numeric skill total — formula bonuses stack freely; only the two toggles check for existing prof
  const skbNum=(sk)=>{
    const a=skAbil(sk);const b=getStatMod(a);
    const proficient=!!(c.skp&&c.skp[sk.n]);
    const expert=proficient&&!!(c.skExp&&c.skExp[sk.n]);
    const ownProf=expert?pb*2:proficient?pb:0;
    const skBon=c.skBonusFormula?computeBonusFromFormula(c.skBonusFormula,c):(parseInt((c.skBonus||"").replace("+",""))||0);
    const skEx=c.skExtraFormula&&c.skExtraFormula[sk.n]?computeBonusFromFormula(c.skExtraFormula[sk.n],c):(parseInt(((c.skExtra||{})[sk.n]||"").replace("+",""))||0);
    const ablBon=abilChkBonPerAbl(a);
    // 2024 JoaT: only blocked by the prof checkbox
    const hpSkill=(c.halfProfSkills&&!skillHasAnyProf(sk))?Math.floor(pb/2):0;
    // 2014 JoaT: blocked by prof from any source (checkbox or formula)
    const hpCheck=(c.halfProfChecks&&!skillHasAnyProf(sk))?Math.floor(pb/2):0;
    return b+ownProf+skBon+skEx+abilChkBon+ablBon+Math.max(hpSkill,hpCheck)+exhPenalty;
  };
  const skb=(sk)=>fmtN(skbNum(sk));

  const svb=(a)=>{
    const b=getStatMod(a);
    const ownProf=(c.svp&&c.svp[a])?pb:0;
    const svBon=c.svBonusFormula?computeBonusFromFormula(c.svBonusFormula,c):(parseInt((c.svBonus||"").replace("+",""))||0);
    const svEx=c.svExtraFormula&&c.svExtraFormula[a]?computeBonusFromFormula(c.svExtraFormula[a],c):(parseInt(((c.svExtra||{})[a]||"").replace("+",""))||0);
    return fmtN(b+ownProf+svBon+svEx+exhPenalty);
  };

  // Passives: 10 + the skill's own total (all bonuses already included) + 5 if advantage
  const passivePerc=10+skbNum({n:"Perception",a:"WIS"})+(c.percAdv?5:0);
  const passiveIns=10+skbNum({n:"Insight",a:"WIS"})+(c.insAdv?5:0);
  const passiveInv=10+skbNum({n:"Investigation",a:"INT"})+(c.invAdv?5:0);

  return (
    <div>
      <div className="orn">Character</div>
      <div className="sh">Identity</div>
      <div className="thc">
        <F label="Character Name" val={c.name} set={v=>s("name",v)} ph="Archmage..." lg />
        <F label="Race" val={c.race} set={v=>s("race",v)} ph="Human, Elf..." />
        <F label="Background" val={c.bg} set={v=>s("bg",v)} ph="Sage..." />
      </div>
      <div className="tc">
        <F label="Alignment" val={c.aln} set={v=>s("aln",v)} ph="Neutral Good..." />
        <F label="XP" val={c.xp} set={v=>s("xp",v)} ph="0" />
      </div>
      <div className="tc">
        <F label="Age" val={c.age} set={v=>s("age",v)} ph="132" />
        <F label="Player Name" val={c.plr} set={v=>s("plr",v)} ph="Your name..." />
      </div>

      <div className="sh">Classes</div>
      {allClasses.map(function(cl,i){
        var updCls=function(field,val){
          var a=allClasses.map(function(x){return Object.assign({},x);});
          a[i][field]=val;
          s("classes",a);
          s("cls",a.map(function(x){return (x.nm||"")+(x.lv?" "+x.lv:"");}).filter(function(x){return x.trim();}).join(" / "));
        };
        return (
          <div key={i} style={{marginBottom:8,background:"rgba(0,0,0,.15)",padding:"10px 12px",borderLeft:"3px solid rgba(201,150,42,.2)"}}>
            <div style={{display:"flex",gap:8,alignItems:"flex-end",flexWrap:"wrap"}}>
              <div style={{flex:3,minWidth:110}}>
                <label className="fl">Class</label>
                <input className="fi" value={cl.nm||""} onChange={function(e){updCls("nm",e.target.value);}} placeholder="Wizard..." />
              </div>
              <div style={{flex:3,minWidth:110}}>
                <label className="fl">Subclass</label>
                <input className="fi" value={cl.sub||""} onChange={function(e){updCls("sub",e.target.value);}} placeholder="Evocation..." />
              </div>
              <div style={{width:56}}>
                <label className="fl">Level</label>
                <input className="fi" value={cl.lv||""} onChange={function(e){updCls("lv",e.target.value);}} placeholder="5" style={{textAlign:"center"}} />
              </div>
              <div style={{width:76}}>
                <label className="fl">Hit Die</label>
                <select value={cl.hd||"d6"} onChange={function(e){updCls("hd",e.target.value);}}
                  style={{width:"100%",background:"rgba(0,0,0,.4)",border:"none",borderBottom:"1px solid rgba(201,150,42,.35)",color:"var(--parch)",fontFamily:"'EB Garamond',serif",fontSize:14,padding:"6px 2px",outline:"none",cursor:"pointer"}}>
                  {HD_SIZES.map(function(h){return <option key={h} value={h} style={{background:"#1a1208"}}>{h}</option>;})}
                </select>
              </div>
              {c.hpAutoCalc&&(
                <div style={{width:56}}>
                  <label className="fl" style={{color:"rgba(201,74,42,.6)"}}>+HP/lvl</label>
                  <input className="fi" value={cl.hpBonus||""} onChange={function(e){updCls("hpBonus",e.target.value);}} placeholder="0"
                    style={{textAlign:"center",borderBottomColor:"rgba(201,74,42,.3)",color:"rgba(224,112,96,.9)"}} />
                </div>
              )}
              {allClasses.length>1&&(
                <button className="db" style={{paddingBottom:6}} onClick={function(){
                  window.__confirm("Delete this class?",function(){
                    var a=allClasses.filter(function(_,j){return j!==i;});
                    s("classes",a);
                    s("cls",a.map(function(x){return (x.nm||"")+(x.lv?" "+x.lv:"");}).filter(function(x){return x.trim();}).join(" / "));
                  });
                }}>x</button>
              )}
            </div>
            {/* Save DCs for this class */}
            {(function(){
              var dcs=cl.dcs||[];
              return <div style={{marginTop:8,borderTop:"1px solid rgba(201,150,42,.1)",paddingTop:8}}>
                {dcs.map(function(dc,di){
                  var dcAbl=dc.abl||"INT";
                  var dcBonus=dc.bonusFormula?computeBonusFromFormula(dc.bonusFormula,c):(parseInt((dc.bonus||"").replace("+",""))||0);
                  var dcExhPen=(dc.isSpell?(c.exhAffectAllDC||c.exhAffectSpellDC):c.exhAffectAllDC)?exhPenalty:0;
                  var dcTotal=8+pb+getStatMod(dcAbl)+dcBonus+dcExhPen;
                  var updDC=function(field,val){
                    var a=allClasses.map(function(x,xi){return xi===i?Object.assign({},x,{dcs:(x.dcs||[]).map(function(d,dii){return dii===di?Object.assign({},d,{[field]:val}):d;})}):x;});
                    s("classes",a);
                  };
                  return <div key={di} style={{display:"flex",gap:8,alignItems:"flex-end",flexWrap:"wrap",marginBottom:6}}>
                    <div style={{display:"flex",flexDirection:"column",gap:2,flex:2,minWidth:80}}>
                      <label className="fl" style={{fontSize:7}}>DC Name</label>
                      <input value={dc.nm||""} onChange={function(e){updDC("nm",e.target.value);}} placeholder="Spell DC..."
                        style={{background:"transparent",border:"none",borderBottom:"1px solid rgba(201,150,42,.2)",color:"var(--parch)",fontFamily:"'Cinzel',serif",fontSize:11,outline:"none",padding:"1px 0"}} />
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:2}}>
                      <label className="fl" style={{fontSize:7}}>Ability</label>
                      <select value={dcAbl} onChange={function(e){updDC("abl",e.target.value);}}
                        style={{background:"rgba(0,0,0,.4)",border:"none",borderBottom:"1px solid rgba(201,150,42,.2)",color:"rgba(232,213,176,.7)",fontFamily:"'Cinzel',serif",fontSize:11,padding:"2px 3px",outline:"none",cursor:"pointer",width:52}}>
                        {["STR","DEX","CON","INT","WIS","CHA"].map(function(a){return <option key={a} value={a} style={{background:"#1a1208"}}>{a}</option>;})}
                      </select>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:2,alignItems:"center"}}>
                      <label className="fl" style={{fontSize:7}}>Bonus</label>
                      <BonusField c={c} value={dc.bonus||""} formula={dc.bonusFormula}
                        onApply={function(total,frm){updDC("bonus",""+total);updDC("bonusFormula",frm||null);}}
                        label={(dc.nm||"DC")+" Bonus"}
                        inputStyle={{width:32,fontSize:11,borderBottom:"1px solid rgba(201,150,42,.2)"}} />
                    </div>
                    {/* Spell DC toggle */}
                    <div onClick={function(){updDC("isSpell",!dc.isSpell);}} title="If enabled, exhaustion reduces this DC when 'Affects Spell DCs' or 'Affects All DCs' is checked"
                      style={{display:"flex",alignItems:"center",gap:3,cursor:"pointer",alignSelf:"flex-end",paddingBottom:2}}>
                      <div style={{width:11,height:11,borderRadius:2,border:"1px solid "+(dc.isSpell?"rgba(123,79,207,.7)":"rgba(123,79,207,.25)"),background:dc.isSpell?"var(--arcane)":"transparent",flexShrink:0,transition:"all .15s"}} />
                      <span style={{fontFamily:"'Cinzel',serif",fontSize:7,letterSpacing:1,color:dc.isSpell?"var(--arcane-l)":"rgba(184,154,240,.3)"}}>SPELL</span>
                    </div>
                    <div style={{textAlign:"center",minWidth:38}}>
                      <label className="fl" style={{fontSize:7}}>DC</label>

      <div className="sh">Personality</div>

              id="portrait-upload"

                if(!file) return;
                const reader=new FileReader();
                reader.onload=ev=>{
                  // Compress portrait to max 800px wide and 0.75 quality to keep size manageable
                  const img=new Image();
                  img.onload=function(){
                    const MAX=800;
                    const scale=img.width>MAX?MAX/img.width:1;
                    const canvas=document.createElement('canvas');
                    canvas.width=Math.round(img.width*scale);
                    canvas.height=Math.round(img.height*scale);
                    canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
                    s('portrait',canvas.toDataURL('image/jpeg',0.75));
                  };
                  img.src=ev.target.result;
                };
                reader.readAsDataURL(file);
                e.target.value='';
              }}
            />
          </div>
          {c.portrait&&(
            <button className="arb" style={{marginTop:6,width:"100%",textAlign:"center"}} onClick={()=>s("portrait","")}>Remove Portrait</button>

}

function Page2({c,s}){
  const [drag,setDrag]=useState(null);
  const [dragOver,setDragOver]=useState(null);
  const [splitDragModal,setSplitDragModal]=useState(null); // {src,idx,dest,type:'item'|'coin',denom,available}
  const [splitQty,setSplitQty]=useState("");
  const [bohErr,setBohErr]=useState("");
  const [attunedMaxModal,setAttunedMaxModal]=useState(false);
  const [removeBagModal,setRemoveBagModal]=useState(null);
  const [bagMaxModal,setBagMaxModal]=useState(null); // bagId
  const [invSort,setInvSort]=useState(null);
  const [attSort,setAttSort]=useState(null);
  const [bagSorts,setBagSorts]=useState({});
  const [wpnSort,setWpnSort]=useState(null);
  const onInvSort=(col)=>setInvSort(prev=>cycleSort(prev,col));
  const onAttSort=(col)=>setAttSort(prev=>cycleSort(prev,col));
  const onBagSort=(bagId,col)=>setBagSorts(prev=>({...prev,[bagId]:cycleSort(prev[bagId],col)}));
  const onWpnSort=(col)=>setWpnSort(prev=>cycleSort(prev,col));

  // Attuned slots = 3 + bonus formula
  const attunedBonus=c.attuned_bonus_formula?computeBonusFromFormula(c.attuned_bonus_formula,c):(parseInt(c.attuned_bonus)||0);
  const attunedSlots=3+attunedBonus;
  const attunedUsed=(c.attuned_inv||[]).reduce((t,it)=>t+(parseFloat(it.qt)||1),0);

  const ui=(k,i,f,v)=>s(k,prev=>{const a=[...prev];a[i]={...a[i],[f]:v};return a;});
  const di=(k,i)=>s(k,prev=>prev.filter((_,j)=>j!==i));
  const ai=(k,row)=>s(k,prev=>[...prev,row]);

  const getBohMax=(bag)=>parseInt((bag&&bag.maxLbs)||500)||500;

  // GP conversion
  const toGP=(cur)=>{
    const cp=parseFloat(cur.cp)||0,sp=parseFloat(cur.sp)||0;
    const ep=parseFloat(cur.ep)||0,gp=parseFloat(cur.gp)||0,pp=parseFloat(cur.pp)||0;
    return +(cp/100+sp/10+ep/2+gp+pp*10).toFixed(4);
  };
  // Total coins across main pouch + legacy bags + new bags
  const countCoins=(cur)=>{const r=cur||{};return (parseFloat(r.cp)||0)+(parseFloat(r.sp)||0)+(parseFloat(r.ep)||0)+(parseFloat(r.gp)||0)+(parseFloat(r.pp)||0);};
  const bagsCoinCount=(c.bags||[]).reduce((t,b)=>t+countCoins(b.cur),0);
  const totalCoins=countCoins(c.cur)+bagsCoinCount;
  // Only main pouch coins add to carried weight — bag coins are weightless to the character
  const coinWeight=countCoins(c.cur)*0.02;
  const totalGP=toGP(c.cur)+(c.bags||[]).reduce((t,b)=>t+toGP(b.cur||{}),0);

  // Weight calcs
  const itemWeight=(it)=>it.wl?0:(parseFloat(it.wt)||0)*(it.qt===''||it.qt===undefined||it.qt===null?1:parseFloat(it.qt)||0);
  const invWeight=c.inv.reduce((sum,it)=>sum+itemWeight(it),0);
  const attunedWeight=(c.attuned_inv||[]).reduce((sum,it)=>sum+itemWeight(it),0);

  const getBagSelfWeight=(bag)=>bag&&bag.selfWeight!=null?parseFloat(bag.selfWeight)||0:15;
  // New bags array
  const bags=c.bags||[];
  const newBagsWeight=bags.reduce((t,b)=>t+getBagSelfWeight(b),0);

  // Carry capacity: base is STR*15, plus flat bonus, times multiplier
  const str=getTotal(c,"STR")||10;
  const carryFlat=parseFloat(c.carryBonus||0)||0;
  const carryMult=parseFloat(c.carryMult||1)||1;
  const baseCapacity=str*15;
  const totalCapacity=(baseCapacity+carryFlat)*carryMult;

  const totalWeight=invWeight+attunedWeight+newBagsWeight+coinWeight;
  // Variant encumbrance rule: encumbered at STR*5, heavily encumbered at STR*10, max carry STR*15 (all pre-multiplier)
  const encThresh1=(str*5+carryFlat)*carryMult;
  const encThresh2=(str*10+carryFlat)*carryMult;
  const encColor=totalWeight<encThresh1?"#4a9c5c":totalWeight<encThresh2?"#c9962a":totalWeight<=totalCapacity?"#e07030":"#c94a2a";
  const encLabel=totalWeight<encThresh1?"Unencumbered":totalWeight<encThresh2?"Encumbered (-10 ft speed)":totalWeight<=totalCapacity?"Heavily Encumbered (-20 ft speed, disadv. STR/DEX/CON checks)":"Over Capacity (speed 5 ft, disadv. STR/DEX/CON checks, cannot jump)";
  const encPct=totalWeight/totalCapacity;



  // Drag handlers
  const onDragStart=(src,idx)=>{
    setDrag({src,idx});
    if(window.__dragScrollRAF) cancelAnimationFrame(window.__dragScrollRAF);
    window.__dragScrollActive=true;
    window.__dragScrollY=0;
    const trackY=(e)=>{window.__dragScrollY=e.clientY;};
    window.addEventListener('dragover',trackY);
    window.__dragScrollTracker=trackY;
    const zone=80,maxSpeed=18;
    function loop(){
      if(!window.__dragScrollActive) return;
      const my=window.__dragScrollY||0,wh=window.innerHeight;
      if(my<zone) window.scrollBy(0,-Math.round(maxSpeed*(1-my/zone)));
      else if(my>wh-zone) window.scrollBy(0,Math.round(maxSpeed*(1-(wh-my)/zone)));
      window.__dragScrollRAF=requestAnimationFrame(loop);
    }
    window.__dragScrollRAF=requestAnimationFrame(loop);
  };
  const getCoinPouch=(src)=>{
    if(src==="on_person") return c.cur||{};
    if(src&&src.startsWith("bag_")){const bid=src.slice(4);const bag=bags.find(b=>b.id===bid);return bag?(bag.cur||{}):{};} 
    return {};
  };
  const onCoinDragStart=(e,src)=>{
    const pouch=getCoinPouch(src);
    const hasCoins=["cp","sp","ep","gp","pp"].some(d=>parseFloat(pouch[d])>0);
    if(!hasCoins) return;
    e.dataTransfer.effectAllowed="move";
    setDrag({src,idx:-1,isCoin:true,pouch});
  };
  const onDragEnd=()=>{
    window.__dragScrollActive=false;
    if(window.__dragScrollRAF){cancelAnimationFrame(window.__dragScrollRAF);window.__dragScrollRAF=null;}
    if(window.__dragScrollTracker){window.removeEventListener('dragover',window.__dragScrollTracker);window.__dragScrollTracker=null;}
    setSplitDragModal(prev=>{if(!prev){setDrag(null);}return prev;});setDragOver(null);
  };

  // Helper: get item and source list from a drag source key
  const getItemFromSrc=(src,idx)=>{
    if(src==="inv") return {item:c.inv[idx],listKey:"inv",list:c.inv};
    if(src==="attuned") return {item:(c.attuned_inv||[])[idx],listKey:"attuned_inv",list:c.attuned_inv||[]};
    // new bag: src = "bag_ID"
    if(src&&src.startsWith("bag_")){
      const bid=src.slice(4);
      const bag=bags.find(b=>b.id===bid);
      const list=bag?bag.inv||[]:[];
      return {item:list[idx],listKey:null,bagId:bid,list};
    }
    return {item:null,listKey:null,list:[]};
  };

  const removeFromSrc=(src,idx)=>{
    if(src==="inv") s("inv",c.inv.filter((_,j)=>j!==idx));
    else if(src==="attuned") s("attuned_inv",(c.attuned_inv||[]).filter((_,j)=>j!==idx));
    else if(src&&src.startsWith("bag_")){
      const bid=src.slice(4);
      s("bags",bags.map(b=>b.id===bid?{...b,inv:(b.inv||[]).filter((_,j)=>j!==idx)}:b));
    }
  };

  // Returns index of matching item in list, or -1
  const findMatch=(list,item)=>list.findIndex(it=>
    (it.nm||"")===(item.nm||"")&&
    (it.wt||"")===(item.wt||"")&&
    (!!it.eq)===(!!item.eq)&&
    (!!it.wl)===(!!item.wl)&&
    (it.desc||"")===(item.desc||"")&&
    (it.nt||"")===(item.nt||"")
  );
  // Merge item into list (add qty to match, or append)
  const mergeIntoList=(list,item)=>{
    const idx=findMatch(list,item);
    if(idx>=0){
      const merged=[...list];
      const existingQty=parseFloat(merged[idx].qt)||1;
      const incomingQty=parseFloat(item.qt)||1;
      merged[idx]={...merged[idx],qt:String(existingQty+incomingQty)};
      return merged;
    }
    return [...list,item];
  };

  const commitDrop=(dest,qty,dragSnapshot,snapshotItem)=>{
    const dr=dragSnapshot||drag;
    if(!dr){setDrag(null);setDragOver(null);setSplitDragModal(null);return;}
    // Hard attuned guard — before ANY source removal
    if(dest==="attuned"&&!dr.isCoin){
      const curUsedNow=(c.attuned_inv||[]).reduce((t,it)=>t+(parseFloat(it.qt)||1),0);
      if(curUsedNow>=attunedSlots){setBohErr("Attunement limit ("+attunedSlots+") reached — no slots left");setDrag(null);setDragOver(null);setSplitDragModal(null);return;}
    }
    // Coin drop — qty is an object {cp,sp,ep,gp,pp} of amounts to move
    if(dr.isCoin){
      const moves=qty;
      const srcPouch=getCoinPouch(dr.src);
      // Compute actual amounts to move (capped at source)
      const actual={};
      for(const d of ["cp","sp","ep","gp","pp"]){
        const req=parseFloat(moves[d])||0;
        const have=parseFloat(srcPouch[d])||0;
        actual[d]=Math.min(req,have);
      }
      const coinMoveWeight=Object.values(actual).reduce((t,v)=>t+v,0)*0.02;
      // Check dest bag capacity
      if(dest&&dest.startsWith("bag_")){
        let destBagW=0,destBagMax=500;
        {const bid=dest.slice(4);const db=bags.find(b=>b.id===bid);if(db){destBagW=(db.inv||[]).reduce((t,it)=>t+itemWeight(it),0)+countCoins(db.cur||{})*0.02;destBagMax=getBohMax(db);}}
        if(destBagW+coinMoveWeight>destBagMax){setBohErr("Bag weight limit ("+destBagMax+" lbs) would be exceeded.");setDrag(null);setDragOver(null);setSplitDragModal(null);return;}
      }
      const subtractFrom=(curObj)=>{const o={...curObj};for(const d of ["cp","sp","ep","gp","pp"]) o[d]=String(Math.max(0,(parseFloat(curObj[d])||0)-actual[d]));return o;};
      const addTo=(curObj)=>{const o={...curObj};for(const d of ["cp","sp","ep","gp","pp"]) o[d]=String((parseFloat(curObj[d])||0)+actual[d]);return o;};
      // Do src and dest in one s("bags") call if both are new bags to avoid stale state
      const srcIsBag=dr.src&&dr.src.startsWith("bag_");
      const destIsBag=dest&&dest.startsWith("bag_");
      if(srcIsBag&&destIsBag){
        const srcBid=dr.src.slice(4),destBid=dest.slice(4);
        s("bags",bags.map(b=>{
          if(b.id===srcBid) return {...b,cur:subtractFrom(b.cur||{})};
          if(b.id===destBid) return {...b,cur:addTo(b.cur||{})};
          return b;
        }));
      } else {
        if(dr.src==="on_person") s("cur",subtractFrom(c.cur));
        else if(srcIsBag){const bid=dr.src.slice(4);s("bags",bags.map(b=>b.id===bid?{...b,cur:subtractFrom(b.cur||{})}:b));}
        if(dest==="on_person") s("cur",addTo(c.cur));
        else if(destIsBag){const bid=dest.slice(4);s("bags",bags.map(b=>b.id===bid?{...b,cur:addTo(b.cur||{})}:b));}
      }
      setDrag(null);setDragOver(null);setSplitDragModal(null);
      return;
    }
    const {item:_fetchedItem}=getItemFromSrc(dr.src,dr.idx);
    const fullItem=snapshotItem||_fetchedItem;
    if(!fullItem) return;
    const origQty=parseFloat(fullItem.qt)||1;
    const moveQty=Math.min(qty,origQty);

    // Pre-check attuned limit BEFORE touching source
    if(dest==="attuned"){
      const maxAtt=attunedSlots;
      const curUsed=(c.attuned_inv||[]).reduce((t,it)=>t+(parseFloat(it.qt)||1),0);
      const slotsLeft=Math.max(0,maxAtt-curUsed);
      if(slotsLeft<=0){setBohErr("Attunement limit ("+maxAtt+") reached — no slots left");setDrag(null);setDragOver(null);setSplitDragModal(null);return;}
      const canMove=Math.min(moveQty,slotsLeft);
      const leftOver=moveQty-canMove;
      const movedItem={...fullItem,qt:String(canMove)};
      // Update source: reduce by canMove, leave leftover
      const remaining=origQty-canMove;
      if(remaining>0){
        const updItem={...fullItem,qt:String(remaining)};
        if(dr.src==="inv") s("inv",c.inv.map((it,j)=>j===dr.idx?updItem:it));
        else if(dr.src==="attuned") s("attuned_inv",(c.attuned_inv||[]).map((it,j)=>j===dr.idx?updItem:it));
        else if(dr.src&&dr.src.startsWith("bag_")){const bid2=dr.src.slice(4);s("bags",bags.map(b=>b.id===bid2?{...b,inv:(b.inv||[]).map((it,j)=>j===dr.idx?updItem:it)}:b));}
      } else {
        removeFromSrc(dr.src,dr.idx);
      }
      s("attuned_inv",mergeIntoList(c.attuned_inv||[],movedItem));
      setBohErr(leftOver>0?"Attunement limit ("+maxAtt+"): only "+canMove+" of "+moveQty+" moved, "+leftOver+" left in source":"");
      setDrag(null);setDragOver(null);setSplitDragModal(null);
      return;
    }

    const item=moveQty<origQty?{...fullItem,qt:String(moveQty)}:fullItem;

    // Pre-check bag weight BEFORE touching source
    if(dest&&dest.startsWith("bag_")){
      const bid=dest.slice(4);const bag=bags.find(b=>b.id===bid);
      if(!bag){setDrag(null);setDragOver(null);setSplitDragModal(null);return;}
      const bagInv2=bag.inv||[];
      const bagW2=bagInv2.reduce((s2,it2)=>s2+itemWeight(it2),0);
      const bohMaxThis2=getBohMax(bag);
      if(bagW2+itemWeight(item)>bohMaxThis2){
        setBohErr("Bag of Holding weight limit ("+bohMaxThis2+" lbs) would be exceeded.");
        setDrag(null);setDragOver(null);setSplitDragModal(null);return;
      }
    }

    // If both src and dest are bags, do it in one s("bags") call to avoid stale state
    const srcIsBag=dr.src&&dr.src.startsWith("bag_");
    const destIsBag=dest&&dest.startsWith("bag_");
    if(srcIsBag&&destIsBag){
      const srcBid=dr.src.slice(4),destBid=dest.slice(4);
      s("bags",bags.map(b=>{
        if(b.id===srcBid){
          const inv=b.inv||[];
          if(moveQty<origQty) return {...b,inv:inv.map((it,j)=>j===dr.idx?{...fullItem,qt:String(origQty-moveQty)}:it)};
          return {...b,inv:inv.filter((_,j)=>j!==dr.idx)};
        }
        if(b.id===destBid) return {...b,inv:mergeIntoList(b.inv||[],item)};
        return b;
      }));
      setBohErr("");
    } else {
      // Update source
      if(moveQty<origQty){
        const updItem={...fullItem,qt:String(origQty-moveQty)};
        if(dr.src==="inv") s("inv",c.inv.map((it,j)=>j===dr.idx?updItem:it));
        else if(dr.src==="attuned") s("attuned_inv",(c.attuned_inv||[]).map((it,j)=>j===dr.idx?updItem:it));
        else if(srcIsBag){const bid=dr.src.slice(4);s("bags",bags.map(b=>b.id===bid?{...b,inv:(b.inv||[]).map((it,j)=>j===dr.idx?updItem:it)}:b));}
      } else {
        removeFromSrc(dr.src,dr.idx);
      }
      // Add to dest
      if(dest==="inv"){s("inv",mergeIntoList(c.inv,item));setBohErr("");}
      else if(destIsBag){
        const bid=dest.slice(4);const bag=bags.find(b=>b.id===bid);if(!bag)return;
        s("bags",bags.map(b=>b.id===bid?{...b,inv:mergeIntoList(b.inv||[],item)}:b));setBohErr("");
      }
    }
    setDrag(null);setDragOver(null);setSplitDragModal(null);
  };

  const onDrop=(dest)=>{
    if(!drag||drag.src===dest) return;
    const snapshot={...drag};
    if(snapshot.isCoin){
      const isBagDest=dest&&dest.startsWith("bag_");
      // on_person coins can only go to bags; everything else goes to on_person
      const effectiveDest=(snapshot.src==="on_person"&&!isBagDest)||(!isBagDest&&dest!=="on_person")?"on_person":dest;
      // if src===effectiveDest, nothing to do
      if(snapshot.src===effectiveDest){setDrag(null);setDragOver(null);return;}
      const pouch=snapshot.pouch||{};
      const denoms=["cp","sp","ep","gp","pp"].filter(d=>parseFloat(pouch[d])>0);
      if(denoms.length===0){setDrag(null);setDragOver(null);return;}
      setSplitDragModal({dest:effectiveDest,type:"coin",pouch,denoms,qtys:Object.fromEntries(denoms.map(d=>[d,String(parseFloat(pouch[d])||0)])),snapshot});
      setDragOver(null);return;
    }
    const {item}=getItemFromSrc(snapshot.src,snapshot.idx);
    if(!item) return;
    const qty=parseFloat(item.qt)||1;
    if(qty>1){setSplitDragModal({dest,type:"item",name:item.nm||"item",available:qty,snapshot,snapshotItem:item});setSplitQty(String(qty));setDragOver(null);return;}
    commitDrop(dest,1,snapshot,item);
  };


  const rowStyle=(dragging)=>({background:dragging?"rgba(123,79,207,.15)":"transparent",transition:"background .15s",cursor:"grab"});

  // Capacity bar segments
  const barW=(w)=>Math.min(100,w/totalCapacity*100).toFixed(1);

  return (
    <div>
      <div className="orn">Inventory</div>

      {/* Weight summary */}
      <div style={{display:"flex",gap:12,marginTop:24,marginBottom:4,flexWrap:"wrap",alignItems:"stretch"}}>
        <div style={{background:"rgba(0,0,0,.3)",border:"1px solid rgba(201,150,42,.2)",padding:"8px 16px",flex:2,minWidth:180}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:2,color:"var(--arcane-g)",opacity:.7,textTransform:"uppercase",marginBottom:4}}>Carried Weight</div>
          <div style={{display:"flex",alignItems:"baseline",gap:12}}>
            <span style={{fontFamily:"'Cinzel',serif",fontSize:22,fontWeight:700,color:encColor}}>{totalWeight.toFixed(2)} lbs</span>
            <span style={{fontFamily:"'EB Garamond',serif",fontSize:12,color:"rgba(232,213,176,.5)"}}>/ {totalCapacity.toFixed(1)} lbs capacity</span>
          </div>
          <div style={{fontFamily:"'EB Garamond',serif",fontSize:11,color:encColor,marginTop:2,marginBottom:6}}>{encLabel}</div>
          <div style={{height:6,background:"rgba(255,255,255,.08)",borderRadius:3,overflow:"hidden",position:"relative"}}>
            <div style={{position:"absolute",left:0,top:0,height:"100%",width:barW(totalWeight)+"%",background:encColor,borderRadius:3,transition:"width .3s"}} />
          </div>
          <div style={{fontFamily:"'EB Garamond',serif",fontSize:10,color:"rgba(232,213,176,.3)",marginTop:4}}>
            Base: STR {str} x 15 = {str*15} lbs + {carryFlat} bonus, x{carryMult} multiplier
            &nbsp;|&nbsp; Enc: {encThresh1.toFixed(0)} lbs &nbsp;|&nbsp; Heavy: {encThresh2.toFixed(0)} lbs &nbsp;|&nbsp; Max: {totalCapacity.toFixed(0)} lbs
          </div>
        </div>
        <div style={{background:"rgba(0,0,0,.3)",border:"1px solid rgba(201,150,42,.2)",padding:"8px 14px",minWidth:220}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:2,color:"var(--arcane-g)",opacity:.7,textTransform:"uppercase",marginBottom:8}}>Carrying Capacity Modifiers</div>
          <div style={{display:"flex",gap:10,alignItems:"flex-end",flexWrap:"wrap"}}>
            <div>
              <label style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:1,color:"rgba(184,154,240,.6)",display:"block",marginBottom:3}}>Flat Bonus (lbs)</label>
              <input className="fi" value={c.carryBonus||""} onChange={e=>s("carryBonus",e.target.value)} placeholder="0" style={{width:64,fontSize:13,textAlign:"center"}} title="Flat lbs added before multiplier" />
            </div>
            <div>
              <label style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:1,color:"rgba(184,154,240,.6)",display:"block",marginBottom:3}}>Multiplier (x)</label>
              <input className="fi" value={c.carryMult||""} onChange={e=>s("carryMult",e.target.value)} placeholder="1" style={{width:64,fontSize:13,textAlign:"center"}} title="e.g. x2 for Powerful Build or Enlarge spell" />
            </div>
          </div>
          <div style={{fontFamily:"'EB Garamond',serif",fontSize:10,color:"rgba(232,213,176,.25)",marginTop:6,fontStyle:"italic"}}>e.g. Powerful Build = x2</div>
        </div>
      </div>

      {/* Total GP */}
      <div style={{display:"flex",justifyContent:"flex-end",marginTop:8,marginBottom:8}}>
        <div style={{background:"rgba(0,0,0,.3)",border:"1px solid rgba(201,150,42,.25)",padding:"6px 16px",display:"flex",gap:8,alignItems:"center"}}>
          <span style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:1.5,color:"var(--arcane-g)",opacity:.6,textTransform:"uppercase"}}>Total GP</span>
          <span style={{fontFamily:"'Cinzel',serif",fontSize:22,fontWeight:700,color:"var(--gold-l)",textShadow:"0 0 10px rgba(201,150,42,.3)"}}>{totalGP.toFixed(2)} gp</span>
        </div>
      </div>

      {/* Inventory — Attuned first, then main list */}
      <div className="sh">Items on Person
        {bags.length>0&&<span style={{fontFamily:"'EB Garamond',serif",fontSize:11,fontWeight:400,color:"rgba(232,213,176,.3)",fontStyle:"italic",marginLeft:8,letterSpacing:0,textTransform:"none"}}>drag items between sections</span>}
      </div>

      {/* Currency — compact coin row */}
      <div
        onDragOver={function(e){if(drag&&drag.isCoin){e.preventDefault();setDragOver("on_person_coins");}}}
        onDragLeave={function(){setDragOver(null);}}
        onDrop={function(){if(drag&&drag.isCoin&&drag.src!=="on_person") onDrop("on_person"); setDragOver(null);}}
        style={{padding:"8px 12px 10px",background:"rgba(0,0,0,.2)",border:"1px solid rgba(201,150,42,.15)",borderRadius:2,marginBottom:12,display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",
          outline:dragOver==="on_person_coins"?"2px dashed rgba(201,150,42,.5)":"none",transition:"outline .15s"}}>
        <span draggable onDragStart={function(e){onCoinDragStart(e,"on_person");}} onDragEnd={onDragEnd} title="Drag to move coins" style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:1.5,color:"rgba(201,150,42,.5)",textTransform:"uppercase",flexShrink:0,cursor:"grab",userSelect:"none"}}>Currency ⠿</span>
        {[["CP","cp"],["SP","sp"],["EP","ep"],["GP","gp"],["PP","pp"]].map(function(kv){
          return <div key={kv[1]} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
            <input value={c.cur[kv[1]]||""} onChange={function(e){s("cur",{...c.cur,[kv[1]]:e.target.value});}} placeholder="0"
              style={{width:44,background:"rgba(0,0,0,.3)",border:"none",borderBottom:"1px solid rgba(201,150,42,.25)",color:"var(--gold-l)",fontFamily:"'Cinzel',serif",fontSize:12,textAlign:"center",outline:"none",padding:"2px 0"}} />
            <span style={{fontFamily:"'Cinzel',serif",fontSize:7,letterSpacing:1,color:"rgba(201,150,42,.4)",textTransform:"uppercase"}}>{kv[0]}</span>
          </div>;
        })}
        {(function(){var gp=toGP(c.cur);var coins=countCoins(c.cur);return coins>0&&<span style={{fontFamily:"'Cinzel',serif",fontSize:10,color:"rgba(201,150,42,.6)",marginLeft:4}}>{gp.toFixed(2)} gp · {coinWeight.toFixed(2)} lbs</span>;})()} 
      </div>

      {bohErr&&(
        <div style={{background:"rgba(201,74,42,.12)",border:"1px solid rgba(201,74,42,.4)",borderRadius:2,padding:"8px 14px",marginBottom:8,fontFamily:"'EB Garamond',serif",fontSize:13,color:"#e07060",display:"flex",gap:10,alignItems:"center"}}>
          <span style={{fontSize:16}}>!</span><span style={{flex:1}}>{bohErr}</span>
          <button onClick={()=>setBohErr("")} style={{background:"transparent",border:"none",color:"rgba(224,112,96,.6)",cursor:"pointer",fontSize:14}}>x</button>
        </div>
      )}

      {/* Attuned subsection */}
      <div style={{marginBottom:8}}>
        <div style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0",marginBottom:4}}>
          <span style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:2,color:"rgba(201,150,42,.6)",textTransform:"uppercase"}}>Attuned Items</span>
          <span onClick={()=>setAttunedMaxModal(true)}
            style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:1,padding:"1px 7px",
              background:"rgba(201,150,42,.08)",border:"1px solid rgba(201,150,42,.2)",color:"rgba(201,150,42,.5)",borderRadius:10,userSelect:"none"}}>
            {attunedUsed} / {attunedSlots}
          </span>
          <div style={{marginLeft:"auto",display:"flex",gap:4}}>
            <div onClick={function(){const a=(c.attuned_inv||[]).map(function(it){return {...it,showDesc:true};});s("attuned_inv",a);}}
              style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:9,color:"rgba(184,154,240,.4)",border:"1px solid rgba(184,154,240,.15)",padding:"2px 5px",borderRadius:2,userSelect:"none"}} title="Expand all descriptions">+</div>
            <div onClick={function(){const a=(c.attuned_inv||[]).map(function(it){return {...it,showDesc:false};});s("attuned_inv",a);}}
              style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:9,color:"rgba(184,154,240,.4)",border:"1px solid rgba(184,154,240,.15)",padding:"2px 5px",borderRadius:2,userSelect:"none"}} title="Collapse all descriptions">−</div>
          </div>

        </div>
        <div onDragOver={e=>{e.preventDefault();setDragOver("attuned");}} onDragLeave={()=>setDragOver(null)} onDrop={()=>onDrop("attuned")}
          style={{border:dragOver==="attuned"?"1px dashed rgba(201,150,42,.5)":"1px dashed rgba(201,150,42,.15)",borderRadius:2,transition:"border .2s",minHeight:36,padding:"2px 0"}}>
          <div className="stbl-wrap"><table className="itbl" style={{minWidth:520}}>
            <thead><tr>
              <th style={{width:"2%"}}></th>
              <SortableTh label="Eq" col="eq" sort={attSort} onSort={onAttSort} style={{width:"3%",textAlign:"center"}} title="Equipped" />
              <SortableTh label="Wl" col="wl" sort={attSort} onSort={onAttSort} style={{width:"3%",textAlign:"center"}} title="Weightless" />
              <SortableTh label="Item" col="nm" sort={attSort} onSort={onAttSort} style={{width:"30%"}} />
              <SortableTh label="Qty" col="qt" sort={attSort} onSort={onAttSort} style={{width:"8%"}} />
              <SortableTh label="Wt (ea)" col="wt" sort={attSort} onSort={onAttSort} style={{width:"10%"}} />
              <th style={{width:"8%"}}>Total Wt</th>
              <SortableTh label="Notes" col="nt" sort={attSort} onSort={onAttSort} style={{width:"24%"}} />
              <th></th>
            </tr></thead>
            <tbody>
              {sortItems(c.attuned_inv||[],attSort).map(({item:it,i})=>(
                [
                <tr key={i+"a"} draggable onDragStart={()=>onDragStart("attuned",i)} onDragEnd={onDragEnd} style={rowStyle(drag&&drag.src==="attuned"&&drag.idx===i)}>
                  <td style={{textAlign:"center",cursor:"grab",color:"rgba(201,150,42,.4)",fontSize:12}}>::</td>
                  <td style={{textAlign:"center"}}><div className={"tog tog-eq"+(it.eq?" on":"")} onClick={()=>{const a=[...(c.attuned_inv||[])];a[i]={...a[i],eq:!it.eq};s("attuned_inv",a);}} /></td>
                  <td style={{textAlign:"center"}}><div className={"tog tog-wl"+(it.wl?" on":"")} onClick={()=>{const a=[...(c.attuned_inv||[])];a[i]={...a[i],wl:!it.wl};s("attuned_inv",a);}} /></td>
                  <td><ItemNameInput value={it.nm||""} onChange={e=>{const a=[...(c.attuned_inv||[])];a[i]={...a[i],nm:e.target.value};s("attuned_inv",a);}} placeholder="Item..." style={{width:"100%",background:"transparent",border:"none",color:it.eq?"var(--gold-l)":"var(--parch)",fontFamily:"'EB Garamond',serif",fontSize:14,outline:"none",padding:"3px 4px",fontWeight:it.eq?"600":"400"}}
                    onAutofill={function(item){const a=[...(c.attuned_inv||[])];const ch=parseChargesFromDesc(item.desc);a[i]={...a[i],nm:item.name,wt:item.weight||a[i].wt||"",nt:item.cost?"Cost: "+item.cost:a[i].nt||"",desc:item.desc||a[i].desc||"",showDesc:item.desc?true:a[i].showDesc,charges:ch||a[i].charges};s("attuned_inv",a);}} /></td>
                  <td><TipInput value={it.qt||""} onChange={e=>{const a=[...(c.attuned_inv||[])];a[i]={...a[i],qt:e.target.value};s("attuned_inv",a);}} placeholder="1" style={{width:"100%",background:"transparent",border:"none",color:"var(--parch)",fontFamily:"'EB Garamond',serif",fontSize:14,outline:"none",padding:"3px 4px"}} /></td>
                  <td><TipInput value={it.wt||""} onChange={e=>{const a=[...(c.attuned_inv||[])];a[i]={...a[i],wt:e.target.value};s("attuned_inv",a);}} placeholder="0" style={{width:"100%",background:"transparent",border:"none",color:"var(--parch)",fontFamily:"'EB Garamond',serif",fontSize:14,outline:"none",padding:"3px 4px"}} /></td>
                  <td style={{fontFamily:"'Cinzel',serif",fontSize:11,color:it.wl?"var(--teal)":"var(--gold-l)",textAlign:"center",opacity:.8}}>{it.wl?"0":itemWeight(it)>0?itemWeight(it).toFixed(2):"-"}</td>
                  <td style={{display:"flex",alignItems:"center",gap:4}}>
                    <TipInput value={it.nt||""} onChange={e=>{const a=[...(c.attuned_inv||[])];a[i]={...a[i],nt:e.target.value};s("attuned_inv",a);}} placeholder="notes..." style={{flex:1,minWidth:0,background:"transparent",border:"none",color:"var(--parch)",fontFamily:"'EB Garamond',serif",fontSize:14,outline:"none",padding:"3px 4px"}} />
                    <ChargeBadge it={it} onClick={function(){const a=[...(c.attuned_inv||[])];a[i]={...a[i],showDesc:true};s("attuned_inv",a);}} />
                  </td>
                  <td style={{textAlign:"center"}}>
                    <button onClick={()=>{const a=[...(c.attuned_inv||[])];a[i]={...a[i],showDesc:!it.showDesc};s("attuned_inv",a);}} title="Add description"
                      style={{background:"transparent",border:"none",color:it.showDesc?"var(--arcane-l)":"rgba(184,154,240,.25)",cursor:"pointer",fontSize:12,padding:0,lineHeight:1,fontFamily:"'Cinzel',serif"}}>{it.showDesc?"−":"+"}</button>
                  </td>
                  <td><button className="db" onClick={()=>window.__confirm("Delete this item?",()=>s("attuned_inv",(c.attuned_inv||[]).filter((_,j)=>j!==i)))}>x</button></td>
                </tr>,
                it.showDesc&&<tr key={i+"b"} style={{borderBottom:"1px solid rgba(201,150,42,.1)"}}>
                  <td></td><td></td><td></td>
                  <td colSpan={7} style={{padding:"2px 4px 6px"}}>
                    <AutoTextarea value={it.desc||""} onChange={e=>{const a=[...(c.attuned_inv||[])];a[i]={...a[i],desc:e.target.value};s("attuned_inv",a);}} placeholder="Item description..."
                      style={{width:"100%",background:"transparent",border:"none",color:"rgba(232,213,176,.65)",fontFamily:"'EB Garamond',serif",fontSize:13,lineHeight:1.5,outline:"none",padding:"2px 4px"}} />

const DIE_OPTS=["NO","d4","d6","d8","d10","d12","d20","d100"];

// Shared formula evaluator — supports both old single-select format and new multi-entry arrays
function computeBonusFromFormula(formula,c){
  if(!formula) return 0;
  const allCls=(c.classes&&c.classes.length>0?c.classes:[{nm:c.cls||"",lv:"",hd:"d6"}]).filter(function(cl){return (cl.nm||"").trim();});
  const totalLv=allCls.reduce(function(t,cl){return t+(parseInt(cl.lv)||0);},0);
  const pb2=(function(){var base=totalLv<1?2:Math.ceil(totalLv/4)+1;return base+(parseInt((c.pbBonus||"").replace("+",""))||0);})();
  const getMod2=function(abl){var base=parseInt((c.statsBase&&c.statsBase[abl])||c.stats[abl])||10;var bon=parseInt((c.statsBon&&c.statsBon[abl])||0)||0;return Math.floor((base+bon-10)/2);};
  const flat=parseInt((formula.flat||"").replace("+",""))||0;
  const ablSum=(formula.abls||[]).reduce(function(t,a){return t+getMod2(a);},0);

  // Prof: new array format (profs:[]) stacks freely; fall back to old single field
  var profSum=0;
  if(formula.profs&&formula.profs.length>0){
    profSum=(formula.profs||[]).reduce(function(t,p){
      return t+(p==="full"?pb2:p==="half-up"?Math.ceil(pb2/2):p==="half"?Math.floor(pb2/2):0);
    },0);
  } else {
    profSum=formula.prof==="full"?pb2:formula.prof==="half"?Math.floor(pb2/2):formula.prof==="half-up"?Math.ceil(pb2/2):0;
  }

  // Level: new array format (lvlEntries:[{type,cls}]) stacks freely; fall back to old single fields
  var lvlSum=0;
  if(formula.lvlEntries&&formula.lvlEntries.length>0){
    lvlSum=(formula.lvlEntries||[]).reduce(function(t,e){
      var type=e.type||"none";
      if(type==="total-full") return t+totalLv;
      if(type==="total-half-down") return t+Math.floor(totalLv/2);
      if(type==="total-half-up") return t+Math.ceil(totalLv/2);
      var cl=allCls.find(function(x){return x.nm===e.cls;});
      var clLv=cl?parseInt(cl.lv)||0:0;
      if(type==="class-full") return t+clLv;
      if(type==="class-half-down") return t+Math.floor(clLv/2);
      if(type==="class-half-up") return t+Math.ceil(clLv/2);
      return t;
    },0);
  } else {
    // backward compat
    if(formula.lvlType==="total-full") lvlSum=totalLv;
    else if(formula.lvlType==="total-half-down") lvlSum=Math.floor(totalLv/2);
    else if(formula.lvlType==="total-half-up") lvlSum=Math.ceil(totalLv/2);
    else if(formula.lvlType==="class-full"){var cl=allCls.find(function(x){return x.nm===formula.lvlClass;});lvlSum=cl?parseInt(cl.lv)||0:0;}
    else if(formula.lvlType==="class-half-down"){var cl2=allCls.find(function(x){return x.nm===formula.lvlClass;});lvlSum=cl2?Math.floor((parseInt(cl2.lv)||0)/2):0;}
    else if(formula.lvlType==="class-half-up"){var cl3=allCls.find(function(x){return x.nm===formula.lvlClass;});lvlSum=cl3?Math.ceil((parseInt(cl3.lv)||0)/2):0;}
  }

  return flat+ablSum+profSum+lvlSum;
}

// Returns true if formula has any prof component (for the two half-prof toggles)
function formulaHasProf(formula) {
  if(!formula) return false;
  if(formula.profs&&formula.profs.length>0) return true;
  return formula.prof&&formula.prof!=="none";
}

// Short label(s) for prof component — handles both new profs[] and legacy prof
function formulaProfLabel(formula) {
  if(!formula) return "";
  const lbl=function(p){return p==="full"?"PROF":p==="half-up"?"½↑PROF":p==="half"?"½↓PROF":"";};
  if(formula.profs&&formula.profs.length>0) return formula.profs.map(lbl).filter(Boolean).join("+");
  return lbl(formula.prof||"none");
}

// Kept for backward compat — returns total prof value (not used for stacking logic anymore)
function formulaProfVal(formula, c) {
  if(!formula) return 0;
  if(formula.profs&&formula.profs.length>0){
    const allCls=(c.classes&&c.classes.length>0?c.classes:[{nm:c.cls||"",lv:"",hd:"d6"}]).filter(function(cl){return (cl.nm||"").trim();});
    const totalLv=allCls.reduce(function(t,cl){return t+(parseInt(cl.lv)||0);},0);
    const pb2=(totalLv<1?2:Math.ceil(totalLv/4)+1)+(parseInt((c.pbBonus||"").replace("+",""))||0);
    return (formula.profs||[]).reduce(function(t,p){return t+(p==="full"?pb2:p==="half-up"?Math.ceil(pb2/2):p==="half"?Math.floor(pb2/2):0);},0);
  }
  if (!formula.prof || formula.prof === "none") return 0;
  const allCls=(c.classes&&c.classes.length>0?c.classes:[{nm:c.cls||"",lv:"",hd:"d6"}]).filter(function(cl){return (cl.nm||"").trim();});
  const totalLv=allCls.reduce(function(t,cl){return t+(parseInt(cl.lv)||0);},0);
  const pb2=(totalLv<1?2:Math.ceil(totalLv/4)+1)+(parseInt((c.pbBonus||"").replace("+",""))||0);
  if (formula.prof === "full") return pb2;
  if (formula.prof === "half-up") return Math.ceil(pb2/2);
  if (formula.prof === "half") return Math.floor(pb2/2);
  return 0;
}

// Non-prof portion of a bonus: total minus the prof component
function driv_nonProf(formula, rawField, profPart, c) {
  if (formula && c) return computeBonusFromFormula(formula, c) - profPart;
  return parseInt(((rawField||"")).replace("+",""))||0;
}

// Clickable bonus field — opens FormulaModal on click
function BonusField({c,value,formula,onApply,label,inputStyle,hideProfFull}){
  const [open,setOpen]=React.useState(false);
  const num=formula?computeBonusFromFormula(formula,c):(parseInt((value||"").replace("+",""))||0);
  const hasFormula=!!formula;
  const hasVal=num!==0||hasFormula;
  const modal=open?ReactDOM.createPortal(
    <FormulaModal c={c} initialFormula={formula||{flat:value||"",abls:[],profs:[],lvlEntries:[]}}
      title={label||"Configure Bonus"}
      hideProfFull={hideProfFull}
      onApply={function(total,frm){onApply(total,frm);setOpen(false);}}
      onClose={function(){setOpen(false);}}
      onClear={hasFormula?function(){onApply(0,null);setOpen(false);}:null}
    />,
    document.body
  ):null;
  return (
    <>
      <div onClick={function(){setOpen(true);}} title={hasFormula?"Formula active — click to edit":"Click to set bonus"}
        style={{cursor:"pointer",fontFamily:"'Cinzel',serif",textAlign:"center",
          color:hasFormula?"rgba(201,150,42,.5)":hasVal?"var(--gold-l)":"rgba(232,213,176,.25)",
          ...(inputStyle||{})}}>
        {hasVal?(num>=0?"+"+num:""+num):"+0"}
      </div>
      {modal}
    </>
  );
