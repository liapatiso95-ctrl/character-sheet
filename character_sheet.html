// Extended formula evaluator for creature statblocks
// ctx = {c, creature, spellLevel}
function computeCreatureFormula(formula, ctx){
  if(!formula) return 0;
  const c=ctx.c, creature=ctx.creature||{}, spellLevel=ctx.spellLevel||0;
  // Base character formula parts (flat + charAbls + profs + lvlEntries)
  const baseFormula={flat:formula.flat||"",abls:formula.charAbls||formula.abls||[],profs:formula.profs||[],lvlEntries:formula.lvlEntries||[]};
  const base=computeBonusFromFormula(baseFormula,c);
  // Creature's own ability mods
  const crStats=creature.stats||{STR:10,DEX:10,CON:10,INT:10,WIS:10,CHA:10};
  // Resolve @ABL references to character's live score
  const _resolveStat=function(v){
    if(v&&typeof v==="string"&&v.startsWith("@")){
      var a=v.slice(1);
      var base=parseInt((c.statsBase&&c.statsBase[a])||c.stats[a])||10;
      var bon=parseInt((c.statsBon&&c.statsBon[a])||0)||0;
      return base+bon;
    }
    return v===""||v==null?0:parseInt(v)||0;
  };
  const crAblSum=(formula.creatureAbls||[]).reduce(function(t,a){return t+Math.floor((_resolveStat(crStats[a])-10)/2);},0);
  // Spell level × multiplier
  const spLvlPart=Math.round((parseFloat(formula.spellLevelMult)||0)*spellLevel);
  // Creature's own prof component
  var crPbVal=(function(){
    if(creature.pbFormula) return computeCreatureFormula(creature.pbFormula,{c,creature:{...creature,pbFormula:null},spellLevel});
    return parseInt(creature.pbFlat)||2;
  })();
  var crProf=(formula.creatureProfs||[]).reduce(function(t,p){
    return t+(p==="full"?crPbVal:p==="half-up"?Math.ceil(crPbVal/2):p==="half"?Math.floor(crPbVal/2):0);
  },0);
  var spellAtkPart=0;
  // Character's exhaustion penalty — applies to character-sourced components (spell atk, charAbls)
  const charExhPen=Math.min(5,Math.max(0,parseInt(c.exhaustion)||0))*-2;
  if(formula.useSpellAtk!=null&&formula.useSpellAtk!==undefined){
    const sc=(c.spellClasses||[])[formula.useSpellAtk];
    if(sc){
      const allCls=(c.classes&&c.classes.length>0?c.classes:[{nm:c.cls||"",lv:"",hd:"d6"}]).filter(function(cl){return (cl.nm||"").trim();});
      const totalLv=allCls.reduce(function(t,cl){return t+(parseInt(cl.lv)||0);},0);
      const pb=(totalLv<1?2:Math.ceil(totalLv/4)+1)+(parseInt((c.pbBonus||"").replace("+",""))||0);
      const abl=sc.abl||"INT";
      const base2=parseInt((c.statsBase&&c.statsBase[abl])||c.stats[abl])||10;
      const bon2=parseInt((c.statsBon&&c.statsBon[abl])||0)||0;
      const mod=Math.floor((base2+bon2-10)/2);
      const atkBon=sc.atkBonusFormula?computeBonusFromFormula(sc.atkBonusFormula,c):(parseInt((sc.atkBonus||"").replace("+",""))||0);
      // Character's exhaustion reduces their spell attack bonus
      spellAtkPart=pb+mod+atkBon+charExhPen;
    }
  }
  return base+crAblSum+spLvlPart+spellAtkPart+crProf;
}

            function(){var cur=formula.creatureAbls||[];var idx=cur.lastIndexOf(abl);if(idx>=0){var n=[...cur];n.splice(idx,1);setF("creatureAbls",n);}},
            "rgba(172,130,56,1)","cra-"+abl);
        }))}

        {!hideProfRows&&row("Char Prof",<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {["half","half-up","full"].map(function(p){
            var count=(formula.profs||[]).filter(function(x){return x===p;}).length;
            return counterChip(profLabelFn(p),count,
              function(){setF("profs",[...(formula.profs||[]),p]);},
              function(){var cur=formula.profs||[];var idx=cur.lastIndexOf(p);if(idx>=0){var n=[...cur];n.splice(idx,1);setF("profs",n);}},
              "rgba(201,74,42,1)","prof-"+p);
          })}
        </div>)}

        {!(hideProfRows||hideCrtrProf)&&row("Crtr Prof",<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {["half","half-up","full"].map(function(p){
            var crLabel=p==="full"?"Crtr Prof (+"+crPbVal+")":p==="half-up"?"½↑ Crtr ("+Math.ceil(crPbVal/2)+")":"½↓ Crtr ("+Math.floor(crPbVal/2)+")";
            var count=(formula.creatureProfs||[]).filter(function(x){return x===p;}).length;
            return counterChip(crLabel,count,
              function(){setF("creatureProfs",[...(formula.creatureProfs||[]),p]);},
              function(){var cur=formula.creatureProfs||[];var idx=cur.lastIndexOf(p);if(idx>=0){var n=[...cur];n.splice(idx,1);setF("creatureProfs",n);}},
              "rgba(172,130,56,1)","crprof-"+p);
          })}
        </div>)}

        {row("Spell Level",<div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontFamily:"'EB Garamond',serif",fontSize:11,color:"rgba(232,213,176,.4)",fontStyle:"italic"}}>× spell level</span>
          <input type="number" value={formula.spellLevelMult===0?"":formula.spellLevelMult} step="0.5" min={-10} max={20}
            onChange={function(e){setF("spellLevelMult",e.target.value===""?0:parseFloat(e.target.value)||0);}}
            onBlur={function(){if(formula.spellLevelMult===""||formula.spellLevelMult==null)setF("spellLevelMult",0);}}
            style={{width:52,background:"rgba(0,0,0,.3)",border:"none",borderBottom:"1px solid rgba(184,154,240,.3)",color:"var(--arcane-l)",fontFamily:"'Cinzel',serif",fontSize:12,textAlign:"center",outline:"none"}} />
          {(parseFloat(formula.spellLevelMult)||0)!==0&&<span style={{fontFamily:"'Cinzel',serif",fontSize:10,color:"rgba(184,154,240,.5)"}}>= {spLvlPart} (at SL {spellLevel||0})</span>}
        </div>)}

        {spCls.length>0&&row("Spell Atk",<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {[{label:"—",idx:null},...spCls.map(function(sc,i){return {label:(sc.nm||"Spell "+(i+1))+" Atk",idx:i};})].map(function(opt){
            var active=formula.useSpellAtk===opt.idx;
            var col="rgba(123,79,207,1)";
            return <div key={"sa-"+opt.idx} onClick={function(){setF("useSpellAtk",opt.idx);}}
              style={{cursor:"pointer",padding:"3px 9px",borderRadius:10,
                background:active?col.replace(",1)",",0.15)"):col.replace(",1)",",0.04)"),
                border:"1px solid "+(active?col.replace(",1)",",0.55)"):col.replace(",1)",",0.15)")),
                fontFamily:"'Cinzel',serif",fontSize:9,
                color:active?col.replace(",1)",",0.9)"):"rgba(232,213,176,.3)",userSelect:"none"}}>
              {opt.label}
            </div>;
          })}
        </div>)}

        {row("Char Level",<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {lvlOpts.map(function(opt){
            var key=lvlKeyFn(opt);
            var count=(formula.lvlEntries||[]).filter(function(e){return lvlKeyFn(e)===key;}).length;
            return counterChip(lvlLabelFn(opt),count,
              function(){setF("lvlEntries",[...(formula.lvlEntries||[]),{type:opt.type,cls:opt.cls}]);},
              function(){var cur=formula.lvlEntries||[];var idx=cur.map(lvlKeyFn).lastIndexOf(key);if(idx>=0){var n=[...cur];n.splice(idx,1);setF("lvlEntries",n);}},
              "rgba(184,154,240,1)","lv-"+key);
          })}
        </div>)}

        <div style={{borderTop:"1px solid rgba(201,150,42,.15)",paddingTop:12,marginTop:4,display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,flexWrap:"wrap"}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:10,color:"rgba(232,213,176,.35)",flex:1}}>
            {(function(){
              var parts=[];
              if(flat) parts.push("Flat("+flat+")");
              if(charAblSum) parts.push((formula.charAbls||[]).map(function(a){return "Char:"+a+"("+getCharMod(a)+")"}).join("+"));
              if(crAblSum) parts.push((formula.creatureAbls||[]).map(function(a){return "Crtr:"+a+"("+getCrMod(a)+")"}).join("+"));
              if(profSum) parts.push((formula.profs||[]).map(profLabelFn).join("+"));
              if(spLvlPart) parts.push("SL×"+(formula.spellLevelMult)+"("+spLvlPart+")");
              if(spAtkPart) parts.push("SpellAtk("+spAtkPart+")");
              if(lvlSum) parts.push("Lvl("+lvlSum+")");
              return parts.filter(Boolean).join(" + ")||"—";
            })()}
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <div style={{fontFamily:"'Cinzel Decorative',serif",fontSize:24,fontWeight:700,color:"var(--gold-l)"}}>{total>=0?"+"+total:""+total}</div>
            <button onClick={function(){onApply(total,formula);}} style={{background:"rgba(74,156,92,.15)",border:"1px solid rgba(74,156,92,.4)",color:"rgba(74,156,92,.9)",fontFamily:"'Cinzel',serif",fontSize:10,padding:"5px 12px",cursor:"pointer",borderRadius:2}}>Apply</button>
            {onClear&&<button onClick={onClear} style={{background:"transparent",border:"1px solid rgba(201,74,42,.25)",color:"rgba(201,74,42,.45)",fontFamily:"'Cinzel',serif",fontSize:10,padding:"5px 10px",cursor:"pointer",borderRadius:2}}>Clear</button>}
            <button onClick={onClose} style={{background:"transparent",border:"1px solid rgba(201,74,42,.3)",color:"rgba(201,74,42,.5)",fontFamily:"'Cinzel',serif",fontSize:10,padding:"5px 10px",cursor:"pointer",borderRadius:2}}>Cancel</button>
          </div>
        </div>
      </div>
    </div>,
    document.body
  );
}

function UsesCalcModal({lim,c,onApply,onClose}){
  return <FormulaModal c={c} initialFormula={lim.usesFormula}
    title="Calculate Uses" minResult={1}
    onApply={onApply} onClose={onClose}
    onClear={lim.usesFormula?function(){onApply(null,null);}:null} />;
}

function LimitBlock({lim,idx,onChange,onDelete,isOnly,c}){
  const [showCalc,setShowCalc]=React.useState(false);

  // Live-recompute from formula whenever character state changes
  const computeFromFormula=function(formula){
    if(!formula) return null;
    const allCls=(c.classes&&c.classes.length>0?c.classes:[{nm:c.cls||"",lv:"",hd:"d6"}]).filter(function(cl){return (cl.nm||"").trim();});
    const totalLv=allCls.reduce(function(t,cl){return t+(parseInt(cl.lv)||0);},0);
    const pb2=(function(){var base=totalLv<1?2:Math.ceil(totalLv/4)+1;return base+(parseInt((c.pbBonus||"").replace("+",""))||0);})();
    const getMod2=function(abl){var base=parseInt((c.statsBase&&c.statsBase[abl])||c.stats[abl])||10;var bon=parseInt((c.statsBon&&c.statsBon[abl])||0)||0;return Math.floor((base+bon-10)/2);};
    const flat=parseInt((formula.flat||"").replace("+",""))||0;
    const ablSum=(formula.abls||[]).reduce(function(t,a){return t+getMod2(a);},0);
    // Support both new profs[] array and legacy prof string
    const profSum=(function(){
      if(formula.profs&&formula.profs.length>0){
        return formula.profs.reduce(function(t,p){return t+(p==="full"?pb2:p==="half-up"?Math.ceil(pb2/2):p==="half"?Math.floor(pb2/2):0);},0);
      }
      var p=formula.prof||"none";
      return p==="full"?pb2:p==="half-up"?Math.ceil(pb2/2):p==="half"?Math.floor(pb2/2):0;
    })();
    // Support both new lvlEntries[] array and legacy lvlType/lvlClass
    const lvlSum=(function(){
      if(formula.lvlEntries&&formula.lvlEntries.length>0){
        return formula.lvlEntries.reduce(function(t,e){
          var type=e.type||"none";
          if(type==="total-full") return t+totalLv;
          if(type==="total-half-down") return t+Math.floor(totalLv/2);
          if(type==="total-half-up") return t+Math.ceil(totalLv/2);
          var cl=allCls.find(function(x){return x.nm===e.cls;});
          var clLv=cl?parseInt(cl.lv)||0:0;
          if(type==="class-full") return t+clLv;
          if(type==="class-half-down") return t+Math.floor(clLv/2);
          if(type==="class-half-up") return t+Math.ceil(clLv/2);
          return t;
        },0);
      }
      if(formula.lvlType==="total-full") return totalLv;
      if(formula.lvlType==="total-half-down") return Math.floor(totalLv/2);
      if(formula.lvlType==="total-half-up") return Math.ceil(totalLv/2);
      if(formula.lvlType==="class-full"){var cl=allCls.find(function(x){return x.nm===formula.lvlClass;});return cl?parseInt(cl.lv)||0:0;}
      if(formula.lvlType==="class-half-down"){var cl2=allCls.find(function(x){return x.nm===formula.lvlClass;});return cl2?Math.floor((parseInt(cl2.lv)||0)/2):0;}
      if(formula.lvlType==="class-half-up"){var cl3=allCls.find(function(x){return x.nm===formula.lvlClass;});return cl3?Math.ceil((parseInt(cl3.lv)||0)/2):0;}
      return 0;
    })();
    return Math.max(1,flat+ablSum+profSum+lvlSum);
  };

  const formulaResult=lim.usesFormula?computeFromFormula(lim.usesFormula):null;
  const maxUses=formulaResult!==null?formulaResult:(parseInt(lim.uses)||0);
  const expended=parseInt(lim.exp)||0;
  const remaining=Math.max(0,maxUses-expended);
  const pipCol=maxUses===0?"#4a9c5c":remaining>maxUses*0.6?"#4a9c5c":remaining>maxUses*0.3?"#c9962a":"#c94a2a";
  const ch=(f,v)=>onChange(idx,f,v);
  return (
  <>
    <div style={{marginBottom:6,padding:"8px 10px",background:"rgba(201,74,42,.05)",borderRadius:2,border:"1px solid rgba(201,74,42,.15)",position:"relative"}}>
      <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6,flexWrap:"wrap"}}>
        <input value={lim.name||""} onChange={e=>ch("name",e.target.value)} placeholder="Limit name (e.g. Fireball)..."
          style={{flex:1,minWidth:100,background:"transparent",border:"none",borderBottom:"1px solid rgba(201,74,42,.3)",color:"var(--ember)",fontFamily:"'Cinzel',serif",fontSize:11,outline:"none",padding:"1px 0 3px"}} />
        {!isOnly&&<button onClick={()=>window.__confirm("Delete this feature?",()=>onDelete(idx))} style={{background:"transparent",border:"none",color:"rgba(201,74,42,.4)",cursor:"pointer",fontSize:12,padding:0,flexShrink:0}}>x</button>}
      </div>
      <div style={{display:"flex",gap:10,alignItems:"flex-end",flexWrap:"wrap"}}>
        <div style={{display:"flex",flexDirection:"column",gap:2}}>
          <label className="fl" style={{fontSize:8}}>Max Uses</label>
          <input value={formulaResult!==null?maxUses:(lim.uses||"")} readOnly onChange={function(){}} onClick={function(){setShowCalc(true);}} placeholder="0"
            style={{width:48,background:"transparent",border:"none",borderBottom:"1px solid rgba(201,150,42,.35)",color:formulaResult!==null?"rgba(201,150,42,.5)":"var(--gold-l)",fontFamily:"'Cinzel',serif",fontSize:16,textAlign:"center",outline:"none",cursor:"pointer"}} />
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:2}}>
          <label className="fl" style={{fontSize:8}}>Expended</label>
          <input value={lim.exp||""} onChange={e=>ch("exp",e.target.value)} placeholder="0"
            style={{width:48,background:"transparent",border:"none",borderBottom:"1px solid rgba(201,74,42,.45)",color:"var(--ember)",fontFamily:"'Cinzel',serif",fontSize:16,textAlign:"center",outline:"none"}} />
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:2,alignItems:"center"}}>
          <label className="fl" style={{fontSize:8}}>Remaining</label>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:20,fontWeight:700,color:pipCol,lineHeight:1}}>{maxUses>0?remaining:"-"}</div>
        </div>
        {maxUses>0&&maxUses<=20&&(
          <div style={{display:"flex",gap:3,alignItems:"center",flexWrap:"wrap",flex:1,minWidth:60}}>
            {Array.from({length:maxUses}).map(function(_,pi){
              const used=pi<expended;
              return <div key={pi} style={{width:12,height:12,borderRadius:2,border:"1px solid "+(used?"rgba(201,74,42,.5)":"rgba(201,150,42,.4)"),background:used?"rgba(201,74,42,.35)":"rgba(201,150,42,.12)",cursor:"pointer",transition:"all .15s"}} onClick={function(){ch("exp",used?Math.max(0,expended-1):Math.min(maxUses,expended+1));}} title={used?"Click to restore":"Click to expend"} />;
            })}
          </div>
        )}
        <div style={{display:"flex",flexDirection:"column",gap:2}}>
          <label className="fl" style={{fontSize:8}}>Die</label>
          <select value={lim.die||"NO"} onChange={e=>ch("die",e.target.value)}
            style={{background:"#1a1410",border:"1px solid rgba(123,79,207,.35)",color:"var(--arcane-l)",fontFamily:"'Cinzel',serif",fontSize:11,padding:"2px 4px",cursor:"pointer",outline:"none",borderRadius:2}}>
            {DIE_OPTS.map(d=><option key={d} value={d}>{d}</option>)}
          </select>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:2}}>
          <label className="fl" style={{fontSize:8}}>Recharge</label>
          <div style={{display:"flex",gap:4,alignItems:"center"}}>
            <TipInput value={lim.recharge||""} onChange={e=>ch("recharge",e.target.value)} placeholder="Long Rest"
              style={{width:78,background:"transparent",border:"none",borderBottom:"1px solid rgba(201,150,42,.2)",color:"rgba(232,213,176,.55)",fontFamily:"'EB Garamond',serif",fontSize:13,textAlign:"center",outline:"none"}} />
            <div onClick={()=>ch("exp","0")}
              style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:.5,color:"rgba(74,156,92,.7)",border:"1px solid rgba(74,156,92,.3)",padding:"2px 5px",borderRadius:2,flexShrink:0,transition:"all .15s",userSelect:"none"}} title="Click to recharge (reset expended to 0)">↺</div>
          </div>
        </div>
      </div>
    </div>
    {showCalc&&<UsesCalcModal lim={lim} c={c} onClose={function(){setShowCalc(false);}} onApply={function(total,formula){if(total===null){onChange(idx,"__full__",{...lim,uses:"",usesFormula:null});}else{onChange(idx,"__full__",{...lim,uses:""+total,usesFormula:formula});}setShowCalc(false);}} />}
  </>
  );
}

function Page3({c,s}){
  const updFeat=(i,field,val)=>{const a=[...c.feat];a[i]={...a[i],[field]:val};s("feat",a);};
  const updFeatLim=(fi,li,field,val)=>{
    const a=[...c.feat];
    const lims=[...(a[fi].limits||[{name:"",uses:"",exp:"",die:"NO",recharge:""}])];
    if(field==="__full__"){lims[li]=val;}else{lims[li]={...lims[li],[field]:val};}
    a[fi]={...a[fi],limits:lims};
    s("feat",a);
  };
  const addFeatLim=(fi)=>{
    const a=[...c.feat];
    const lims=[...(a[fi].limits||[{name:"",uses:"",exp:"",die:"NO",recharge:""}]),{name:"",uses:"",exp:"",die:"NO",recharge:""}];
    a[fi]={...a[fi],limits:lims};
    s("feat",a);
  };
  const delFeatLim=(fi,li)=>{
    const a=[...c.feat];
    const lims=(a[fi].limits||[]).filter((_,j)=>j!==li);
    a[fi]={...a[fi],limits:lims.length>0?lims:[{name:"",uses:"",exp:"",die:"NO",recharge:""}]};
    s("feat",a);
  };

  const updFts=(i,field,val)=>{const a=[...c.fts];a[i]={...a[i],[field]:val};s("fts",a);};
  const updFtsLim=(fi,li,field,val)=>{
    const a=[...c.fts];
    const lims=[...(a[fi].limits||[{name:"",uses:"",exp:"",die:"NO",recharge:""}])];
    if(field==="__full__"){lims[li]=val;}else{lims[li]={...lims[li],[field]:val};}
    a[fi]={...a[fi],limits:lims};
    s("fts",a);
  };
  const addFtsLim=(fi)=>{
    const a=[...c.fts];
    const lims=[...(a[fi].limits||[{name:"",uses:"",exp:"",die:"NO",recharge:""}]),{name:"",uses:"",exp:"",die:"NO",recharge:""}];
    a[fi]={...a[fi],limits:lims};
    s("fts",a);
  };
  const delFtsLim=(fi,li)=>{
    const a=[...c.fts];
    const lims=(a[fi].limits||[]).filter((_,j)=>j!==li);
    a[fi]={...a[fi],limits:lims.length>0?lims:[{name:"",uses:"",exp:"",die:"NO",recharge:""}]};
    s("fts",a);
  };

  return (
    <div>
      <div className="orn">Features</div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,marginTop:32}}>
        <div onClick={function(){
          s("feat",(c.feat||[]).map(function(f){return f.limited?{...f,limits:(f.limits||[]).map(function(l){return {...l,exp:"0"};})}:f;}));
          s("fts",(c.fts||[]).map(function(f){return f.limited?{...f,limits:(f.limits||[]).map(function(l){return {...l,exp:"0"};})}:f;}));
        }} style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:1.5,textTransform:"uppercase",color:"rgba(74,156,92,.8)",border:"1px solid rgba(74,156,92,.35)",padding:"4px 12px",borderRadius:2,transition:"all .15s",userSelect:"none"}}
          title="Reset all expended uses to 0">↺ Recharge All</div>
        <div style={{display:"flex",gap:6}}>
          <div onClick={function(){
            const allOpen={};
            (c.feat||[]).forEach(function(_,i){allOpen["feat-"+i]=true;});
            (c.fts||[]).forEach(function(_,i){allOpen["fts-"+i]=true;});
            s("dsOpen",allOpen);
          }} style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:1,textTransform:"uppercase",color:"rgba(232,213,176,.4)",border:"1px solid rgba(232,213,176,.12)",padding:"3px 8px",borderRadius:2,userSelect:"none"}}>+ All</div>
          <div onClick={function(){
            const allClosed={};
            (c.feat||[]).forEach(function(_,i){allClosed["feat-"+i]=false;});
            (c.fts||[]).forEach(function(_,i){allClosed["fts-"+i]=false;});
            s("dsOpen",allClosed);
          }} style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:1,textTransform:"uppercase",color:"rgba(232,213,176,.4)",border:"1px solid rgba(232,213,176,.12)",padding:"3px 8px",borderRadius:2,userSelect:"none"}}>− All</div>
        </div>
      </div>
      <div className="sh">Class and Race Features</div>
      {(c.feat||[]).map((f,i)=>{
        const limited=!!f.limited;
        const limits=f.limits||[{name:"",uses:"",exp:"",die:"NO",recharge:""}];
        const dsKey="feat-"+i;
        const dsOpen=(c.dsOpen&&c.dsOpen[dsKey])!==false;
        const taKey="feat-ds-"+i;
        const savedH=(c.taH&&c.taH[taKey]);
        return (
          <div key={i} className="fc" style={{borderLeftColor:limited?"var(--ember)":"var(--arcane)"}}>
            <div style={{display:"flex",gap:10}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:6}}>
                  <div style={{flex:1}}>
                    <input type="text" value={f.nm||""} onChange={e=>updFeat(i,"nm",e.target.value)} placeholder="Feature name..." style={{width:"100%",background:"transparent",border:"none",borderBottom:"1px solid rgba(201,150,42,.2)",color:"var(--gold-l)",fontFamily:"'Cinzel',serif",fontSize:13,fontWeight:600,letterSpacing:1,outline:"none",padding:"2px 0 4px"}} />
                  </div>
                  <div style={{flex:1}}>
                    <input type="text" value={f.src||""} onChange={e=>updFeat(i,"src",e.target.value)} placeholder="Source..." style={{width:"100%",background:"transparent",border:"none",borderBottom:"1px solid rgba(201,150,42,.1)",color:"rgba(232,213,176,.5)",fontFamily:"'EB Garamond',serif",fontSize:13,fontStyle:"italic",outline:"none",padding:"2px 0 4px"}} />
                  </div>
                  <div onClick={function(){const nd={...(c.dsOpen||{}),[dsKey]:!dsOpen};s("dsOpen",nd);}} style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:13,color:dsOpen?"rgba(201,150,42,.7)":"rgba(232,213,176,.25)",flexShrink:0,userSelect:"none",paddingTop:2,lineHeight:1}} title={dsOpen?"Collapse description":"Expand description"}>{dsOpen?"−":"+"}</div>
                  <button onClick={()=>updFeat(i,"limited",!limited)} title="Toggle limited use tracking"
                    style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:1,textTransform:"uppercase",padding:"3px 7px",flexShrink:0,cursor:"pointer",transition:"all .2s",marginTop:2,background:limited?"rgba(201,74,42,.2)":"transparent",border:"1px solid "+(limited?"rgba(201,74,42,.6)":"rgba(201,150,42,.2)"),color:limited?"var(--ember)":"rgba(232,213,176,.3)"}}>{limited?"Limited":"+ Limit"}</button>
                </div>
                {limited&&(
                  <div style={{marginBottom:8}}>
                    {limits.map(function(lim,li){return <LimitBlock key={li} lim={lim} idx={li} c={c} onChange={function(li2,f2,v){updFeatLim(i,li2,f2,v);}} onDelete={function(li2){delFeatLim(i,li2);}} isOnly={limits.length===1} />;})}</div>
                )}{limited&&<button className="arb" onClick={()=>addFeatLim(i)} style={{fontSize:9,padding:"2px 8px",marginTop:2,borderColor:"rgba(201,74,42,.3)",color:"rgba(201,74,42,.6)"}}>+ Add Limit</button>}
                {dsOpen&&<AutoTextarea value={f.ds||""} onChange={e=>updFeat(i,"ds",e.target.value)} placeholder="Description..."
                  style={{width:"100%",background:"transparent",border:"none",color:"var(--parch)",fontFamily:"'EB Garamond',serif",fontSize:14,lineHeight:1.6,outline:"none"}} />}
              </div>
              <button className="db" onClick={()=>window.__confirm("Delete this feature?",()=>s("feat",c.feat.filter((_,j)=>j!==i)))}>x</button>
            </div>
          </div>

const SPELL_MD_URL="https://raw.githubusercontent.com/liapatiso95-ctrl/character-sheet/main/spells.md";
const _spellCache={data:null,status:"idle"}; // "idle"|"loading"|"ready"|"error"
const _spellListeners=[];
function _notifySpellListeners(){_spellListeners.forEach(function(fn){fn();});}

function parseSpellMarkdown(md){
  var spells={};
  // Split on #### headings
  var blocks=md.split(/^####\s+/m).slice(1);
  blocks.forEach(function(block){
    var lines=block.split("\n");
    var name=(lines[0]||"").trim();
    if(!name) return;
    // Parse italic line: *3rd-level Abjuration* or *Evocation Cantrip*
    // Also handle ritual tag: *1st-level Divination (ritual)*
    var level=0, school="", ritual=false;
    var italicLine=(lines[1]||"").trim().replace(/^\*|\*$/g,"");
    // Extract (ritual) from anywhere in the italic line
    if(/\(ritual\)/i.test(italicLine)){ritual=true;italicLine=italicLine.replace(/\s*\(ritual\)/i,"").trim();}
    var cantrip=italicLine.match(/^(\w+)\s+Cantrip$/i);
    var leveled=italicLine.match(/^(\d+)(?:st|nd|rd|th)[- ]level\s+(.+)$/i);
    if(cantrip){school=cantrip[1];level=0;}
    else if(leveled){level=parseInt(leveled[1]);school=leveled[2].trim();}
    // Parse key: value fields — handle both **Key:** Value and plain Key Value
    var castingTime="",range="",components="",duration="",conc=false,classes="";
    var descLines=[];
    var pastDuration=false;
    for(var li=2;li<lines.length;li++){
      var ln=lines[li].trim();
      // Stop at any heading (## / ### section dividers between spell groups)
      if(/^#/.test(ln)) break;
      if(!pastDuration){
        // Match **Key:** Value OR plain Key Value (for keys we know)
        var kv=ln.match(/^\*\*([^*]+)\*\*[:\s]+(.+)$/)||ln.match(/^(Casting Time|Range|Components|Duration|Classes)[:\s]+(.+)$/i);
        if(kv){
          var k=kv[1].toLowerCase().trim().replace(/:$/,""), v=kv[2].trim();
          if(k==="casting time"){
            if(/ritual/i.test(v)){ritual=true;v=v.replace(/\s*or\s+ritual|\s*\(?ritual\)?/gi,"").trim();}
            castingTime=v;
          }
          else if(k==="range"){range=v;}
          else if(k==="components"){components=v;}
          else if(k==="classes"){classes=v;}
          else if(k==="duration"){
            if(/concentration/i.test(v)){conc=true;v=v.replace(/concentration,?\s*(up\s+to\s+)?/i,"").trim();}
            duration=v;
            pastDuration=true;
          }
          continue;
        }
        // Only flip to description mode on unrecognised lines if we've seen all 4 fields
        if(ln&&castingTime&&range&&components&&duration&&!pastDuration){pastDuration=true;}
      }
      if(pastDuration){
        var cleaned=ln.replace(/\*\*\*([^*]+)\*\*\*/g,"$1").replace(/\*\*([^*]+)\*\*/g,"$1").replace(/\*([^*]+)\*/g,"$1");
        // Skip layout artifacts like "column", "\column", "page", "\page", "{{...}}"
        if(cleaned&&!/^\\?(column|page)$/i.test(cleaned)&&!/^\{\{/.test(cleaned)){
          // Add blank line before "At Higher Levels" and "Cantrip Scaling"
          if(/^(at higher levels|cantrip scaling)/i.test(cleaned)&&descLines.length>0) descLines.push("");
          descLines.push(cleaned);
        }
      }
    }
    var desc=descLines.join("\n").trim();
    // Skip stub entries that are just a name with no real content
    if(!desc&&!castingTime&&!range&&!components&&!duration&&!school&&!classes) return;
    spells[name.toLowerCase()]={name,level,school,castingTime,range,components,duration,conc,ritual,classes,desc};
  });
  return spells;
}

function useSpellCompendium(){
  const [tick,setTick]=React.useState(0);
  React.useEffect(function(){
    function onUpdate(){setTick(function(t){return t+1;});}
    _spellListeners.push(onUpdate);
    // Trigger fetch if idle
    if(_spellCache.status==="idle"){
      _spellCache.status="loading";
      fetch(SPELL_MD_URL)
        .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.text();})
        .then(function(text){_spellCache.data=parseSpellMarkdown(text);_spellCache.status="ready";_notifySpellListeners();})
        .catch(function(){_spellCache.status="error";_notifySpellListeners();});
    }
    return function(){var idx=_spellListeners.indexOf(onUpdate);if(idx>=0)_spellListeners.splice(idx,1);};
  },[]);
  return _spellCache;
}

// Returns true if a result's document slug/key indicates official SRD content (2014 or 2024).
// Lenient: accepts known SRD slugs AND anything that isn't a recognised third-party publisher,
// because Open5e's various endpoints tag SRD content with inconsistent slugs (srd / wotc-srd / srd-2014 / srd-2024).
function isSrdDoc(slug){
  slug=(""+(slug||"")).toLowerCase();
  if(!slug) return true; // no slug → assume SRD rather than silently dropping
  // Explicit third-party publishers to exclude
  var thirdParty=["tob","toh","kp","vom","cc","menagerie","a5e","bfrd","dmag","warlock","blackflag","kp-","deepm","tob2","tob3","tob-"];
  for(var i=0;i<thirdParty.length;i++){
    if(slug.indexOf(thirdParty[i])>=0) return false;
  }
  return true;
}

// Open5e SRD spell search — pulls from both v1 (2014 SRD) and v2 (2024 SRD), merged & deduped.
function open5eSpellSearch(query){
  var q=encodeURIComponent(query);
  var v1=fetch("https://api.open5e.com/v1/spells/?search="+q+"&limit=15").then(function(r){return r.ok?r.json():{results:[]};}).catch(function(){return {results:[]};})
    .then(function(json){
      return (json.results||[]).filter(function(sp){return isSrdDoc(sp.document__slug);}).map(function(sp){
        var lvl=parseInt(sp.level_int!==undefined?sp.level_int:sp.level)||0;
        var desc=(sp.desc||"").toString();
        if(sp.higher_level) desc+="\n\nAt Higher Levels. "+sp.higher_level;
        return {name:sp.name,level:lvl,school:sp.school||"",castingTime:sp.casting_time||"",range:sp.range||"",components:sp.components||"",duration:sp.duration||"",conc:!!sp.concentration&&sp.concentration!=="no",ritual:!!sp.ritual&&sp.ritual!=="no",classes:sp.dnd_class||sp.class||"",desc:desc,src:"srd",srdVer:"14"};
      });
    });
  var v2=fetch("https://api.open5e.com/v2/spells/?name__icontains="+q+"&document__key=srd-2024&limit=15").then(function(r){return r.ok?r.json():{results:[]};}).catch(function(){return {results:[]};})
    .then(function(json){
      // Fallback: if the document__key filter yields nothing, try just name filter + client-side SRD filter
      if(!json.results||json.results.length===0){
        return fetch("https://api.open5e.com/v2/spells/?name__icontains="+q+"&limit=20").then(function(r){return r.ok?r.json():{results:[]};}).catch(function(){return {results:[]};})
          .then(function(j2){
            return (j2.results||[]).filter(function(sp){
              var dk=(sp.key||"")+"|"+(sp.document&&(sp.document.key||sp.document.slug)||sp.document||"");
              return dk.toLowerCase().indexOf("2024")>=0;
            });
          });
      }
      return json.results;
    })
    .then(function(results){
      return (results||[]).map(function(sp){
        var lvl=typeof sp.level==="number"?sp.level:(parseInt(sp.level_int!==undefined?sp.level_int:sp.level)||0);
        var school=sp.school&&sp.school.name?sp.school.name:(typeof sp.school==="string"?sp.school:"");
        var desc=(sp.desc||"").toString();
        if(sp.higher_level) desc+="\n\nAt Higher Levels. "+sp.higher_level;
        var comp=[];if(sp.verbal)comp.push("V");if(sp.somatic)comp.push("S");if(sp.material)comp.push("M"+(sp.material_specified?" ("+sp.material_specified+")":""));
        var compStr=comp.length?comp.join(", "):(typeof sp.components==="string"?sp.components:"");
        return {name:sp.name,level:lvl,school:school,castingTime:sp.casting_time||"",range:sp.range_text||sp.range||"",components:compStr,duration:sp.duration||"",conc:!!sp.concentration,ritual:!!sp.ritual,classes:(sp.classes&&sp.classes.length?sp.classes.map(function(x){return x.name||x;}).join(", "):(sp.dnd_class||"")),desc:desc,src:"srd",srdVer:"24"};
      });
    });
  return Promise.all([v1,v2]).then(function(arrs){
    // Dedup within each version only; keep both 2014 and 2024 versions of the same spell
    function dedup(arr){var seen={};return arr.filter(function(sp){var k=sp.name.toLowerCase();if(seen[k])return false;seen[k]=true;return true;});}
    return dedup(arrs[0]).concat(dedup(arrs[1]));
  });
}

function SpellNameInput({value, onChange, onAutofill, placeholder, style, spellLevel}){
  const cache=useSpellCompendium();
  const [open,setOpen]=React.useState(false);
  const [rect,setRect]=React.useState(null);
  const inputRef=React.useRef(null);
  const pickingRef=React.useRef(false); // true while mouse is down on dropdown
  const [srdResults,setSrdResults]=React.useState([]);
  const [srdLoading,setSrdLoading]=React.useState(false);
  const debounceRef=React.useRef(null);

  const updateRect=React.useCallback(function(){
    if(inputRef.current){var r=inputRef.current.getBoundingClientRect();setRect({left:r.left,top:r.bottom,width:r.width});}
  },[]);

  // Local (spells.md) matches take priority
  var localMatches=[];
  if(cache.status==="ready"&&cache.data&&(value||"").length>=2){
    var q=(value||"").toLowerCase();
    localMatches=Object.values(cache.data).filter(function(sp){
      return sp.name.toLowerCase().includes(q)&&(spellLevel===undefined||sp.level===spellLevel);
    }).map(function(sp){return Object.assign({},sp,{src:"file"});}).slice(0,8);
  }

  // Debounced SRD fallback
  React.useEffect(function(){
    if((value||"").length<2){setSrdResults([]);return;}
    if(debounceRef.current) clearTimeout(debounceRef.current);
    debounceRef.current=setTimeout(function(){
      setSrdLoading(true);
      open5eSpellSearch(value).then(function(res){setSrdResults(res);setSrdLoading(false);}).catch(function(){setSrdResults([]);setSrdLoading(false);});
    },350);
    return function(){if(debounceRef.current) clearTimeout(debounceRef.current);};
  },[value]);

  // Merge: file first, then SRD not already in file (filtered by level if specified)
  // Show both File and SRD results, even when names match — tags distinguish them
  var srdExtra=srdResults.filter(function(sp){return (spellLevel===undefined||sp.level===spellLevel);}).slice(0,8);
  var suggestions=localMatches.concat(srdExtra);

  React.useEffect(function(){
    if(!open) return;
    updateRect();
    function onMove(){updateRect();}
    window.addEventListener("scroll",onMove,true);window.addEventListener("resize",onMove);
    return function(){window.removeEventListener("scroll",onMove,true);window.removeEventListener("resize",onMove);};
  },[open,updateRect]);

  function applySpell(sp){
    pickingRef.current=false;
    setOpen(false);
    onAutofill(sp);
  }

  var showDrop=open&&((value||"").length>=2)&&(suggestions.length>0||srdLoading)&&rect;

  return (
    <div style={{position:"relative",display:"flex",alignItems:"center",width:"100%"}}>
      <input
        ref={inputRef}
        value={value||""}
        onChange={onChange}
        onFocus={function(){updateRect();setOpen(true);}}
        onBlur={function(){
          // Only close if we're not in the middle of picking
          if(!pickingRef.current) setOpen(false);
        }}
        placeholder={placeholder}
        style={style}
      />
      {showDrop&&(
        <div
          onMouseDown={function(){pickingRef.current=true;}}
          onMouseUp={function(){pickingRef.current=false;}}
          style={{position:"fixed",top:rect.top,left:rect.left,zIndex:99999,background:"#1a1208",border:"1px solid rgba(201,150,42,.4)",boxShadow:"0 4px 24px rgba(0,0,0,.9)",minWidth:Math.max(rect.width,220),maxWidth:360,maxHeight:280,overflowY:"auto"}}
        >
          {suggestions.map(function(sp,idx){
            return (
              <div key={sp.name+idx}
                onClick={function(){applySpell(sp);}}
                style={{padding:"6px 10px",cursor:"pointer",borderBottom:"1px solid rgba(201,150,42,.08)",display:"flex",alignItems:"baseline",gap:8}}
              >
                <span style={{fontFamily:"'EB Garamond',serif",fontSize:13,color:"var(--gold-l)",fontWeight:600,flex:1}}>{sp.name}</span>
                <span style={{fontFamily:"'Cinzel',serif",fontSize:9,color:"rgba(184,154,240,.6)",whiteSpace:"nowrap"}}>{sp.level===0?"Cantrip":"Lv "+sp.level}</span>
                <span style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:.5,color:sp.src==="file"?"rgba(74,156,92,.6)":"rgba(96,180,196,.55)",whiteSpace:"nowrap",textTransform:"uppercase"}}>{sp.src==="file"?"File":("SRD"+(sp.srdVer||""))}</span>
              </div>
            );
          })}
          {srdLoading&&<div style={{padding:"6px 10px",fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:1,color:"rgba(201,150,42,.5)",textTransform:"uppercase"}}>Searching SRD…</div>}
        </div>
      )}
    </div>
  );
}

const FEAT_MD_URL="https://raw.githubusercontent.com/liapatiso95-ctrl/character-sheet/main/feats.md";
const _featCache={data:null,status:"idle"};
const _featListeners=[];
function _notifyFeatListeners(){_featListeners.forEach(function(fn){fn();});}

function parseFeatMarkdown(md){
  var feats={};
  var blocks=md.split(/^###\s+/m).slice(1);
  blocks.forEach(function(block){
    var lines=block.split("\n");
    var name=(lines[0]||"").trim();
    if(!name) return;
    var descLines=[];
    var prereq="";
    for(var li=1;li<lines.length;li++){
      var ln=lines[li].trim();
      if(!ln) continue;
      // Stop at any heading (#, ##, ### section dividers — e.g. next feat group)
      if(/^#/.test(ln)) break;
      // Skip layout artifacts
      if(/^\\?(column|page)$/i.test(ln)||/^\{\{/.test(ln)) continue;
      // Strip ***Prerequisites...*** markers but keep the text
      var cleaned=ln.replace(/\*\*\*([^*]+)\*\*\*/g,"$1").replace(/\*\*([^*]+)\*\*/g,"$1").replace(/\*([^*]+)\*/g,"$1");
      if(!cleaned) continue;
      // Capture prerequisite line (e.g. "Prerequisite: Strength 13 or higher")
      var pm=cleaned.match(/^Prerequisites?:\s*(.+)$/i);
      if(pm){prereq=pm[1].trim();}
      // Convert **Label.** text → - Label. text
      var boldLabel=ln.match(/^\*\*([^*]+)\*\*\.?\s*(.*)$/);
      if(boldLabel){
        var label=boldLabel[1].replace(/\.$/,"").trim();
        var rest=boldLabel[2].trim();
        descLines.push("- "+label+". "+rest);
      } else {
        descLines.push(cleaned);
      }
    }
    // Insert blank line before each "- " entry (except first)
    var formatted=[];
    descLines.forEach(function(ln2,idx){
      if(ln2.startsWith("- ")&&idx>0&&!descLines[idx-1].startsWith("- ")&&descLines[idx-1]!==""){
        formatted.push("");
      }
      formatted.push(ln2);
    });
    var fullDesc=formatted.join("\n").trim();
    // Skip stub entries with no description
    if(!fullDesc&&!prereq) return;
    // Detect which ability scores this feat can increase, from the "Ability Score Increase" line
    var abilities=[];
    var asiMatch=fullDesc.match(/Ability Score Increase[^\n]*?\.([^\n]*)/i);
    var asiText=asiMatch?asiMatch[1]:"";
    // Also scan a wider window in case wording differs
    var scanText=asiText||fullDesc;
    var ablMap=[["Strength","STR"],["Dexterity","DEX"],["Constitution","CON"],["Intelligence","INT"],["Wisdom","WIS"],["Charisma","CHA"]];
    // Prefer the dedicated ASI line; if it mentions "one ability score of your choice" treat as all six
    if(/one ability score of your choice|any ability score/i.test(scanText)){
      abilities=["STR","DEX","CON","INT","WIS","CHA"];
    } else {
      ablMap.forEach(function(p){if(new RegExp("\\b"+p[0]+"\\b","i").test(scanText)) abilities.push(p[1]);});
    }
    feats[name.toLowerCase()]={name,desc:fullDesc,prereq:prereq,abilities:abilities};
  });
  return feats;
}

function useFeatCompendium(){
  const [tick,setTick]=React.useState(0);

      fetch(FEAT_MD_URL)
        .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.text();})
        .then(function(text){_featCache.data=parseFeatMarkdown(text);_featCache.status="ready";_notifyFeatListeners();})
        .catch(function(){_featCache.status="error";_notifyFeatListeners();});

    return function(){var idx=_featListeners.indexOf(onUpdate);if(idx>=0)_featListeners.splice(idx,1);};
  },[]);

}

// Open5e SRD feat search — pulls from both v1 and v2, filtered to SRD documents.
function open5eFeatSearch(query){
  var q=encodeURIComponent(query);
  function fmtFeatDesc(prereq,body){
    var desc="";
    if(prereq&&(""+prereq).toLowerCase()!=="none"&&(""+prereq).trim()) desc+="Prerequisites: "+prereq+"\n";
    body=(""+(body||"")).replace(/\*\*\*([^*]+)\*\*\*/g,"$1").replace(/^\s*\*\*([^*]+?)\.?\*\*\.?\s*/gm,"- $1. ").replace(/\*\*([^*]+)\*\*/g,"$1").replace(/\*([^*]+)\*/g,"$1");
    return (desc+body).trim();
  }
  function abilitiesFromText(txt){
    txt=""+(txt||"");
    var asi=txt.match(/Ability Score Increase[^\n]*?\.([^\n]*)/i);
    var scan=asi?asi[1]:txt;
    if(/one ability score of your choice|any ability score/i.test(scan)) return ["STR","DEX","CON","INT","WIS","CHA"];

const ITEM_MD_URL="https://raw.githubusercontent.com/liapatiso95-ctrl/character-sheet/main/items.md";
const _itemCache={data:null,status:"idle"}; // local items.md
const _itemListeners=[];
function _notifyItemListeners(){_itemListeners.forEach(function(fn){fn();});}

// Detect "has N charges" and "regains XdY+Z charges" in an item description.
// Returns {enabled,max,used,restore} ready for the charge tracker, or null.
function parseChargesFromDesc(desc){
  if(!desc) return null;
  var text=desc.toLowerCase();
  var maxMatch=text.match(/(?:has|maximum of|with|holds|contains)\s+(\d+)\s+charges/)
            || text.match(/(\d+)\s+charges\b/);
  if(!maxMatch) return null;
  var max=parseInt(maxMatch[1]);
  if(!max||max<=0) return null;
  var restore="";
  var resMatch=text.match(/(?:regains?|recovers?|restores?)\s+(\d*d\d+\s*(?:[+-]\s*\d+)?|\d+)\s+(?:expended\s+)?charges/);
  if(resMatch) restore=resMatch[1].replace(/\s+/g,"");
  return {enabled:true,max:String(max),used:"0",restore:restore,msg:null};
}

// Parse items.md — same #### heading style. Fields: Weight, Cost (optional), then description.
function parseItemMarkdown(md){
  var items={};
  var blocks=md.split(/^####\s+/m).slice(1);
  blocks.forEach(function(block){
    var lines=block.split("\n");
    var name=(lines[0]||"").trim();
    if(!name) return;
    var weight="",cost="",descLines=[],attune=null,type="",rarity="";
    var pastFields=false;
    for(var li=1;li<lines.length;li++){
      var ln=lines[li].trim();
      if(/^#/.test(ln)) break; // stop at next heading
      if(!pastFields){
        // Match bold fields with or without a value: **Field:** value OR **Field:**
        var kv=ln.match(/^\*\*([^*]+)\*\*[:\s]+(.+)$/)||ln.match(/^(Weight|Cost|Type|Rarity|Attunement)[:\s]+(.+)$/i);
        var kvEmpty=!kv&&(ln.match(/^\*\*([^*]+)\*\*:?\s*$/)||ln.match(/^(Weight|Cost|Type|Rarity|Attunement):\s*$/i));
        if(kv){
          var k=kv[1].toLowerCase().trim().replace(/:$/,""),v=kv[2].trim();
          if(k==="weight") weight=v.replace(/\s*(lb\.?|lbs\.?|pounds?)\s*$/i,"").trim();
          else if(k==="cost") cost=v;
          else if(k==="type") type=v;
          else if(k==="rarity") rarity=v;
          else if(k==="attunement") attune=/^(yes|true|required|requires)/i.test(v)?v:(/^(no|none|false)/i.test(v)?false:v);
          continue;
        }
        if(kvEmpty) continue; // empty field line — skip without flipping to description
        if(ln) pastFields=true;
      }
      if(pastFields){
        if(/^\\?(column|page)$/i.test(ln)||/^\{\{/.test(ln)) continue;
        var cleaned=ln.replace(/\*\*\*([^*]+)\*\*\*/g,"$1").replace(/\*\*([^*]+)\*\*/g,"$1").replace(/\*([^*]+)\*/g,"$1");
        if(cleaned) descLines.push(cleaned);
      }
    }
    // If rarity wasn't given but the Type field contains a rarity word, extract it
    if(!rarity&&type){
      var rm=type.match(/\b(Very Rare|Common|Uncommon|Rare|Legendary|Artifact)\b/i);
      if(rm){
        rarity=rm[1];
        // Remove the rarity (and a trailing/leading comma) from the type string
        type=type.replace(/\s*,?\s*\b(Very Rare|Common|Uncommon|Rare|Legendary|Artifact)\b\s*,?\s*/i," ").replace(/\s*,\s*$/,"").replace(/^\s*,\s*/,"").replace(/\s+/g," ").trim();
      }
    }
    var fullDesc=descLines.join("\n").trim();
    // Build header: "Type, Rarity" on first line, attunement on the next, then the description
    var headerLines=[];
    var meta=[type,rarity].filter(Boolean).join(", ");
    if(meta) headerLines.push(meta);
    if(attune===false) headerLines.push("(No Attunement Required)");
    else if(attune) headerLines.push("(Requires Attunement"+(typeof attune==="string"&&attune.replace(/^(yes|true|required|requires attunement?)/i,"").trim()?" "+attune.replace(/^(yes|true|required|requires attunement?)/i,"").trim():"")+")");
    if(headerLines.length>0) fullDesc=headerLines.join("\n")+(fullDesc?"\n"+fullDesc:"");
    // Skip stub entries: only a name, nothing else
    if(!descLines.length&&!weight&&!cost&&!type&&!rarity&&attune===null) return;
    items[name.toLowerCase()]={name,weight,cost,type,rarity,attune:attune===false?false:(attune?true:null),desc:fullDesc,src:"local"};
  });
  return items;
}

function useItemCompendium(){
  const [tick,setTick]=React.useState(0);
  React.useEffect(function(){
    function onUpdate(){setTick(function(t){return t+1;});}
    _itemListeners.push(onUpdate);
    if(_itemCache.status==="idle"){
      _itemCache.status="loading";
      fetch(ITEM_MD_URL)
        .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.text();})
        .then(function(text){_itemCache.data=parseItemMarkdown(text);_itemCache.status="ready";_notifyItemListeners();})
        .catch(function(){_itemCache.status="error";_itemCache.data={};_notifyItemListeners();});
    }
    return function(){var idx=_itemListeners.indexOf(onUpdate);if(idx>=0)_itemListeners.splice(idx,1);};
  },[]);
  return _itemCache;
}

// Open5e live search across weapons, armor, magic items. Returns normalized items.
function open5eSearch(query){
  var q=encodeURIComponent(query);
  var endpoints=[
    {url:"https://api.open5e.com/v1/weapons/?search="+q+"&limit=12",kind:"weapon",ver:"v1"},
    {url:"https://api.open5e.com/v1/armor/?search="+q+"&limit=12",kind:"armor",ver:"v1"},
    {url:"https://api.open5e.com/v1/magicitems/?search="+q+"&limit=12",kind:"magic",ver:"v1"},
    {url:"https://api.open5e.com/v2/items/?name__icontains="+q+"&document__key=srd-2024&limit=12",kind:"item24",ver:"v2"},
    {url:"https://api.open5e.com/v2/magicitems/?name__icontains="+q+"&document__key=srd-2024&limit=12",kind:"magic24",ver:"v2"}
  ];
  return Promise.all(endpoints.map(function(ep){
    return fetch(ep.url).then(function(r){return r.ok?r.json():{results:[]};}).catch(function(){return {results:[]};})
      .then(function(json){
        return (json.results||[]).filter(function(it){return ep.ver==="v2"||isSrdDoc(it.document__slug);}).map(function(it){
          // ── v2 SRD-2024 items ──
          if(ep.ver==="v2"){
            var w2=(it.weight!==undefined&&it.weight!==null?(""+it.weight):"").replace(/\s*(lb\.?|lbs\.?|pounds?)\s*$/i,"").trim();
            var d2="";
            if(ep.kind==="magic24"){
              var raRaw=it.requires_attunement;
              var hasAttune=raRaw===true||raRaw==="true"||(typeof raRaw==="string"&&raRaw.trim()&&raRaw.toLowerCase()!=="false"&&raRaw.toLowerCase()!=="no");
              // attunement_detail holds the qualifier text like "by a spellcaster"; the boolean just means yes/no
              var detail=(it.attunement_detail||"").toString().replace(/^requires attunement/i,"").replace(/^(true|yes)$/i,"").trim();
              // If requires_attunement itself is descriptive text (not a bool), use it as the detail
              if(typeof raRaw==="string"&&raRaw.toLowerCase()!=="true"&&raRaw.toLowerCase()!=="false"&&raRaw.toLowerCase()!=="yes"&&raRaw.toLowerCase()!=="no"){
                var fromRa=raRaw.replace(/^requires attunement/i,"").trim();
                if(fromRa) detail=fromRa;
              }
              var att2=hasAttune?("(Requires Attunement"+(detail?" "+detail:"")+")"):"(No Attunement Required)";
              var meta2=[it.type&&it.type.name?it.type.name:it.type,it.rarity&&it.rarity.name?it.rarity.name:it.rarity].filter(Boolean).join(", ");
              d2=[meta2,att2,(it.desc||it.description||"").toString()].filter(Boolean).join("\n");
            } else {
              d2=(it.desc||it.description||"").toString();
            }
            var v2type=(it.type&&it.type.name?it.type.name:it.type)||"";
            var v2rarity=(it.rarity&&it.rarity.name?it.rarity.name:it.rarity)||"";
            return {name:it.name,weight:w2,cost:it.cost!==undefined?(""+it.cost):"",type:v2type,rarity:v2rarity,desc:d2,src:"open5e",kind:ep.kind==="magic24"?"magic":"item",srdVer:"24",attune:ep.kind==="magic24"?(function(){var r=it.requires_attunement;return r===true||r==="true"||(typeof r==="string"&&r.trim()&&r.toLowerCase()!=="false"&&r.toLowerCase()!=="no")?true:false;})():null};
          }
          // ── v1 (2014 SRD) items ──
          var weight=(it.weight||"").toString().replace(/\s*(lb\.?|lbs\.?|pounds?)\s*$/i,"").trim();
          var desc="";
          if(ep.kind==="weapon"){
            desc=[it.category,it.damage_dice?it.damage_dice+" "+(it.damage_type||""):"",it.properties&&it.properties.length?"Properties: "+it.properties.join(", "):""].filter(Boolean).join(". ");
          } else if(ep.kind==="armor"){
            desc=[it.category,it.ac_string?"AC: "+it.ac_string:"",it.strength_requirement?"Str req: "+it.strength_requirement:"",it.stealth_disadvantage?"Stealth disadvantage":""].filter(Boolean).join(". ");
          } else {
            var attune="";
            var ra=(it.requires_attunement||"").toString().trim();
            if(ra){attune="(Requires Attunement"+(ra.replace(/^requires attunement/i,"").trim()?" "+ra.replace(/^requires attunement/i,"").trim():"")+")";}
            else{attune="(No Attunement Required)";}
            var meta=[it.type,it.rarity].filter(Boolean).join(", ");
            desc=[meta,attune,(it.desc||"").toString()].filter(Boolean).join("\n");
          }
          return {name:it.name,weight:weight,cost:it.cost||"",type:it.type||(ep.kind==="weapon"?"Weapon":ep.kind==="armor"?"Armor":""),rarity:it.rarity||"",desc:desc,src:"open5e",kind:ep.kind,srdVer:"14",attune:ep.kind==="magic"?((it.requires_attunement||"").toString().trim()?true:false):null};
        });
      });
  })).then(function(arrs){
    var merged=[];arrs.forEach(function(a){merged=merged.concat(a);});
    // Dedup within each SRD version separately so both 14 and 24 versions can show
    var seen={};return merged.filter(function(it){var k=it.srdVer+":"+it.name.toLowerCase();if(seen[k])return false;seen[k]=true;return true;});
  });
}

  }

  const spExhPen=Math.min(5,Math.max(0,parseInt(c.exhaustion)||0))*-2;
  const clsDC=(sc)=>{const a=sc.abl||"INT";const mod=getMod(c,a);const bon=sc.dcBonusFormula?computeBonusFromFormula(sc.dcBonusFormula,c):(parseInt((sc.dcBonus||"").replace("+",""))||0);const dcPen=c.exhAffectAllDC||c.exhAffectSpellDC?spExhPen:0;return ""+(8+pb+mod+bon+dcPen);};
  const clsAtk=(sc)=>{const a=sc.abl||"INT";const mod=getMod(c,a);const bon=sc.atkBonusFormula?computeBonusFromFormula(sc.atkBonusFormula,c):(parseInt((sc.atkBonus||"").replace("+",""))||0);const v=pb+mod+bon+spExhPen;return v>=0?"+"+v:""+v;};

  const ordinal=(n)=>{if(n===0)return "Cantrips";const sf=["th","st","nd","rd"];const v=n%100;return n+(sf[(v-20)%10]||sf[v]||sf[0])+" Level";};
  const classNames=spCls.map(function(sc){return sc.nm||"";}).filter(function(n){return n;});

  const countForClass=(clsName,lv)=>{
    var total=0,prepared=0;

        <td><TipInput value={sp.ti||""} onChange={e=>us(lv,i,"ti",e.target.value)} placeholder="1 action" style={{width:"100%",background:"transparent",border:"none",color:"var(--parch)",fontFamily:"'EB Garamond',serif",fontSize:13,outline:"none",padding:"3px 4px"}} /></td>

        <td><TipInput value={sp.cmp||""} onChange={e=>us(lv,i,"cmp",e.target.value)} placeholder="V,S,M" style={{width:"100%",background:"transparent",border:"none",color:"var(--parch)",fontFamily:"'EB Garamond',serif",fontSize:13,outline:"none",padding:"3px 4px"}} /></td>
        <td><TipInput value={sp.dur||""} onChange={e=>us(lv,i,"dur",e.target.value)} placeholder="Instant" style={{width:"100%",background:"transparent",border:"none",color:"var(--parch)",fontFamily:"'EB Garamond',serif",fontSize:13,outline:"none",padding:"3px 4px"}} /></td>

      </tr>,
      sp.showDesc!==false&&<tr key={i+"b"} style={{borderBottom:"1px solid rgba(123,79,207,.1)"}}>
        <td></td>
        {lv>0&&!(group&&group.sc&&group.sc.known)&&<td></td>}
        <td colSpan={lv>0&&!(group&&group.sc&&group.sc.known)?11:10} style={{paddingBottom:6,paddingTop:0}}>
          <AutoTextarea value={sp.nt||""} onChange={e=>us(lv,i,"nt",e.target.value)} placeholder="Description..."
            style={{width:"100%",background:"transparent",border:"none",color:"rgba(232,213,176,.65)",fontFamily:"'EB Garamond',serif",fontSize:13,lineHeight:1.5,outline:"none",padding:"2px 0"}} />
        </td>
      </tr>
    ];
  });
  };

  return (
    <div>
      {maxPrepModal!==null&&(function(){
        var sc=spCls[maxPrepModal];if(!sc) return null;

          var bonusCantrips=(c.sp[0]||[]).filter(function(sp){return (sp.cls||"")===(sc.nm||"")&&sp.bonus;}).length;
          var leveledSpells=allLvls.filter(function(lv){return lv>0;}).reduce(function(t,lv){return t+(c.sp[lv]||[]).filter(function(sp){return (sp.cls||"")===(sc.nm||"")&&!sp.bonus;}).length;},0);
          var bonusSpells=allLvls.filter(function(lv){return lv>0;}).reduce(function(t,lv){return t+(c.sp[lv]||[]).filter(function(sp){return (sp.cls||"")===(sc.nm||"")&&sp.bonus;}).length;},0);

                    {(function(){var f=sc.maxPrepFormula;if(!f) return "Max: —";var v=computeBonusFromFormula({flat:f.flat||"",abls:f.abls||[],profs:f.profs||[],lvlEntries:f.lvlEntries||[]},c);return "Max: "+v;})()}
                  </div>
                </div>}

          );

                  </div>

            </div>

                <label className="fl" style={{fontSize:8}}>Remaining</label>

            <div style={{display:"flex",gap:4,alignItems:"flex-end"}}>

            </div>
            <span style={{fontFamily:"'EB Garamond',serif",fontSize:11,color:"rgba(232,213,176,.25)",fontStyle:"italic",alignSelf:"flex-end",marginLeft:"auto"}}>shared across all classes</span>
            {sptMax>0&&(
              <div style={{width:"100%",marginTop:8,borderTop:"1px solid rgba(123,79,207,.15)",paddingTop:8}}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:1,textTransform:"uppercase",color:"rgba(123,79,207,.5)",marginBottom:6}}>Spell Level Cost — click to spend</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4,position:"relative"}}>

                      <SortableTh label="C" col="conc" sort={spellSorts[lv+"-"+gi]||null} onSort={(col)=>onSpellSort(lv,gi,col)} style={{width:"3%",textAlign:"center"}} title="Concentration" />

                    <tbody>{renderRows(group,lv,spellSorts[lv+"-"+gi]||null)}</tbody>

                  <button className="arb" onClick={()=>as(lv,group.name)} style={{marginTop:4}}>

                    {"+ Add "+(group.name?(group.name+" "):"")+degNames[""+deg]+" Exploit"}

}

function DiceRollerPage({c,s,savedRolls,saveSRApp}){
  const [showDrSections,setShowDrSections]=React.useState(false);
  const {useState:us2}=React;
  // Compute attack stats from weapons
  const getStatMod2=function(st){
    const base=parseInt((c.statsBase||{})[st])||0;
    const bon=parseInt((c.statsBon||{})[st])||0;
    const total=base+bon;
    return Math.floor((total-10)/2);
  };
  const allClasses=c.classes&&c.classes.length>0?c.classes:[{nm:c.cls||"",lv:"",hd:"d6"}];
  const totalLv=allClasses.reduce(function(t,cl){return t+(parseInt(cl.lv)||0);},0);
  const pb=(totalLv<1?2:Math.ceil(totalLv/4)+1)+(parseInt((c.pbBonus||"").replace("+",""))||0);
  const fmtBonus=function(b){return b>=0?"+"+b:""+b;};
  const drHidden=c.drHidden||{};
  const toggleSection=function(key){saveSRApp(function(prev){var h={...(prev||{})};h[key]=!h[key];return h;});};
  // Reuse saveSRApp pattern but for drHidden via s prop
  const toggleDrHidden=function(key){s('drHidden',{...drHidden,[key]:!drHidden[key]});};

  const rollDie=function(sides){return Math.floor(Math.random()*sides)+1;};

  // A roll result is {id, label, dice:[{sides,val}], bonus, note}
  const [results,setResults]=us2([]);

  const addResult=function(label,dice,bonus,note,groups){
    setResults(function(prev){
      return [{id:Date.now()+Math.random(),label,dice,bonus,note,groups:groups||null},...prev].slice(0,20);
    });
  };

  const rerollDie=function(rid,di){
    setResults(function(prev){
      return prev.map(function(r){
        if(r.id!==rid) return r;
        if(r.groups){
          let remaining=di;
          const newGroups=r.groups.map(function(g){
            if(remaining<0) return g; // already rerolled in a previous group
            if(remaining>=g.dice.length){ remaining-=g.dice.length; return g; }
            const nd=[...g.dice];
            nd[remaining]={...nd[remaining],val:rollDie(nd[remaining].sides)};
            remaining=-1;
            return {...g,dice:nd};
          });
          return {...r,groups:newGroups,dice:newGroups[0].dice};
        }
        const nd=[...r.dice];
        nd[di]={...nd[di],val:rollDie(nd[di].sides)};
        return {...r,dice:nd};
      });
    });
  };

  // Custom roller state
  const [custName,setCustName]=us2("");
  // diceGroups: [{count, sides}]  — supports multi-die expressions like 3d6+2d8
  const [custDiceGroups,setCustDiceGroups]=us2([{count:1,sides:20}]);
  const [custFormula,setCustFormula]=us2(null); // FormulaModal formula object for bonus
  const [custFormulaOpen,setCustFormulaOpen]=us2(false);
  const [qrOpen,setQrOpen]=us2(true);

  const calcCustBonus=function(formula){
    if(!formula) return 0;
    return computeBonusFromFormula(formula,c);
  };

  const rollCustom=function(){
    const bonus=calcCustBonus(custFormula);
    const groups=custDiceGroups.map(function(g){
      const n=Math.max(1,Math.min(20,g.count||1));
      return {label:n+"d"+g.sides, dice:Array.from({length:n},function(){return {sides:g.sides,val:rollDie(g.sides)};})};
    });
    const diceExpr=custDiceGroups.map(function(g){return g.count+"d"+g.sides;}).join("+");
    const lbl=custName.trim()||diceExpr+(bonus!==0?fmtBonus(bonus):"");
    const noteParts=custFormula?[
      (custFormula.abls||[]).map(function(a){return a+"("+fmtBonus(getStatMod2(a))+")";}).join(" "),
      formulaHasProf(custFormula)?formulaProfLabel(custFormula)+"(+"+formulaProfVal(custFormula,c)+")":"",
      parseInt(custFormula.flat||0)?fmtBonus(parseInt(custFormula.flat||0)):""
    ].filter(Boolean):[];
    if(groups.length===1){
      addResult(lbl,groups[0].dice,bonus,noteParts.join(" "));
    } else {
      addResult(lbl,groups[0].dice,bonus,noteParts.join(" "),groups);
    }
  };

  const saveCustom=function(){
    const nm=custName.trim();
    if(!nm) return;
    const newRoll={id:Date.now(),nm,diceGroups:custDiceGroups.map(function(g){return {count:Math.max(1,g.count||1),sides:g.sides};}),formula:custFormula};
    saveSRApp(function(prev){return [...prev,newRoll];});
  };

  const rollSaved=function(sr){
    // backward compat: old saves had count/sides/bonus/prof/abls
    const groups=(sr.diceGroups||[{count:sr.count||1,sides:sr.sides||20}]).map(function(g){
      const n=Math.max(1,Math.min(20,g.count));
      return {label:n+"d"+g.sides, dice:Array.from({length:n},function(){return {sides:g.sides,val:rollDie(g.sides)};})};
    });
    const formula=sr.formula||{flat:""+( sr.bonus||0),abls:sr.abls||[],prof:sr.prof?"full":"none",lvlType:"none",lvlClass:""};
    const bonus=calcCustBonus(formula);
    const noteParts=[(formula.abls||[]).map(function(a){return a+"("+fmtBonus(getStatMod2(a))+")";}).join(" "),formulaHasProf(formula)?formulaProfLabel(formula)+"(+"+formulaProfVal(formula,c)+")":"",parseInt(formula.flat||0)?fmtBonus(parseInt(formula.flat||0)):""].filter(Boolean);
    if(groups.length===1){
      addResult(sr.nm,groups[0].dice,bonus,noteParts.join(" "));
    } else {
      addResult(sr.nm,groups[0].dice,bonus,noteParts.join(" "),groups);
    }
  };

  const srFormula=function(sr){
    const groups=sr.diceGroups||[{count:sr.count||1,sides:sr.sides||20}];
    const diceStr=groups.map(function(g){return g.count+"d"+g.sides;}).join("+");
    const formula=sr.formula;
    if(!formula) return diceStr;
    const parts=[diceStr];
    if(formulaHasProf(formula)) parts.push(formulaProfLabel(formula));
    (formula.abls||[]).forEach(function(a){parts.push(a);});
    if(parseInt(formula.flat||0)) parts.push(fmtBonus(parseInt(formula.flat)));
    return parts.join("+").replace(/\+\+/g,"+").replace(/\+-/g,"-");
  };

  const exhPenalty2=Math.min(5,Math.max(0,parseInt(c.exhaustion)||0))*-2;
  const mkNote2=function(parts){return parts.filter(Boolean).join(" · ");};
  const mkNote=mkNote2;

  const rollAtk=function(w){
    const atkAbls=Array.isArray(w.atkAbls)?w.atkAbls:[];
    const atkFlat=parseInt((w.atkFlat||"").replace("+",""))||0;
    const ablSum=atkAbls.reduce(function(t,a){return t+getStatMod2(a);},0);
    const atkProfMode=w.atkProfMode||(w.atkProf?"full":"none");
    const atkProfBon=atkProfMode==="full"?pb:atkProfMode==="half"?Math.floor(pb/2):atkProfMode==="half-up"?Math.ceil(pb/2):0;
    const bonus=atkProfBon+ablSum+atkFlat+exhPenalty2;
    const profNote=atkProfMode==="full"?"PROF(+"+pb+")":atkProfMode==="half"?"½↓PROF(+"+Math.floor(pb/2)+")":atkProfMode==="half-up"?"½↑PROF(+"+Math.ceil(pb/2)+")":"";
    const noteParts=[atkAbls.map(function(a){return a+"("+fmtBonus(getStatMod2(a))+")";}).join(" "),profNote,atkFlat?"Flat("+fmtBonus(atkFlat)+")":"",exhPenalty2?"Exh("+exhPenalty2+")":""];
    addResult((w.nm||"Attack")+" – Atk",[{sides:20,val:rollDie(20)}],bonus,mkNote(noteParts));
  };

  const rollDmg=function(w){
    const dmgAbls=Array.isArray(w.dmgAbls)?w.dmgAbls:[];
    const ablSum=dmgAbls.reduce(function(t,a){return t+getStatMod2(a);},0);
    const dmgFlat=parseInt((w.dmgFlat||"").replace("+",""))||0;
    const dmgProfMode=w.dmgProfMode||(w.dmgProf?"full":"none");
    const dmgProfBon=dmgProfMode==="full"?pb:dmgProfMode==="half"?Math.floor(pb/2):dmgProfMode==="half-up"?Math.ceil(pb/2):0;
    const bonus=ablSum+dmgProfBon+dmgFlat;
    const base=(w.dmgBase||w.dmg||"1d6").trim();

    // Parse all NdS groups from the expression (e.g. "1d6+2d8+2d6" → [{n:1,s:6},{n:2,s:8},{n:2,s:6}])
    const groupRe=/(\d+)d(\d+)/gi;
    const parsedGroups=[];
    let gm;
    while((gm=groupRe.exec(base))!==null){
      parsedGroups.push({n:Math.min(parseInt(gm[1]),20),s:parseInt(gm[2])});
    }
    if(parsedGroups.length===0) parsedGroups.push({n:1,s:6});

    const profNote=dmgProfMode==="full"?"PROF(+"+pb+")":dmgProfMode==="half"?"½↓PROF(+"+Math.floor(pb/2)+")":dmgProfMode==="half-up"?"½↑PROF(+"+Math.ceil(pb/2)+")":"";
    const noteParts=[dmgAbls.map(function(a){return a+"("+fmtBonus(getStatMod2(a))+")";}).join(" "),profNote,dmgFlat?"Flat("+fmtBonus(dmgFlat)+")":""];

    if(parsedGroups.length===1){
      // Single group — existing flat format
      const dice=Array.from({length:parsedGroups[0].n},function(){return {sides:parsedGroups[0].s,val:rollDie(parsedGroups[0].s)};});
      addResult((w.nm||"Attack")+" – Dmg",dice,bonus,mkNote(noteParts));
    } else {
      // Multiple groups — store as groups array, bonus only on last group
      const rolledGroups=parsedGroups.map(function(g){
        return {
          label:g.n+"d"+g.s,
          dice:Array.from({length:g.n},function(){return {sides:g.s,val:rollDie(g.s)};})
        };
      });
      addResult((w.nm||"Attack")+" – Dmg",rolledGroups[0].dice,bonus,mkNote(noteParts),rolledGroups);
    }
  };

  // All skills list for skill roller
  const ALL_SKILLS=[
    {n:"Acrobatics",a:"DEX"},{n:"Animal Handling",a:"WIS"},{n:"Arcana",a:"INT"},
    {n:"Athletics",a:"STR"},{n:"Deception",a:"CHA"},{n:"History",a:"INT"},
    {n:"Insight",a:"WIS"},{n:"Intimidation",a:"CHA"},{n:"Investigation",a:"INT"},
    {n:"Medicine",a:"WIS"},{n:"Nature",a:"INT"},{n:"Perception",a:"WIS"},
    {n:"Performance",a:"CHA"},{n:"Persuasion",a:"CHA"},{n:"Religion",a:"INT"},
    {n:"Sleight of Hand",a:"DEX"},{n:"Stealth",a:"DEX"},{n:"Survival",a:"WIS"},
  ];

  const abilChkBon2=c.abilCheckBonusFormula?computeBonusFromFormula(c.abilCheckBonusFormula,c):(parseInt((c.abilCheckBonus||"").replace("+",""))||0);
  const abilChkBonPerAbl2=(abl)=>{const f=(c.abilCheckBonusPerAblFormula||{})[abl];return f?computeBonusFromFormula(f,c):(parseInt(((c.abilCheckBonusPerAbl||{})[abl]||"").replace("+",""))||0);};
  const halfPbFloor2=Math.floor(pb/2);

  // Formula-aware bonus helpers — all stack freely
  const drSvBon2=c.svBonusFormula?computeBonusFromFormula(c.svBonusFormula,c):(parseInt((c.svBonus||"").replace("+",""))||0);
  const drSkBon2=c.skBonusFormula?computeBonusFromFormula(c.skBonusFormula,c):(parseInt((c.skBonus||"").replace("+",""))||0);
  const drSvExtra2=(abl)=>{const f=c.svExtraFormula&&c.svExtraFormula[abl];return f?computeBonusFromFormula(f,c):(parseInt((c.svExtra&&c.svExtra[abl]||"").replace("+",""))||0);};
  const drSkExtra2=(nm)=>{const f=c.skExtraFormula&&c.skExtraFormula[nm];return f?computeBonusFromFormula(f,c):(parseInt((c.skExtra&&c.skExtra[nm]||"").replace("+",""))||0);};

  // "Has any prof" — only for the two toggle features
  const skillHasAnyProf2=(sk)=>{
    if(c.skp&&c.skp[sk.n]) return true;
    const a=(c.skAbil&&c.skAbil[sk.n])||sk.a;
    const frms=[c.skBonusFormula,c.skExtraFormula&&c.skExtraFormula[sk.n],c.abilCheckBonusFormula,(c.abilCheckBonusPerAblFormula||{})[a]];
    return frms.some(function(f){return formulaHasProf(f);});
  };
  const checkHasAnyProf2=(abl)=>{
    const frms=[c.abilCheckBonusFormula,(c.abilCheckBonusPerAblFormula||{})[abl]];
    return frms.some(function(f){return formulaHasProf(f);});
  };

  const getSkillTotal=function(sk){
    const a=(c.skAbil&&c.skAbil[sk.n])||sk.a;
    const b=getStatMod2(a);
    const proficient=c.skp&&!!c.skp[sk.n];
    const expert=proficient&&!!(c.skExp&&c.skExp[sk.n]);
    const ownProf=expert?pb*2:proficient?pb:0;
    const ablBon=abilChkBonPerAbl2(a);
    const hpSkill=(c.halfProfSkills&&!skillHasAnyProf2(sk))?halfPbFloor2:0;

            const tot=ablArr.reduce(function(t,a){return t+getStatMod2(a);},0)+iniFlatBon+iniOwnProf+iniHp+abilChkBon2+dexAblBon2+exhPenalty2;
            const profNote2=iniOwnProf>0
              ?(iniProfMode2==="full"?"PROF(+"+pb+")":iniProfMode2==="half"?"½↓PROF(+"+Math.floor(pb/2)+")":"½↑PROF(+"+Math.ceil(pb/2)+")")

            const noteParts=[ablArr.map(function(a){return a+"("+fmtBonus(getStatMod2(a))+")";}).join(" "),iniFlatBon?"Flat("+fmtBonus(iniFlatBon)+")":"",profNote2,abilChkBon2?"ChkBon("+fmtBonus(abilChkBon2)+")":"",dexAblBon2?"DEXBon("+fmtBonus(dexAblBon2)+")":"",exhPenalty2?"Exh("+exhPenalty2+")":""];

// ─── Compendium Search Page ───────────────────────────────────────────────────
function CompendiumPage({c,s}){
  const {useState:us}=React;
  const spellCache=useSpellCompendium();
  const featCache=useFeatCompendium();
  const itemCache=useItemCompendium();
  const [kind,setKind]=us("spells"); // spells | feats | items
  const [query,setQuery]=us("");
  const [descQuery,setDescQuery]=us("");
  const [fLevel,setFLevel]=us("any");
  const [fSchool,setFSchool]=us("any");
  const [fClass,setFClass]=us("");
  const [fCast,setFCast]=us("any");
  const [fRitual,setFRitual]=us("any"); // any | yes | no
  const [fConc,setFConc]=us("any");
  const [fRarity,setFRarity]=us("any");
  const [fAttune,setFAttune]=us("any");
  const [fType,setFType]=us("");
  const [fPrereq,setFPrereq]=us("any"); // any | yes | no
  const [fPrereqText,setFPrereqText]=us("");
  const [fAbilities,setFAbilities]=us([]); // selected ability codes
  const [expanded,setExpanded]=us({});
  const [page,setPage]=us(0);
  const [confirmAdd,setConfirmAdd]=us(null); // the result object pending confirmation
  const [addCls,setAddCls]=us(""); // selected class when adding a spell
  const [srdResults,setSrdResults]=us([]);
  const [srdLoading,setSrdLoading]=us(false);
  const [includeSrd,setIncludeSrd]=us(true);
  const debounceRef=React.useRef(null);

  // Reset filters when switching kind
  function switchKind(k){setKind(k);setExpanded({});setSrdResults([]);setPage(0);}

  // Reset to first page whenever a search or filter changes
  React.useEffect(function(){setPage(0);},[query,descQuery,fLevel,fSchool,fClass,fCast,fRitual,fConc,fRarity,fAttune,fType,fPrereq,fPrereqText,fAbilities,includeSrd,kind]);

  // SRD fetch (debounced) — only when there's a query
  React.useEffect(function(){
    if(!includeSrd){setSrdResults([]);return;}
    var qq=(query||descQuery||"").trim();
    if(qq.length<2){setSrdResults([]);return;}
    if(debounceRef.current) clearTimeout(debounceRef.current);
    debounceRef.current=setTimeout(function(){
      setSrdLoading(true);
      var term=query.trim()||descQuery.trim();
      var p= kind==="spells"?open5eSpellSearch(term)
            :kind==="feats"?open5eFeatSearch(term)
            :open5eSearch(term);
      p.then(function(res){setSrdResults(res||[]);setSrdLoading(false);}).catch(function(){setSrdResults([]);setSrdLoading(false);});
    },400);
    return function(){if(debounceRef.current) clearTimeout(debounceRef.current);};
  },[query,descQuery,kind,includeSrd]);

  // Build the file-based list for the current kind
  var fileList=[];
  if(kind==="spells"&&spellCache.status==="ready"&&spellCache.data) fileList=Object.values(spellCache.data).map(function(x){return Object.assign({},x,{src:"file"});});
  else if(kind==="feats"&&featCache.status==="ready"&&featCache.data) fileList=Object.values(featCache.data).map(function(x){return Object.assign({},x,{src:"file"});});
  else if(kind==="items"&&itemCache.status==="ready"&&itemCache.data) fileList=Object.values(itemCache.data).map(function(x){return Object.assign({},x,{src:"file",name:x.name});});

  // Merge SRD results in
  var all=fileList.concat(srdResults||[]);

  // Apply filters
  var nq=(query||"").toLowerCase().trim();
  var ndq=(descQuery||"").toLowerCase().trim();
  var results=all.filter(function(r){
    if(nq&&(r.name||"").toLowerCase().indexOf(nq)<0) return false;
    if(ndq&&(r.desc||"").toLowerCase().indexOf(ndq)<0) return false;
    if(kind==="spells"){
      if(fLevel!=="any"&&(r.level===undefined||r.level!==parseInt(fLevel))) return false;
      if(fSchool!=="any"&&(r.school||"").toLowerCase()!==fSchool.toLowerCase()) return false;
      if(fClass.trim()&&(r.classes||"").toString().toLowerCase().indexOf(fClass.toLowerCase())<0) return false;
      if(fCast!=="any"&&(r.castingTime||"").toLowerCase().indexOf(fCast.toLowerCase())<0) return false;
      if(fRitual==="yes"&&!r.ritual) return false;
      if(fRitual==="no"&&r.ritual) return false;
      if(fConc==="yes"&&!r.conc) return false;
      if(fConc==="no"&&r.conc) return false;
    }
    if(kind==="items"){
      if(fRarity!=="any"&&(r.rarity||"").toLowerCase()!==fRarity.toLowerCase()) return false;
      if(fAttune==="yes"&&r.attune!==true) return false;
      if(fAttune==="no"&&r.attune!==false) return false;
      if(fType.trim()&&(r.type||"").toLowerCase().indexOf(fType.toLowerCase())<0) return false;
    }
    if(kind==="feats"){
      var hasPre=!!(r.prereq&&(""+r.prereq).trim());
      if(fPrereq==="yes"&&!hasPre) return false;
      if(fPrereq==="no"&&hasPre) return false;
      if(fPrereq==="yes"&&fPrereqText.trim()&&(r.prereq||"").toLowerCase().indexOf(fPrereqText.toLowerCase())<0) return false;
      if(fAbilities.length>0){
        var ab=r.abilities||[];
        // Match if the feat can increase ANY of the selected abilities
        var any=fAbilities.some(function(a){return ab.indexOf(a)>=0;});
        if(!any) return false;
      }
    }
    return true;
  });
  // Sort: file first, then by name (spells by level then name)
  results.sort(function(a,b){
    if(kind==="spells"){var la=a.level||0,lb=b.level||0;if(la!==lb)return la-lb;}
    return (a.name||"").localeCompare(b.name||"");
  });
  var PER_PAGE=20;
  var totalResults=results.length;
  var totalPages=Math.max(1,Math.ceil(totalResults/PER_PAGE));
  var curPage=Math.min(page,totalPages-1);
  var pageResults=results.slice(curPage*PER_PAGE,curPage*PER_PAGE+PER_PAGE);

  var SCHOOLS=["Abjuration","Conjuration","Divination","Enchantment","Evocation","Illusion","Necromancy","Transmutation"];
  var inputStyle={background:"rgba(0,0,0,.3)",border:"1px solid rgba(201,150,42,.2)",color:"var(--parch)",fontFamily:"'EB Garamond',serif",fontSize:13,outline:"none",padding:"5px 8px",borderRadius:2};

  var tabBtn=function(k,label){return <div onClick={function(){switchKind(k);}} style={{cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:11,letterSpacing:1.5,textTransform:"uppercase",padding:"6px 16px",borderRadius:2,userSelect:"none",border:"1px solid "+(kind===k?"var(--gold)":"rgba(201,150,42,.2)"),background:kind===k?"rgba(201,150,42,.12)":"transparent",color:kind===k?"var(--gold-l)":"rgba(232,213,176,.45)"}}>{label}</div>;};

  function toggle(id){setExpanded(function(e){var n=Object.assign({},e);n[id]=!n[id];return n;});}

  function doAdd(r,clsName){
    if(kind==="spells"){
      var lv=r.level||0;
      var cp=Object.assign({},c.sp);
      cp[lv]=(cp[lv]||[]).concat([{nm:r.name||"",ti:r.castingTime||"",rng:r.range||"",cmp:r.components||"",dur:r.duration||"",conc:!!r.conc,prep:false,nt:r.desc||"",cls:clsName||"",sc:r.school||"",ritual:!!r.ritual}]);
      s("sp",cp);
    } else if(kind==="feats"){
      s("fts",(c.fts||[]).concat([{nm:r.name||"",ds:r.desc||"",lv:"",limited:false,limits:[{name:"",uses:"",exp:"",die:"NO",recharge:""}]}]));
    } else if(kind==="items"){
      var ch=parseChargesFromDesc(r.desc);
      s("inv",(c.inv||[]).concat([{nm:r.name||"",qt:"1",wt:r.weight||"",nt:r.cost?"Cost: "+r.cost:"",desc:r.desc||"",showDesc:!!r.desc,eq:false,wl:false,charges:ch||null}]));
    }
    setConfirmAdd(null);
  }

  return (
    <div>
      <div className="sh">Compendium Search</div>
      <div style={{display:"flex",gap:8,marginBottom:14}}>{tabBtn("spells","Spells")}{tabBtn("feats","Feats")}{tabBtn("items","Items")}</div>

      {/* Search controls */}
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:8,alignItems:"center"}}>
        <input value={query} onChange={function(e){setQuery(e.target.value);}} placeholder="Name contains..." style={Object.assign({},inputStyle,{flex:"1 1 160px",minWidth:140})} />
        <input value={descQuery} onChange={function(e){setDescQuery(e.target.value);}} placeholder="Description contains..." style={Object.assign({},inputStyle,{flex:"1 1 160px",minWidth:140})} />
      </div>

      {kind==="spells"&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:8,alignItems:"center"}}>
          <select value={fLevel} onChange={function(e){setFLevel(e.target.value);}} style={selStyle}>

            {[1,2,3,4,5,6,7,8,9].map(function(l){return <option key={l} value={""+l}>Level {l}</option>;})}
          </select>
          <select value={fSchool} onChange={function(e){setFSchool(e.target.value);}} style={selStyle}>
            <option value="any">Any School</option>
            {SCHOOLS.map(function(sc){return <option key={sc} value={sc}>{sc}</option>;})}
          </select>
          <input value={fClass} onChange={function(e){setFClass(e.target.value);}} placeholder="Class..." style={Object.assign({},inputStyle,{width:110})} />
          <select value={fCast} onChange={function(e){setFCast(e.target.value);}} style={selStyle}>
            <option value="any">Any Cast Time</option><option value="action">Action</option><option value="bonus">Bonus Action</option><option value="reaction">Reaction</option><option value="minute">Minute(s)</option><option value="hour">Hour(s)</option>
          </select>
          <select value={fRitual} onChange={function(e){setFRitual(e.target.value);}} style={selStyle}>

      {kind==="items"&&(

          <select value={fAttune} onChange={function(e){setFAttune(e.target.value);}} style={selStyle}>

          </select>
          <input value={fType} onChange={function(e){setFType(e.target.value);}} placeholder="Type contains... (e.g. Wondrous, Weapon)" style={Object.assign({},inputStyle,{flex:"1 1 180px",minWidth:140})} />
        </div>
